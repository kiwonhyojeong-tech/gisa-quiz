const GLOSSARY={"자료":"값(단순 데이터)만 전달 — 가장 낮고 바람직한 결합도","스탬프":"배열·레코드 등 자료 구조 전체를 전달","제어":"제어 신호(플래그)를 넘겨 상대 모듈의 흐름을 좌우","외부":"외부 데이터 포맷·통신 프로토콜·디바이스 인터페이스 공유","공통":"전역 변수 등 공통 데이터 영역을 함께 참조·갱신","내용":"다른 모듈의 내부 기능·자료를 직접 참조 — 가장 높고 나쁜 결합도","Data Coupling":"값(단순 데이터)만 전달 — 가장 낮고 바람직한 결합도","Stamp Coupling":"배열·객체 등 자료 구조 전체를 전달","Control Coupling":"제어 신호(플래그)로 상대 모듈의 흐름을 제어","External Coupling":"외부 데이터 포맷·프로토콜·디바이스 인터페이스 공유","Common Coupling":"전역 변수를 함께 참조·갱신","Content Coupling":"다른 모듈 내부를 직접 참조·수정 — 가장 나쁜 결합도","기능적":"단일 목적을 위해 모든 기능 수행 — 가장 높은 응집도","순차적":"한 활동의 출력이 다음 활동의 입력","통신적":"같은 입력/출력 데이터를 쓰는 기능들의 묶음 (교환적)","절차적":"순서대로 수행되지만 입출력 데이터 연관은 없음","시간적":"특정 시점에 함께 실행되는 기능들의 묶음 (예: 초기화)","논리적":"유사한 성격·분류의 기능들을 한 모듈에 묶음","우연적":"서로 아무 관련 없는 요소들의 모임 — 가장 낮은 응집도","FIFO":"가장 먼저 적재된 페이지부터 교체 (벨레이디의 모순 발생 가능)","LRU":"가장 오랫동안 사용되지 않은(시간) 페이지 교체","LFU":"사용 빈도(횟수)가 가장 적은 페이지 교체","NUR":"최근에 사용되지 않은 페이지 교체 — 참조·변형 비트 2개 사용","OPT":"앞으로 가장 오래 사용되지 않을 페이지 교체 (이론상 최적, 실현 불가)","FCFS":"도착한 순서대로 처리 — 비선점, 가장 단순","SJF":"실행 시간이 가장 짧은 작업 우선 — 비선점, 기아 발생 가능","SRT":"남은 실행 시간이 짧은 작업이 CPU를 빼앗음 — SJF의 선점형","RR":"동일한 시간 할당량을 돌아가며 부여 — 시분할용 선점형","HRN":"(대기+서비스)÷서비스 값이 큰 것 우선 — SJF 기아 보완, 비선점","구문 커버리지":"모든 명령문을 한 번 이상 실행 (Statement)","결정 커버리지":"각 결정문(분기)이 참/거짓을 한 번씩 (Branch/Decision)","조건 커버리지":"결정문 내 개별 조건식이 참/거짓을 한 번씩","조건/결정 커버리지":"조건 커버리지 + 결정 커버리지를 동시에 만족","변경 조건/결정 커버리지":"각 조건이 독립적으로 결과에 영향을 주는지 확인 (MC/DC)","다중 조건 커버리지":"조건식의 모든 참/거짓 조합을 테스트 — 가장 강력","경로 커버리지":"수행 가능한 모든 경로를 테스트","Statement":"모든 명령문을 한 번 이상 실행 (구문)","Branch":"각 결정문이 참/거짓을 한 번씩 (결정/분기)","Condition":"개별 조건식이 참/거짓을 한 번씩 (조건)","Condition/Decision":"조건 + 결정 커버리지 동시 만족","Modified Condition/Decision":"각 조건의 독립적 영향 확인 (MC/DC)","세타 조인":"비교 연산자(=, >, < 등)로 조건을 만족하는 튜플 결합","동등 조인":"세타 조인 중 조건이 = 인 경우 (중복 속성 남음)","자연 조인":"동등 조인에서 중복 속성을 제거","외부 조인":"조인 조건에 맞지 않는 튜플도 NULL로 포함 (LEFT/RIGHT/FULL)","중첩 조인":"한 릴레이션의 각 튜플마다 다른 릴레이션 전체를 반복 비교하는 조인 수행 방식","Singleton":"인스턴스를 단 하나만 생성, 전역 접근점 제공 (생성)","Prototype":"원형 객체를 복제(clone)해서 생성 (생성)","Factory Method":"객체 생성을 서브클래스에 위임 (생성)","Abstract Factory":"연관된 객체들의 조합(제품군)을 만드는 인터페이스 제공, Kit (생성)","Builder":"복잡한 객체의 생성 과정과 표현을 분리 (생성)","Adapter":"호환되지 않는 인터페이스를 변환해 연결 (구조)","Bridge":"추상과 구현을 분리해 독립적으로 확장 (구조)","Composite":"객체를 트리로 구성해 부분-전체를 동일하게 다룸 (구조)","Decorator":"객체에 동적으로 기능(장식)을 추가 (구조)","Facade":"복잡한 서브시스템에 단순한 통합 창구 제공 (구조)","Proxy":"대리자를 통해 객체 접근을 제어 (구조)","Flyweight":"공유를 통해 다수의 작은 객체를 효율적으로 관리 (구조)","Observer":"상태 변화를 의존 객체들에게 자동 통지 (행위)","Strategy":"알고리즘 군을 캡슐화해 상호 교환 (행위)","Iterator":"내부 구조 노출 없이 요소에 순차 접근 (행위)","Mediator":"객체 간 통신을 중재자가 캡슐화 (행위)","Command":"요청을 객체로 캡슐화 (행위)","State":"상태에 따라 행위를 바꿈 (행위)","Ransomware":"파일을 암호화해 인질로 잡고 금전 요구","Spyware":"사용자 몰래 정보를 수집·유출","Worm":"스스로 복제·전파되는 독립 실행형 악성코드","Virus":"다른 프로그램에 기생해 감염·전파","Backdoor":"인증을 우회하는 숨겨진 접근 통로","Trojan horse":"정상 프로그램으로 위장한 악성코드 (자가 복제 안 함)","Rootkit":"침입 흔적 은폐 + 무제한 접근 도구 모음, 시스템콜 후킹","Adware":"광고를 강제로 노출하는 프로그램","key logger attack":"키보드 입력을 가로채 정보 탈취","사회공학 기법":"사람의 심리·신뢰를 이용해 정보를 빼냄","APT":"명확한 표적을 정해 지속적으로 수행하는 지능형 공격","MITM":"통신 중간에 끼어들어 도청·변조 (중간자 공격)","XDR":"여러 보안 계층의 데이터를 통합 분석해 위협 탐지·대응","Replace attack":"유효한 데이터를 가로채 재전송·대체하는 공격","DAC":"소유자 재량으로 권한 부여 (신분 기반)","MAC":"보안 등급(레이블) 기반 강제 통제","RBAC":"역할(Role)에 권한을 부여하고 사용자에게 역할 할당","외부 스키마":"사용자·개발자 관점의 뷰 (서브 스키마)","개념 스키마":"조직 전체 관점의 논리 구조 (스키마)","내부 스키마":"물리적 저장 장치 관점의 구조","슈퍼키":"유일성 O, 최소성 X","후보키":"유일성 O, 최소성 O — 튜플 구별 기준","대체키":"기본키로 뽑히지 못한 나머지 후보키","외래키":"다른 릴레이션의 기본키를 참조","객체":"객체·속성·관계를 객체 다이어그램으로 (Object)","동적":"상태·이벤트 흐름을 상태 다이어그램으로 (Dynamic)","기능":"자료 흐름을 DFD로 (Functional)","IaaS":"서버·스토리지 등 인프라 자원을 서비스로 제공","PaaS":"개발·실행 플랫폼 환경을 서비스로 제공","SaaS":"완성된 소프트웨어를 서비스로 제공","연관":"2개 이상의 사물이 서로 관련된 상태 (Association)","집합":"하나가 다른 것에 포함되지만 독립 생명주기 (Aggregation, 빈 마름모)","포함":"포함되는 쪽이 독립적으로 존재할 수 없는 강한 집합 (Composition, 채운 마름모)","일반화":"일반(상위)-특수(하위) 관계, is-a (Generalization, 빈 화살표)","의존":"짧은 시간 동안만 관계를 유지 — 매개변수 등 (Dependency, 점선 화살표)","실체화":"인터페이스의 기능(오퍼레이션)을 실제로 구현하는 관계 (Realization)","Association":"2개 이상의 사물이 서로 관련된 상태 (연관)","Aggregation":"포함하되 독립 생명주기를 갖는 관계 (집합, 빈 마름모)","Composition":"전체가 사라지면 부분도 사라지는 강한 포함 (합성/포함)","Generalization":"상위-하위(is-a) 관계 (일반화, 빈 화살표)","Dependency":"짧은 시간만 유지되는 관계 (의존, 점선 화살표)","Realization":"인터페이스를 실제 구현하는 관계 (실체화)","Classification":"UML 표준 관계가 아님 — 함정 보기","Object":"객체·속성·관계를 객체 다이어그램으로 (객체 모델링)","Dynamic":"상태·이벤트 흐름을 상태 다이어그램으로 (동적 모델링)","Functional":"자료 흐름을 DFD로 (기능 모델링)","Duration":"럼바우 모델링 유형이 아님 — 함정 보기","Rebuilding":"럼바우 모델링 유형이 아님 — 함정 보기","Architecture":"럼바우 모델링 유형이 아님 — 함정 보기","Cause-Effect":"원인-효과 그래프는 블랙박스 테스트 기법 — 럼바우와 무관","Transaction":"럼바우 모델링 유형이 아님 — 함정 보기","Constraint":"럼바우 모델링 유형이 아님 — 함정 보기","Operation":"럼바우 모델링 유형이 아님 — 함정 보기","Sequence":"시퀀스는 UML 행위 다이어그램 — 럼바우 유형 아님","형상 식별":"관리 대상(형상 항목)을 정의하고 식별자 부여","형상 통제":"변경 요구를 검토·승인해 베이스라인에 반영","형상 감사":"베이스라인의 무결성을 검증","형상 기록":"형상 항목의 상태를 기록·보고","Template Method":"알고리즘 골격은 상위에, 세부 단계는 하위 클래스에 (행위)","Visitor":"객체 구조와 처리(연산)를 분리해 새 연산을 쉽게 추가 (행위)","Memento":"객체의 상태를 저장해 두었다가 복원 (행위)","Chain of Responsibility":"요청을 처리자 사슬을 따라 전달 (행위)","릴레이션 스키마":"릴레이션의 구조 정의 (이름 + 속성들)","릴레이션 인스턴스":"특정 시점에 릴레이션이 담고 있는 튜플들의 집합","튜플":"릴레이션의 행(Row) — 하나의 레코드","속성":"릴레이션의 열(Column) — 어트리뷰트","차수":"속성(열)의 개수 (Degree)","카디널리티":"튜플(행)의 개수 (Cardinality)","개념":"조직 전체 관점의 논리 구조 (개념 스키마)","물리":"비트를 전기 신호로 전송 (1계층)","데이터 링크":"인접 노드 간 프레임 전송, 오류·흐름 제어 (2계층)","네트워크":"IP 주소 기반 경로 설정, 라우팅 (3계층)","전송":"단말 간 신뢰성 있는 데이터 전송 — TCP/UDP (4계층)","세션":"통신 세션의 설정·유지·종료 (5계층)","표현":"데이터 형식 변환, 암호화, 압축 (6계층)","응용":"사용자에게 서비스 제공 — HTTP, FTP 등 (7계층)","IP":"비연결형 패킷 전달 — 주소 지정과 경로 설정","ICMP":"IP 전송 오류·제어 메시지 전달 (Ping이 사용)","ARP":"IP 주소 → MAC 주소 변환","RARP":"MAC 주소 → IP 주소 변환","IGMP":"멀티캐스트 그룹 관리","NAT":"사설 IP ↔ 공인 IP 주소 변환","라우팅 프로토콜":"라우터 간 경로 정보를 교환하는 프로토콜의 총칭 (RIP, OSPF 등)","ping of death":"비정상적으로 큰 ICMP 패킷으로 시스템 마비","land attack":"출발지와 목적지 IP를 같게 위조해 시스템 혼란","syn flooding":"SYN만 보내고 응답하지 않아 연결 자원 고갈","tear drop":"분할된 패킷의 오프셋을 조작해 재조립 오류 유발","smurf":"출발지를 피해자 IP로 위조한 브로드캐스트 ICMP로 트래픽 폭주","udp flooding":"대량의 UDP 패킷으로 대역폭·자원 고갈","포인트 투 포인트":"애플리케이션을 function optionNotes(q){
  // 문제 지문의 [보기] 항목별로 용어 사전 해설 + 정답 표시를 만들어 준다
  const lines=(q.q||'').split('\n').filter(l=>/^\s*\[보기\]/.test(l));
  if(!lines.length)return '';
  const gmap={};Object.keys(GLOSSARY).forEach(k=>gmap[norm(k)]=GLOSSARY[k]);
  let rows='';
  lines.forEach(line=>{
    line.replace(/^\s*\[보기\]\s*/,'').split(' / ').forEach(optRaw=>{
      const opt=optRaw.trim();if(!opt)return;
      const isAns=q.b.some(blank=>blank.some(a=>ansMatch(opt,a)));
      // 문제 맥락에 맞는 설명 우선 (예: 스키마 문제의 '외부' = 외부 스키마)
      let desc='';
      if(/스키마/.test(q.q))desc=gmap[norm(opt+' 스키마')]||'';
      if(!desc&&/커버리지/.test(q.q))desc=gmap[norm(opt+' 커버리지')]||'';
      if(!desc&&/조인/.test(q.q))desc=gmap[norm(opt+' 조인')]||'';
      if(!desc)desc=gmap[norm(opt)]||'';
      rows+='<div class="opt-note'+(isAns?' ans':'')+'"><span class="mark">'+(isAns?'✓':'·')+'</span><b>'+esc(opt)+'</b>'+(desc?' — '+esc(desc):'')+'</div>';
    });
  });
  return rows?'<div class="opt-notes"><span class="ex-lbl">보기 해설</span>'+rows+'</div>':'';
}
function uid(){return 'q'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---------- 보기 없는 문제용 자동 보기 ---------- */
function seedRand(str){ // 문제마다 항상 같은 보기가 나오도록 고정 시드
  let h=1779033703^str.length;
  for(let i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19;}
  return ()=>{h=Math.imul(h^h>>>16,2246822507);h=Math.imul(h^h>>>13,3266489909);return ((h^=h>>>16)>>>0)/4294967296;};
}
function hintOptions(q){
  if(/\[보기\]/.test(q.q))return null;                       // 이미 보기가 있음
  const correct=q.b.map(b=>b[0]);
  if(correct.some(a=>!a||a.length>24||/^[\d\s.,]+$/.test(a)))return null; // 긴 SQL·숫자 답은 제외
  const pool=[];
  DB.questions.forEach(x=>{
    if(x.id===q.id||x.tag!==q.tag)return;
    x.b.forEach(b=>{
      const a=b[0];
      if(!a||a.length>24||/^[\d\s.,]+$/.test(a))return;
      if(correct.some(c=>ansMatch(a,c)))return;              // 정답의 동의어는 오답 보기로 쓰지 않음
      if(pool.some(p=>ansMatch(a,p)))return;
      pool.push(a);
    });
  });
  if(pool.length<2)return null;
  const rnd=seedRand(q.id);
  const shuf=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
  const need=Math.min(pool.length,Math.max(3,7-correct.length));
  return shuf(correct.concat(shuf(pool).slice(0,need)));
}
function hintBar(q){
  const opts=hintOptions(q);
  if(!opts)return '';
  const chips=opts.map(o=>'<button type="button" class="opt" data-opt="'+esc(o)+'">'+esc(o)+'</button>').join('');
  const on=!!DB.hint;
  return '<div class="hintbox">'+
    '<button type="button" class="hint-toggle'+(on?' on':'')+'" id="hintBtn">'+(on?'🙈 보기 숨기기':'💡 보기 보기')+'</button>'+
    '<div class="choices hint-choices" id="hintChoices" style="display:'+(on?'flex':'none')+';">'+chips+'</div>'+
    '<div class="hint-note" style="display:'+(on?'block':'none')+';" id="hintNote">자동 생성된 보기예요 — 같은 파트의 다른 정답이 섞여 있어요</div>'+
  '</div>';
}
function fmtQ(text){
  // "[보기] A / B / C" 줄을 칩 형태로 렌더링
  return esc(text).split('\n').map(line=>{
    const m=line.match(/^\s*\[보기\]\s*(.+)$/);
    if(!m)return line;
    const opts=m[1].split(' / ').map(o=>'<button type="button" class="opt" data-opt="'+o.trim()+'" title="클릭하면 입력칸에 채워져요">'+o.trim()+'</button>').join('');
    return '<div class="choices"><span class="opt-label">보기</span>'+opts+'</div>';
  }).join('\n');
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- 저장 ---------- */
async function loadDB(){
  try{
    const r=await storeGet(STORE_KEY);
    if(r&&r.value)DB=JSON.parse(r.value);
  }catch(e){/* 키 없음 → 초기 세팅 */}
  if(!DB||!Array.isArray(DB.questions))DB={questions:[],stats:{}};
  if(!DB.stats)DB.stats={};
  // 기본 문제 병합: 없는 문제는 추가, 이미 있는 문제는 풀이·정답 목록을 최신으로 보충
  const map=new Map(DB.questions.map(x=>[norm(x.q),x]));
  let changed=false;
  SEED.forEach(s=>{
    const key=norm(s.q);
    const exist=map.get(key);
    if(!exist){
      const nq={id:uid()+Math.random().toString(36).slice(2,4),q:s.q,b:s.b,unordered:!!s.unordered,tag:s.tag||'',ex:s.ex||''};
      DB.questions.push(nq);map.set(key,nq);changed=true;
    }else{
      if(s.ex&&exist.ex!==s.ex){exist.ex=s.ex;changed=true;}
      if(s.b&&JSON.stringify(exist.b)!==JSON.stringify(s.b)){exist.b=s.b;changed=true;} // 정답 목록 갱신
      if(s.tag&&exist.tag!==s.tag){exist.tag=s.tag;changed=true;} // 분류 태그 갱신
    }
  });
  // 중복 정리로 삭제된 기본 문제를 저장 데이터에서도 제거
  const removedSet=new Set(REMOVED);
  const beforeLen=DB.questions.length;
  DB.questions=DB.questions.filter(x=>{const del=removedSet.has(norm(x.q));if(del)delete DB.stats[x.id];return !del;});
  if(DB.questions.length!==beforeLen)changed=true;
  // 분류별 순서(SEED 순서)로 재정렬 — 사용자가 직접 추가한 문제는 맨 뒤에 기존 순서대로 유지
  const orderMap=new Map(SEED.map((s,i)=>[norm(s.q),i]));
  const orderOf=x=>orderMap.has(norm(x.q))?orderMap.get(norm(x.q)):1e9;
  const sorted=DB.questions.map((x,i)=>({x,i})).sort((a,b)=>(orderOf(a.x)-orderOf(b.x))||(a.i-b.i)).map(o=>o.x);
  if(sorted.some((x,i)=>x!==DB.questions[i])){DB.questions=sorted;changed=true;}
  if(changed)await saveDB();
}
async function saveDB(){
  try{
    const r=await storeSet(STORE_KEY,JSON.stringify(DB));
    if(!r)toast('저장에 실패했어요. 다시 시도해 주세요.');
  }catch(e){toast('저장에 실패했어요. 다시 시도해 주세요.');}
}
function stat(id){return DB.stats[id]||(DB.stats[id]={att:0,ok:0,lastOk:null});}
function wrongIds(){return DB.questions.filter(x=>{const s=DB.stats[x.id];return s&&s.att>0&&s.lastOk===false;}).map(x=>x.id);}
function oftenWrongIds(){return DB.questions.filter(x=>{const s=DB.stats[x.id];return s&&(s.att-s.ok)>=2;}).map(x=>x.id);} // 2회 이상 틀린 문제
function starIds(){return DB.questions.filter(x=>x.star).map(x=>x.id);}
let wrongFilter='recent'; // recent | often | star
function wrongPool(){
  if(wrongFilter==='often')return oftenWrongIds();
  if(wrongFilter==='star')return starIds();
  return wrongIds();
}

const ANS_SUFFIXES=['커버리지','coverage','테스트','testing','test','기법','검사','방식','패턴','pattern','결합도','coupling','응집도','cohesion','다이어그램','diagram','공격','attack','알고리즘','algorithm','프로토콜','protocol','모형','모델','원칙','계층','layer'].map(s=>norm(s));
function stripSuffix(n){
  for(const suf of ANS_SUFFIXES){
    if(n.length>suf.length+1&&n.endsWith(suf))return n.slice(0,-suf.length);
  }
  return n;
}
function ansMatch(userVal,ans){
  const nu=norm(userVal),na=norm(ans);
  if(!nu)return false;
  if(nu===na)return true;
  return stripSuffix(nu)===stripSuffix(na); // "동등 분할 테스트" ≒ "동등 분할"
}
function grade(q,inputs){
  // returns {per:[{ok,answer}],okCount}
  const per=inputs.map(v=>({ok:false,user:v}));
  if(q.unordered&&q.b.length>1){
    const used=new Array(q.b.length).fill(false);
    inputs.forEach((v,i)=>{
      if(!norm(v))return;
      for(let j=0;j<q.b.length;j++){
        if(!used[j]&&q.b[j].some(a=>ansMatch(v,a))){used[j]=true;per[i].ok=true;break;}
      }
    });
  }else{
    inputs.forEach((v,i)=>{
      per[i].ok=q.b[i].some(a=>ansMatch(v,a));
    });
  }
  return {per,okCount:per.filter(p=>p.ok).length};
}

function weightedShuffle(ids){
  // 오답·미학습 문제가 자주 앞쪽에 오도록 가중 무작위 정렬
  return ids.map(id=>{
    const s=DB.stats[id];
    let w=1;
    if(!s||!s.att)w=3;                        // 아직 안 푼 문제 우선
    else{
      w=1+4*((s.att-s.ok)/s.att);             // 누적 오답률 가중
      if(s.lastOk===false)w+=3;               // 최근 오답 가중
      if((s.streak||0)>=3)w*=0.3;             // 3연속 정답 문제는 드물게
    }
    return {id,k:-Math.log(Math.random())/w};
  }).sort((a,b)=>a.k-b.k).map(x=>x.id);
}
function startSession(mode,onlyWrong){
  let ids=onlyWrong?wrongPool():catPool();
  if(mode==='random')ids=weightedShuffle(ids);
  session={ids,idx:0,ok:0,mode,onlyWrong,filter:onlyWrong?wrongFilter:catFilter,submitted:false,lastResult:null};
}

function catPool(){

const NOTE=[{"id":"c","ico":"⚙️","t":"C 비트 연산자","h":"<div class=\"lead\">A = 5 (<code>0101</code>), B = 3 (<code>0011</code>) 기준</div>\n\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>연산자</th><th>이름</th><th>규칙</th><th>계산</th><th>결과</th></tr>\n      <tr><td><code>&amp;</code></td><td>AND</td><td><b>둘 다 1</b>이면 1</td><td><code>0101 &amp; 0011 = 0001</code></td><td><b>1</b></td></tr>\n      <tr><td><code>|</code></td><td>OR</td><td><b>하나라도 1</b>이면 1</td><td><code>0101 | 0011 = 0111</code></td><td><b>7</b></td></tr>\n      <tr><td><code>^</code></td><td>XOR</td><td><b>서로 다르면</b> 1</td><td><code>0101 ^ 0011 = 0110</code></td><td><b>6</b></td></tr>\n      <tr><td><code>~</code></td><td>NOT (1의 보수)</td><td>비트 전부 반전</td><td><code>~5</code></td><td><b>-6</b></td></tr>\n      <tr><td><code>&lt;&lt;</code></td><td>왼쪽 시프트</td><td>A × 2<sup>n</sup></td><td><code>5 &lt;&lt; 1</code></td><td><b>10</b></td></tr>\n      <tr><td><code>&gt;&gt;</code></td><td>오른쪽 시프트</td><td>A ÷ 2<sup>n</sup></td><td><code>5 &gt;&gt; 1</code></td><td><b>2</b></td></tr>\n    </table>\n    </div>\n\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ 자주 착각하는 3가지</span>\n      <ul>\n        <li><code>&amp;</code>는 \"둘 다 <span class=\"no\">같으면</span> 1\"이 <b>아님</b> → \"둘 다 <span class=\"ok\">1일 때만</span> 1\". 같으면 1은 XNOR <code>~(A^B)</code></li>\n        <li><code>^</code>는 <b>XOR 전용</b>. \"하나라도 1이면 1\"은 <code>^</code>가 아니라 <code>|</code></li>\n        <li><code>~A</code> = <span class=\"no\">-(A-1)</span> 아님 → <span class=\"ok\">-(A+1)</span>. 즉 <code>~5 = -6</code></li>\n      </ul>\n    </div>\n\n    <h3>~A = -(A+1) 인 이유</h3>\n    <p>2의 보수 체계에서 <code>-A = ~A + 1</code> → 정리하면 <code>~A = -A - 1 = -(A+1)</code></p>\n    <p>비트 그리지 말고 공식만 쓰세요: <code>~0 = -1</code>, <code>~5 = -6</code>, <code>~10 = -11</code></p>\n\n    <h3>비트 연산 vs 논리 연산</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>비트</th><th>논리</th><th>차이</th></tr>\n      <tr><td><code>&amp;</code></td><td><code>&amp;&amp;</code></td><td rowspan=\"3\">비트는 <b>계산된 값</b> 반환(1, 6, 7…)<br>논리는 <b>참/거짓</b>(1 또는 0)만 반환</td></tr>\n      <tr><td><code>|</code></td><td><code>||</code></td></tr>\n      <tr><td><code>~</code></td><td><code>!</code></td></tr>\n    </table>\n    </div>\n    <p><code>5 &amp; 3 = 1</code> (비트 계산) &nbsp;/&nbsp; <code>5 &amp;&amp; 3 = 1</code> (둘 다 참)<br>\n    <code>~5 = -6</code> &nbsp;/&nbsp; <code>!5 = 0</code> (5는 참 → 부정하면 거짓)</p>\n\n    <div class=\"box box-tip\">\n      <span class=\"box-title\">💡 단골 함정</span>\n      <ul>\n        <li><b>우선순위</b>: <code>&amp; | ^</code>는 비교 연산자(<code>== &lt; &gt;</code>)보다 <b>낮음</b> → <code>a &amp; b == c</code>는 <code>a &amp; (b == c)</code>로 해석</li>\n        <li><b>XOR 두 번 = 원상복구</b>: <code>a ^ b ^ b = a</code> (스왑·간이 암호화 원리)</li>\n        <li><code>&amp;&amp;</code>, <code>||</code>는 <b>단축 평가</b>: <code>0 &amp;&amp; f()</code> → f() 실행 안 함</li>\n      </ul>\n    </div>"},{"id":"printf","ico":"🔢","t":"printf 서식 지정자 · 진법","h":"<div class=\"lead\">\"X는 16진수\" — 연산자가 아니라 <b>출력 형식</b>입니다</div>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>지정자</th><th>의미</th><th><code>printf(\"%_\", 26)</code></th></tr>\n      <tr><td><code>%d</code></td><td>10진수 정수</td><td>26</td></tr>\n      <tr><td><code>%x</code></td><td>16진수 (소문자)</td><td>1a</td></tr>\n      <tr><td><code>%X</code></td><td>16진수 (대문자)</td><td>1A</td></tr>\n      <tr><td><code>%o</code></td><td>8진수</td><td>32</td></tr>\n      <tr><td><code>%c</code> / <code>%s</code></td><td>문자 / 문자열</td><td>(아스키 26번)</td></tr>\n      <tr><td><code>%f</code> / <code>%u</code></td><td>실수 / 부호없는 정수</td><td>26.000000 / 26</td></tr>\n    </table>\n    </div>\n    <h3>코드 속 진법 리터럴</h3>\n    <ul>\n      <li><code>0x1A</code> → 16진수 = <b>26</b> (0x 접두사)</li>\n      <li><code>032</code> → 8진수 = <b>26</b> (0 접두사 주의!)</li>\n      <li><code>0b11010</code> → 2진수 = <b>26</b></li>\n    </ul>\n    <div class=\"box box-mem\">\n      <span class=\"box-title\">📌 16진수 빠른 변환</span>\n      4비트씩 끊어서: <code>1A</code> = <code>0001 1010</code> = 16+8+2 = 26<br>\n      A=10, B=11, C=12, D=13, E=14, F=15\n    </div>"},{"id":"java","ico":"☕","t":"자바 상속 · 다형성","h":"<div class=\"lead\"><code>Parent p = new Child();</code> — <b>껍데기는 부모, 알맹이는 자식</b></div>\n\n    <div class=\"box box-mem\">\n      <span class=\"box-title\">🎯 3줄 요약</span>\n      ① <b>메서드는 자식, 필드는 부모</b><br>\n      ② 생성자는 <b>무조건 부모부터</b> (자동 <code>super()</code>)<br>\n      ③ 오버라이딩은 매개변수 <b>같아야</b>, 오버로딩은 <b>달라야</b>\n    </div>\n\n    <h3>무엇이 부모 것이고 무엇이 자식 것인가</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>대상</th><th>누구 것?</th><th>결정 시점</th></tr>\n      <tr><td>메서드 (오버라이딩됨)</td><td class=\"no\">자식 (알맹이)</td><td>실행 시 — 동적 바인딩</td></tr>\n      <tr><td><b>필드(변수)</b></td><td class=\"ok\">부모 (껍데기)</td><td>컴파일 시 — 참조 타입</td></tr>\n      <tr><td>static 메서드</td><td class=\"ok\">부모 (껍데기)</td><td>컴파일 시</td></tr>\n      <tr><td>자식에만 있는 메서드</td><td colspan=\"2\"><b>컴파일 에러</b> — 다운캐스팅 필요</td></tr>\n    </table>\n    </div>\n    <pre class=\"code\">class Parent { int x = 10;  void print(){ S.o.p(\"부모\"); } }\nclass Child extends Parent { int x = 20;  void print(){ S.o.p(\"자식\"); } }\n\nParent p = new Child();\np.print();   // \"자식\"  ← 메서드는 알맹이\np.x;         // 10      ← 변수는 껍데기 (함정!)</pre>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ 최대 함정</span>\n      같은 문제에서 <b>메서드는 자식 것</b>이 나오는데 <b>필드는 부모 것</b>이 나옵니다.<br>\n      필드는 오버라이딩이 <b>안 되고</b> 그냥 <b>가려질(hiding)</b> 뿐이기 때문이에요.\n    </div>\n\n    <h3>super의 함정 — 부모 메서드 안에서 print() 하면?</h3>\n    <pre class=\"code\">class Parent {\n    void method(){ print(); }        // ← 사실은 this.print()\n    void print(){ S.o.p(\"부모 print\"); }\n}\nclass Child extends Parent {\n    void method(){ super.method(); } // 부모 method로 올라감\n    void print(){ S.o.p(\"자식 print\"); }\n}\nParent p = new Child();\np.method();   // 출력: <b>자식 print</b>  ← 부모 아님!</pre>\n    <p><b>추적</b>: ① 알맹이가 Child → <code>Child.method()</code> ② <code>super.method()</code>로 부모 진입 ③ 그 안의 <code>print()</code>는 <code>this.print()</code> ④ <b>this는 여전히 Child</b> ⑤ → 자식 print</p>\n    <div class=\"box box-tip\">\n      <span class=\"box-title\">💡 규칙 두 줄</span>\n      · <code>super.</code>는 <b>그 호출 딱 하나, 한 단계만</b> 적용 — \"이제부터 계속 부모 모드\"가 아님<br>\n      · 부모 메서드 안으로 들어가도 <b>this는 끝까지 Child</b> → 이름만 쓴 호출은 전부 자식으로 내려옴\n    </div>\n    <p><b>비유</b>: <code>super.method()</code>는 \"부모 집에 잠깐 들르는 것\"이지 \"부모가 되는 것\"이 아님. 부모 집에서 print를 시켜도 <b>일하는 사람은 여전히 나(Child)</b></p>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ 단, 필드는 반대</span>\n      부모 메서드 안의 <code>x</code>는 <b>그 코드가 쓰인 클래스(Parent)의 x</b>를 봅니다.<br>\n      → <b>메서드 호출은 자식으로 내려오고, 필드 접근은 부모에 머문다</b>\n    </div>\n\n    <h3>super 3가지 용법</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><td><code>super.메서드()</code></td><td><b>부모</b> 메서드 호출 (오버라이딩 뚫고 위로)</td></tr>\n      <tr><td><code>super.필드</code></td><td>부모 필드 접근</td></tr>\n      <tr><td><code>super(인자)</code></td><td><b>부모 생성자</b> 호출 — 반드시 <b>첫 줄</b></td></tr>\n    </table>\n    </div>\n\n    <h3>생성자 실행 순서 — 부모 먼저 (초단골)</h3>\n    <pre class=\"code\">class Parent { Parent(){ S.o.p(\"부모 생성자\"); } }\nclass Child extends Parent { Child(){ S.o.p(\"자식 생성자\"); } }\nnew Child();   // 출력: 부모 생성자 → 자식 생성자</pre>\n    <p><code>super()</code>를 안 써도 컴파일러가 <b>자동으로 첫 줄에 삽입</b> → 항상 부모부터.<br>\n    단, 부모에 <b>기본 생성자가 없고</b> 매개변수 생성자만 있으면 자동 삽입 실패 → <b>컴파일 에러</b> → <code>super(값)</code> 직접 작성 필요</p>\n\n    <h3>오버라이딩 vs 오버로딩</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th></th><th>오버라이딩 (Overriding)</th><th>오버로딩 (Overloading)</th></tr>\n      <tr><td>뜻</td><td>재정의</td><td>중복 정의</td></tr>\n      <tr><td>관계</td><td><b>상속</b> 관계 (부모↔자식)</td><td><b>같은 클래스</b> 안</td></tr>\n      <tr><td>이름</td><td>같음</td><td>같음</td></tr>\n      <tr><td><b>매개변수</b></td><td class=\"ok\">같아야 함</td><td class=\"no\">달라야 함 (개수·타입·순서)</td></tr>\n      <tr><td>반환형</td><td>같아야 함</td><td>상관없음</td></tr>\n    </table>\n    </div>\n    <div class=\"box box-mem\">\n      <span class=\"box-title\">🎯 암기</span>\n      오버라<b>이</b>딩 = 덮어<b>쓰</b>기(상속) · 오버<b>로</b>딩 = 여러 개 <b>쌓</b>기(같은 클래스)<br>\n      매개변수가 <b>같으면 라이딩</b>, <b>다르면 로딩</b>\n    </div>\n\n    <h3>this vs super</h3>\n    <ul>\n      <li><code>this.x</code> 내 필드 &nbsp;/&nbsp; <code>this()</code> <b>내 클래스의 다른 생성자</b> 호출</li>\n      <li><code>super.x</code> 부모 필드 &nbsp;/&nbsp; <code>super()</code> <b>부모 생성자</b> 호출</li>\n      <li>둘 다 생성자 <b>첫 줄</b>에만 → <b>함께 못 씀</b></li>\n    </ul>\n\n    <h3>형변환 (캐스팅)</h3>\n    <pre class=\"code\">Parent p = new Child();   // 업캐스팅 — 자동 (자식→부모)\nChild c = (Child) p;      // 다운캐스팅 — 명시적 필요\nc.자식만의메서드();          // 이제 호출 가능</pre>\n    <p><b>업캐스팅</b>: 항상 안전 → 자동 &nbsp;|&nbsp; <b>다운캐스팅</b>: 알맹이가 Child가 아니면 실행 중 <code>ClassCastException</code></p>\n\n    <h3>추상 클래스 vs 인터페이스</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th></th><th>추상 클래스</th><th>인터페이스</th></tr>\n      <tr><td>키워드</td><td><code>abstract class</code> / <code>extends</code></td><td><code>interface</code> / <code>implements</code></td></tr>\n      <tr><td>다중 상속</td><td class=\"no\">✗ 하나만</td><td class=\"ok\">✓ 여러 개</td></tr>\n      <tr><td>필드</td><td>일반 필드 가능</td><td><code>public static final</code> 상수만</td></tr>\n      <tr><td>메서드</td><td>일반 + 추상 둘 다</td><td>추상 (Java 8+ default·static 가능)</td></tr>\n      <tr><td>관계</td><td><b>is-a</b> (~이다)</td><td><b>can-do</b> (~할 수 있다)</td></tr>\n    </table>\n    </div>\n\n    <h3>제어자</h3>\n    <ul>\n      <li>접근 범위: <code>private</code> &lt; <code>default</code> &lt; <code>protected</code> &lt; <code>public</code></li>\n      <li><code>static</code> — 객체 없이 <b>클래스명으로</b> 호출, 모든 객체가 <b>공유</b></li>\n      <li><code>final</code> — 클래스(상속 금지) / 메서드(오버라이딩 금지) / 변수(상수)</li>\n      <li><b>오버라이딩 제약</b>: 접근 범위를 <b>좁힐 수 없음</b> (부모 public → 자식 private ✗)</li>\n    </ul>\n\n    <h3>== vs equals (String 함정)</h3>\n    <pre class=\"code\">String a = \"abc\";          String b = \"abc\";\na == b        // true  ← 상수 풀(pool)에서 같은 객체 공유\nString c = new String(\"abc\");\na == c        // <b>false</b> ← new는 새 객체, 주소 비교\na.equals(c)   // <b>true</b>  ← 내용 비교</pre>\n    <p><code>==</code>는 <b>주소</b> 비교(기본형은 값), <code>equals()</code>는 <b>내용</b> 비교</p>"},{"id":"py","ico":"🐍","t":"파이썬","h":"<div class=\"lead\">실기 단골: <b>슬라이싱 · 리스트 메서드 · print 옵션</b></div>\n\n    <h3>print 옵션 — sep / end</h3>\n    <pre class=\"code\">print(\"a\",\"b\",\"c\")              # a b c   ← 기본 구분자는 <b>공백</b>\nprint(\"a\",\"b\",sep=\"-\")          # a-b     ← 구분자 변경\nprint(\"a\",end=\"\")               # 줄바꿈 <b>안 함</b> (기본 end=\"\\n\")\nprint(\"a\",end=\"\");print(\"b\")    # ab\nprint(\"2024\",\"01\",\"01\",sep=\"/\") # 2024/01/01</pre>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ 함정</span>\n      <code>print(a,b)</code> → 자동으로 <b>공백</b> 삽입 (a b) &nbsp;|&nbsp; <code>print(a+b)</code> → 붙음 (ab)<br>\n      <code>end=\"\"</code>가 있으면 다음 print가 <b>같은 줄에</b> 이어짐\n    </div>\n\n    <h3>문자열·리스트 슬라이싱 <code>S[시작:끝:간격]</code></h3>\n    <p><code>S = \"ABCDEFG\"</code> · 인덱스는 <b>0부터</b>, 끝 인덱스는 <b>포함 안 함</b></p>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>식</th><th>결과</th><th>설명</th></tr>\n      <tr><td><code>S[0]</code></td><td>A</td><td>첫 글자</td></tr>\n      <tr><td><code>S[-1]</code></td><td>G</td><td><b>마지막</b> 글자 (음수는 뒤에서)</td></tr>\n      <tr><td><code>S[1:4]</code></td><td>BCD</td><td>1~3 (4는 <b>미포함</b>)</td></tr>\n      <tr><td><code>S[:3]</code></td><td>ABC</td><td>처음부터 2까지</td></tr>\n      <tr><td><code>S[4:]</code></td><td>EFG</td><td>4부터 끝까지</td></tr>\n      <tr><td><code>S[::2]</code></td><td>ACEG</td><td>2칸씩 건너뛰기</td></tr>\n      <tr><td><code>S[::-1]</code></td><td class=\"no\">GFEDCBA</td><td><b>역순 뒤집기</b> (초단골!)</td></tr>\n      <tr><td><code>S[-3:]</code></td><td>EFG</td><td>뒤에서 3개</td></tr>\n      <tr><td><code>S[1:6:2]</code></td><td>BDF</td><td>1~5를 2칸씩</td></tr>\n    </table>\n    </div>\n    <div class=\"box box-mem\">\n      <span class=\"box-title\">🎯 인덱스 그림</span>\n      <code> A  B  C  D  E  F  G</code><br>\n      <code> 0  1  2  3  4  5  6</code> ← 앞에서<br>\n      <code>-7 -6 -5 -4 -3 -2 -1</code> ← 뒤에서<br>\n      <b>S[a:b] = a부터 b-1까지</b> (개수 = b-a)\n    </div>\n\n    <h3>리스트 메서드</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>메서드</th><th>동작</th><th>예 (a=[1,2,3])</th></tr>\n      <tr><td><code>append(x)</code></td><td>맨 뒤에 <b>하나</b> 추가</td><td><code>a.append([4,5])</code> → [1,2,3,<b>[4,5]</b>]</td></tr>\n      <tr><td><code>extend(x)</code></td><td>리스트를 <b>펼쳐서</b> 확장</td><td><code>a.extend([4,5])</code> → [1,2,3,<b>4,5</b>]</td></tr>\n      <tr><td><code>insert(i,x)</code></td><td>i 위치에 삽입</td><td><code>a.insert(1,9)</code> → [1,<b>9</b>,2,3]</td></tr>\n      <tr><td><code>pop()</code></td><td><b>마지막</b> 꺼내고 삭제</td><td><code>a.pop()</code> → 3 반환, a=[1,2]</td></tr>\n      <tr><td><code>pop(i)</code></td><td>i번째 꺼내고 삭제</td><td><code>a.pop(0)</code> → 1 반환</td></tr>\n      <tr><td><code>remove(x)</code></td><td><b>값</b> x를 찾아 삭제 (첫 번째)</td><td><code>a.remove(2)</code> → [1,3]</td></tr>\n      <tr><td><code>index(x)</code></td><td>값 x의 <b>위치</b> 반환</td><td><code>a.index(3)</code> → 2</td></tr>\n      <tr><td><code>sort()</code> / <code>reverse()</code></td><td>정렬 / 뒤집기 (<b>원본 변경</b>)</td><td><code>a.sort(reverse=True)</code> → 내림차순</td></tr>\n      <tr><td><code>count(x)</code> / <code>len(a)</code></td><td>x 개수 / 전체 길이</td><td></td></tr>\n    </table>\n    </div>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ append vs extend (최다 출제)</span>\n      <code>append([4,5])</code> → 리스트를 <b>통째로</b> 원소 하나로 넣음 → 길이 +1<br>\n      <code>extend([4,5])</code> → 원소를 <b>하나씩 풀어서</b> 넣음 → 길이 +2<br>\n      <code>pop(i)</code>는 <b>인덱스</b>, <code>remove(x)</code>는 <b>값</b>!\n    </div>\n\n    <h3>자료형 4가지 구분</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>자료형</th><th>기호</th><th>수정</th><th>중복</th><th>순서</th></tr>\n      <tr><td>리스트 List</td><td><code>[ ]</code></td><td class=\"ok\">O</td><td>O</td><td>O</td></tr>\n      <tr><td>튜플 Tuple</td><td><code>( )</code></td><td class=\"no\">X (불변)</td><td>O</td><td>O</td></tr>\n      <tr><td>딕셔너리 Dict</td><td><code>{키:값}</code></td><td class=\"ok\">O</td><td>키 X</td><td>-</td></tr>\n      <tr><td>집합 Set</td><td><code>{ }</code></td><td class=\"ok\">O</td><td class=\"no\">X (중복 제거)</td><td>X</td></tr>\n    </table>\n    </div>\n    <pre class=\"code\">a = {1,2,2,3,3,3}      print(a)   # {1, 2, 3}  ← <b>중복 자동 제거</b>\nd = {'a':1,'b':2}\nd['a']                            # 1\nd.keys() / d.values() / d.items() # 키 / 값 / (키,값) 쌍\nt = (1,2,3);  t[0]=9              # <b>에러!</b> 튜플은 수정 불가</pre>\n\n    <h3>range · for</h3>\n    <pre class=\"code\">range(5)        # 0 1 2 3 4      ← 5는 <b>미포함</b>\nrange(1,5)      # 1 2 3 4\nrange(1,10,2)   # 1 3 5 7 9      ← 간격 2\nrange(5,0,-1)   # 5 4 3 2 1      ← 역순\n\nfor i in range(3): print(i, end=\" \")   # 0 1 2\nfor x in [1,2,3]: ...                  # 원소 직접 순회\nfor i,x in enumerate([10,20]): ...     # i=0,x=10 / i=1,x=20</pre>\n\n    <h3>연산자 (C·자바와 다른 것)</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><td><code>//</code></td><td><b>몫</b> (정수 나눗셈)</td><td><code>7//2</code> → 3</td></tr>\n      <tr><td><code>/</code></td><td>나눗셈 (<b>실수</b>)</td><td><code>7/2</code> → 3.5</td></tr>\n      <tr><td><code>%</code></td><td>나머지</td><td><code>7%2</code> → 1</td></tr>\n      <tr><td><code>**</code></td><td><b>거듭제곱</b></td><td><code>2**3</code> → 8</td></tr>\n      <tr><td><code>and / or / not</code></td><td>논리 연산 (<code>&amp;&amp; || !</code> 없음)</td><td></td></tr>\n    </table>\n    </div>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ 파이썬엔 없는 것</span>\n      <code>++</code>, <code>--</code> 증감 연산자 <b>없음</b> → <code>i += 1</code> 사용<br>\n      <code>{ }</code> 블록 없음 → <b>들여쓰기</b>가 블록 · <code>;</code> 불필요\n    </div>\n\n    <h3>문자열 메서드</h3>\n    <pre class=\"code\">\"a,b,c\".split(\",\")     # ['a','b','c']  ← 나누기\n\"-\".join(['a','b'])    # 'a-b'          ← 합치기\n\"abc\".upper()          # 'ABC'\n\"  a \".strip()         # 'a'            ← 공백 제거\n\"abc\".replace(\"a\",\"X\") # 'Xbc'\n\"abc\" * 3              # 'abcabcabc'    ← 반복\nlen(\"abc\")             # 3</pre>\n\n    <h3>함수·클래스</h3>\n    <pre class=\"code\">def f(a, b=10):        # b는 기본값\n    return a+b\nf(1)        # 11\nf(1, 2)     # 3\n\nclass Car:\n    def __init__(self, name):   # 생성자\n        self.name = name        # <b>self 필수</b>\n    def show(self):\n        print(self.name)\nc = Car(\"소나타\"); c.show()</pre>\n    <p><b>파이썬 vs 자바</b>: 생성자는 <code>__init__</code>, 자기 자신은 <code>self</code>(자바의 this), 상속은 <code>class 자식(부모):</code>, 부모 호출은 <code>super().메서드()</code></p>\n\n    <h3>input</h3>\n    <pre class=\"code\">a = input()            # 무조건 <b>문자열</b>로 받음\nn = int(input())       # 숫자로 쓰려면 형변환 필수\na, b = input().split() # 공백으로 나눠 두 변수에</pre>"},{"id":"sql","ico":"🗄️","t":"SQL 문법 정리","h":"<div class=\"lead\">문법은 <b>구조를 통째로</b> 외우는 게 빠릅니다</div>\n<h3>명령어 3분류</h3>\n<div class=\"tbl-wrap\"><table>\n<tr><th>분류</th><th>명령어</th><th>용도</th></tr>\n<tr><td><b>DDL</b> 정의</td><td>CREATE · ALTER · DROP · TRUNCATE</td><td>구조를 만들고 바꾸고 지움</td></tr>\n<tr><td><b>DML</b> 조작</td><td>SELECT · INSERT · UPDATE · DELETE</td><td>데이터를 다룸</td></tr>\n<tr><td><b>DCL</b> 제어</td><td>GRANT · REVOKE · COMMIT · ROLLBACK</td><td>권한·트랜잭션</td></tr>\n</table></div>\n<div class=\"box box-warn\"><span class=\"box-title\">⚠️ 헷갈림</span>\n<b>DELETE</b>(DML) — 행만 삭제, 롤백 가능 · <b>DROP</b>(DDL) — 테이블 구조까지 삭제 · <b>TRUNCATE</b>(DDL) — 전체 행 삭제(구조는 남김)</div>\n\n<h3>테이블 생성 · 제약조건</h3>\n<div class=\"code\">CREATE TABLE 수강 (\n    학번      CHAR(8)      <b>PRIMARY KEY</b>,\n    이름      VARCHAR(20)  <b>NOT NULL</b>,\n    나이      INT          <b>CHECK</b> (나이 >= 18),\n    학과코드  CHAR(4),\n    CONSTRAINT FK_학과 <b>FOREIGN KEY</b> (학과코드) <b>REFERENCES</b> 학과(학과코드)\n);</div>\n<ul>\n<li><code>PRIMARY KEY</code> — 기본키 (NULL·중복 불가)</li>\n<li><code>NOT NULL</code> — NULL 금지 &nbsp;|&nbsp; <code>UNIQUE</code> — 중복 금지(NULL은 허용)</li>\n<li><code>CHECK (조건)</code> — 값 범위 제한 &nbsp;|&nbsp; <code>DEFAULT 값</code> — 기본값</li>\n<li><code>FOREIGN KEY (컬럼) REFERENCES 테이블(컬럼)</code> — 외래키, <b>항상 짝으로</b></li>\n</ul>\n<p>구조 변경: <code>ALTER TABLE 회사 ADD 부서명 VARCHAR(20);</code> · <code>ALTER TABLE ... MODIFY / DROP COLUMN</code></p>\n\n<h3>DML 4형제</h3>\n<div class=\"code\"><b>SELECT</b> 이름, 학번 FROM 학생 WHERE 학과='컴퓨터공학' ORDER BY 학번 DESC;\n<b>INSERT INTO</b> 학생 VALUES(202101, '임꺽정', '프로그래밍');\n<b>INSERT INTO</b> 학생(학번, 성명) VALUES(202101, '임꺽정');   -- 컬럼 지정\n<b>UPDATE</b> 학생 <b>SET</b> 학과명='컴퓨터공학' <b>WHERE</b> 학번='202101';\n<b>DELETE FROM</b> 학생 <b>WHERE</b> 이름='현진';</div>\n<div class=\"box box-warn\"><span class=\"box-title\">⚠️ 필수 체크</span>\n· <b>문자는 따옴표</b>('임꺽정'), 숫자는 없이(202101)<br>\n· UPDATE·DELETE에 <b>WHERE 빠뜨리면 전체</b>가 수정·삭제됨<br>\n· INSERT는 <b>INTO</b>, DELETE는 <b>FROM</b>, UPDATE는 둘 다 없음</div>\n\n<h3>SELECT 작성 순서</h3>\n<div class=\"order\"><span>SELECT</span><span class=\"arw\">›</span><span>FROM</span><span class=\"arw\">›</span><span>WHERE</span><span class=\"arw\">›</span><span>GROUP BY</span><span class=\"arw\">›</span><span>HAVING</span><span class=\"arw\">›</span><span>ORDER BY</span></div>\n<div class=\"code\">SELECT 학과, COUNT(*) FROM 학생\n GROUP BY 학과 HAVING COUNT(*) >= 3\n ORDER BY 학과 ASC;</div>\n<ul>\n<li><b>WHERE</b> — 그룹 짓기 <b>전</b>, 개별 행을 거름</li>\n<li><b>HAVING</b> — 그룹 지은 <b>후</b>, 그룹을 거름 (<b>집계함수 조건은 HAVING</b>)</li>\n<li>집계 함수: COUNT · SUM · AVG · MAX · MIN &nbsp;|&nbsp; <code>COUNT(*)</code>는 NULL 포함, <code>COUNT(컬럼)</code>은 제외</li>\n<li><code>DISTINCT</code>(중복 제거) · <code>ASC</code>(오름차순, 기본) · <code>DESC</code>(내림차순) · <code>AS</code>(별칭)</li>\n<li>조건: <code>BETWEEN a AND b</code> · <code>IN (1,2)</code> · <code>LIKE '김%'</code> · <code>IS NULL</code></li>\n</ul>\n\n<h3>뷰 (VIEW)</h3>\n<div class=\"code\"><b>CREATE VIEW</b> 사원뷰 <b>AS</b> SELECT 사번, 이름 FROM 사원 WHERE 성별='M';\n<b>DROP VIEW</b> 사원뷰 <b>CASCADE</b>;</div>\n<p>뷰는 <b>ALTER 불가</b> → 수정하려면 DROP 후 재생성 (또는 CREATE OR REPLACE VIEW)</p>\n\n<h3>권한 (DCL)</h3>\n<div class=\"code\"><b>GRANT</b> SELECT <b>ON</b> 학생 <b>TO</b> 홍길동 <b>WITH GRANT OPTION</b>;\n<b>REVOKE</b> SELECT <b>ON</b> 학생 <b>FROM</b> 홍길동 <b>CASCADE</b>;</div>\n<div class=\"box box-tip\"><span class=\"box-title\">💡 전치사가 포인트</span>\n<b>GRANT ... TO</b> (준다) &nbsp;|&nbsp; <b>REVOKE ... FROM</b> (뺏는다)<br>\n<code>WITH GRANT OPTION</code> — 받은 권한을 <b>남에게 또 줄 수 있는</b> 권한까지<br>\n<code>CASCADE</code> — 연쇄 회수/삭제 &nbsp;|&nbsp; <code>RESTRICT</code> — 참조 있으면 취소</div>\n\n<h3>트리거 · 기타</h3>\n<ul>\n<li><b>트리거</b> — INSERT/UPDATE/DELETE 이벤트 시 <b>자동</b> 실행되는 절차형 SQL</li>\n<li><b>인덱스</b> — <code>CREATE INDEX 인덱스명 ON 학생(이름);</code> — 검색 속도↑, 삽입·삭제 오버헤드↑</li>\n</ul>"},{"id":"coupling","ico":"🧩","t":"결합도 · 응집도","h":"<div class=\"lead\">모듈 독립성 = 결합도 ↓ + 응집도 ↑</div>\n\n    <h3>결합도 (낮을수록 좋음)</h3>\n    <div class=\"order\">\n      <span class=\"best\">자료</span><span class=\"arw\">›</span>\n      <span>스탬프</span><span class=\"arw\">›</span>\n      <span>제어</span><span class=\"arw\">›</span>\n      <span>외부</span><span class=\"arw\">›</span>\n      <span>공통</span><span class=\"arw\">›</span>\n      <span class=\"worst\">내용</span>\n    </div>\n    <div class=\"box box-mem\"><span class=\"box-title\">🎯 암기</span><b>자 · 스 · 제 · 외 · 공 · 내</b></div>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>결합도</th><th>핵심 키워드</th></tr>\n      <tr><td>자료 (Data)</td><td>값(단순 데이터)만 전달 — 가장 바람직</td></tr>\n      <tr><td>스탬프 (Stamp)</td><td>배열·레코드·객체 등 <b>자료 구조 전체</b> 전달</td></tr>\n      <tr><td>제어 (Control)</td><td><b>플래그·제어 신호</b>로 상대 모듈 흐름 좌우</td></tr>\n      <tr><td>외부 (External)</td><td>외부 <b>데이터 포맷·프로토콜·디바이스</b> 공유</td></tr>\n      <tr><td>공통 (Common)</td><td><b>전역 변수</b>를 함께 참조·갱신</td></tr>\n      <tr><td>내용 (Content)</td><td>다른 모듈 <b>내부를 직접</b> 참조·수정 — 최악</td></tr>\n    </table>\n    </div>\n\n    <h3>응집도 (높을수록 좋음)</h3>\n    <div class=\"order\">\n      <span class=\"best\">기능적</span><span class=\"arw\">›</span>\n      <span>순차적</span><span class=\"arw\">›</span>\n      <span>교환(통신)적</span><span class=\"arw\">›</span>\n      <span>절차적</span><span class=\"arw\">›</span>\n      <span>시간적</span><span class=\"arw\">›</span>\n      <span>논리적</span><span class=\"arw\">›</span>\n      <span class=\"worst\">우연적</span>\n    </div>\n    <div class=\"box box-mem\"><span class=\"box-title\">🎯 암기</span><b>기 · 순 · 교 · 절 · 시 · 논 · 우</b></div>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>응집도</th><th>핵심 키워드</th></tr>\n      <tr><td>기능적</td><td>모든 기능이 <b>단일 목적</b></td></tr>\n      <tr><td>순차적</td><td>앞 활동의 <b>출력 → 뒤 활동의 입력</b></td></tr>\n      <tr><td>교환(통신)적</td><td><b>같은 입·출력 데이터</b>를 쓰는 기능들</td></tr>\n      <tr><td>절차적</td><td><b>순서만</b> 정해짐 (데이터 연관 없음)</td></tr>\n      <tr><td>시간적</td><td><b>같은 시점</b>에 실행 (예: 초기화)</td></tr>\n      <tr><td>논리적</td><td><b>비슷한 성격</b>끼리 묶음 (예: 모든 출력 처리)</td></tr>\n      <tr><td>우연적</td><td>서로 <b>아무 관련 없음</b> — 최악</td></tr>\n    </table>\n    </div>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ 순차적 vs 절차적</span>\n      데이터가 <b>직접 전달되면 순차적</b>, <b>순서만 있으면 절차적</b>\n    </div>"},{"id":"osi","ico":"🌐","t":"OSI 7계층","h":"<div class=\"lead\">위(7) → 아래(1)</div>\n    <div class=\"layer\"><span class=\"n\">7</span><span class=\"nm\">응용</span><span class=\"ds\">사용자 서비스 — HTTP, FTP, SMTP, DNS</span></div>\n    <div class=\"layer\"><span class=\"n\">6</span><span class=\"nm\">표현</span><span class=\"ds\">형식 변환·암호화·압축 — JPEG, MPEG</span></div>\n    <div class=\"layer\"><span class=\"n\">5</span><span class=\"nm\">세션</span><span class=\"ds\">세션 설정·유지·종료 — 대화 제어</span></div>\n    <div class=\"layer\"><span class=\"n\">4</span><span class=\"nm\">전송</span><span class=\"ds\">단말 간 신뢰성 전송 — TCP, UDP · 단위: <b>세그먼트</b></span></div>\n    <div class=\"layer\"><span class=\"n\">3</span><span class=\"nm\">네트워크</span><span class=\"ds\">경로 설정·라우팅 — IP, ICMP, ARP, <b>IPSec</b> · 단위: <b>패킷</b> · 장비: 라우터</span></div>\n    <div class=\"layer\"><span class=\"n\">2</span><span class=\"nm\">데이터 링크</span><span class=\"ds\">인접 노드 간 전송, 오류·흐름 제어 — 이더넷, PPP, <b>CRC</b> · 단위: <b>프레임</b> · 장비: 스위치·브리지</span></div>\n    <div class=\"layer\"><span class=\"n\">1</span><span class=\"nm\">물리</span><span class=\"ds\">비트를 전기 신호로 — 케이블, 허브, 리피터 · 단위: <b>비트</b></span></div>\n    <div class=\"box box-mem\">\n      <span class=\"box-title\">🎯 암기</span>\n      아래→위: <b>물 · 데 · 네 · 전 · 세 · 표 · 응</b><br>\n      계층별 장비: 1 허브/리피터 · 2 스위치/브리지 · 3 라우터 · 4↑ 게이트웨이\n    </div>\n    <h3>프로토콜 3요소</h3>\n    <ul>\n      <li><b>구문</b>(Syntax) — 데이터 <b>형식</b>·부호화·신호 레벨</li>\n      <li><b>의미</b>(Semantics) — 제어 정보의 <b>뜻</b></li>\n      <li><b>시간</b>(Timing) — <b>속도</b>·메시지 순서</li>\n    </ul>\n    <h3>주소 변환</h3>\n    <p><code>ARP</code>: IP → MAC &nbsp;&nbsp;|&nbsp;&nbsp; <code>RARP</code>: MAC → IP &nbsp;&nbsp;|&nbsp;&nbsp; <code>NAT</code>: 사설 IP ↔ 공인 IP</p>\n    <h3>라우팅</h3>\n    <ul>\n      <li><b>거리 벡터</b> — 벨만-포드, 이웃과만 교환 → <b>RIP</b> (홉 최대 15)</li>\n      <li><b>링크 스테이트</b> — 다익스트라, 전체 토폴로지 파악 → <b>OSPF</b> (대규모)</li>\n    </ul>\n    <h3>서브넷 계산 (30초 요령)</h3>\n    <ul>\n      <li>/26 → 마지막 옥텟 블록 <b>64</b> (0, 64, 128, 192)</li>\n      <li>/27 → 블록 <b>32</b> · /28 → 블록 <b>16</b> · /25 → 블록 <b>128</b></li>\n      <li>네트워크 주소 = 블록의 <b>첫</b> 주소 / 브로드캐스트 = 블록의 <b>마지막</b> 주소</li>\n      <li>할당 가능 호스트 = 2<sup>(32-prefix)</sup> <b>− 2</b></li>\n    </ul>"},{"id":"nf","ico":"🗂️","t":"정규화 단계","h":"<div class=\"tbl-wrap\">\n    <table>\n      <tr><th>단계</th><th>조건</th></tr>\n      <tr><td><b>1NF</b></td><td>모든 속성이 <b>원자값</b> (한 칸에 값 하나)</td></tr>\n      <tr><td><b>2NF</b></td><td><b>부분 함수 종속</b> 제거 (기본키 전체에 종속)</td></tr>\n      <tr><td><b>3NF</b></td><td><b>이행 함수 종속</b> 제거 (A→B→C 사슬 끊기)</td></tr>\n      <tr><td><b>BCNF</b></td><td>모든 <b>결정자가 후보키</b></td></tr>\n      <tr><td><b>4NF</b></td><td><b>다치 종속</b> 제거</td></tr>\n      <tr><td><b>5NF</b></td><td><b>조인 종속</b> 제거</td></tr>\n    </table>\n    </div>\n    <div class=\"box box-mem\"><span class=\"box-title\">🎯 암기</span><b>원 · 부 · 이 · 결 · 다 · 조</b></div>\n    <h3>이상(Anomaly) 3종</h3>\n    <ul>\n      <li><b>삽입 이상</b> — 원치 않는 값까지 넣어야 삽입 가능</li>\n      <li><b>삭제 이상</b> — 하나 지우면 다른 정보까지 연쇄 삭제</li>\n      <li><b>갱신 이상</b> — 일부만 수정되어 불일치 발생</li>\n    </ul>\n    <p><b>반정규화</b>: 성능 향상 위해 일부러 되돌리기 (중복 허용, 테이블 통합·분할)</p>\n    <h3>키</h3>\n    <ul>\n      <li><b>슈퍼키</b> — 유일성 O, 최소성 <b>X</b></li>\n      <li><b>후보키</b> — 유일성 O, 최소성 <b>O</b></li>\n      <li><b>기본키</b> — 후보키 중 대표 (NULL·중복 불가)</li>\n      <li><b>대체키</b> — 기본키로 못 뽑힌 나머지 후보키</li>\n      <li><b>외래키</b> — 다른 릴레이션의 기본키 참조</li>\n    </ul>\n    <h3>조인</h3>\n    <p><b>세타</b>(비교 연산자) ⊃ <b>동등</b>(= 조건, 중복 속성 남음) ⊃ <b>자연</b>(중복 속성 제거)</p>\n    <h3>차수 vs 카디널리티</h3>\n    <p><b>차수(Degree)</b> = 속성(<b>열</b>)의 수 &nbsp;|&nbsp; <b>카디널리티</b> = 튜플(<b>행</b>)의 수</p>"},{"id":"pattern","ico":"🏗️","t":"GoF 디자인 패턴 23","h":"<h3>생성 5 — \"객체를 어떻게 만들까\"</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><td><b>Singleton</b></td><td>인스턴스 <b>하나만</b>, 전역 접근점</td></tr>\n      <tr><td><b>Factory Method</b></td><td>생성을 <b>서브클래스에 위임</b></td></tr>\n      <tr><td><b>Abstract Factory</b></td><td>연관 객체들의 <b>조합(제품군)</b>, 별칭 <b>Kit</b></td></tr>\n      <tr><td><b>Builder</b></td><td>복잡한 객체의 <b>생성 과정과 표현 분리</b></td></tr>\n      <tr><td><b>Prototype</b></td><td>원형을 <b>복제(clone)</b></td></tr>\n    </table>\n    </div>\n    <h3>구조 7 — \"객체를 어떻게 조립할까\"</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><td><b>Adapter</b></td><td><b>호환 안 되는</b> 인터페이스 변환</td></tr>\n      <tr><td><b>Bridge</b></td><td>추상부·구현부 <b>분리</b>해 독립 확장 (다리)</td></tr>\n      <tr><td><b>Composite</b></td><td><b>트리</b> 구조, 부분-전체를 동일하게</td></tr>\n      <tr><td><b>Decorator</b></td><td>동적으로 <b>기능 추가</b> (장식)</td></tr>\n      <tr><td><b>Facade</b></td><td>복잡한 서브시스템에 <b>단순한 창구</b></td></tr>\n      <tr><td><b>Flyweight</b></td><td><b>공유</b>로 다수의 작은 객체 관리</td></tr>\n      <tr><td><b>Proxy</b></td><td><b>대리자</b>로 접근 제어</td></tr>\n    </table>\n    </div>\n    <h3>행위 11 — \"객체가 어떻게 협력할까\"</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><td><b>Observer</b></td><td>상태 변화를 <b>자동 통지</b> (1:N)</td></tr>\n      <tr><td><b>Strategy</b></td><td>알고리즘 군 <b>캡슐화·교환</b></td></tr>\n      <tr><td><b>Iterator</b></td><td>내부 구조 노출 없이 <b>순차 접근</b></td></tr>\n      <tr><td><b>Mediator</b></td><td><b>중재자</b>가 객체 간 통신 캡슐화</td></tr>\n      <tr><td><b>Command</b></td><td>요청을 <b>객체로</b> 캡슐화</td></tr>\n      <tr><td><b>State</b></td><td><b>상태</b>에 따라 행위 변경</td></tr>\n      <tr><td><b>Template Method</b></td><td>골격은 상위, <b>세부는 하위</b></td></tr>\n      <tr><td>Visitor / Interpreter / Memento / Chain of Responsibility</td><td>연산 분리 / 문법 해석 / 상태 저장·복원 / 처리자 사슬</td></tr>\n    </table>\n    </div>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ 헷갈림 주의</span>\n      <b>Adapter</b>(호환 안 되는 걸 나중에 맞춤) vs <b>Bridge</b>(처음부터 분리 설계)<br>\n      <b>Proxy</b>(대리·접근 제어) vs <b>Decorator</b>(기능 추가) vs <b>Facade</b>(단순 창구)\n    </div>\n    <h3>객체지향 설계 원칙 SOLID</h3>\n    <ul>\n      <li><b>S</b>RP 단일 책임 — 클래스는 하나의 책임만</li>\n      <li><b>O</b>CP 개방-폐쇄 — 확장엔 열고, 변경엔 닫고</li>\n      <li><b>L</b>SP 리스코프 치환 — 하위가 상위를 <b>대체 가능</b></li>\n      <li><b>I</b>SP 인터페이스 분리 — 안 쓰는 인터페이스에 의존 X</li>\n      <li><b>D</b>IP 의존 역전 — 구체 클래스 말고 <b>추상에 의존</b></li>\n    </ul>"},{"id":"sched","ico":"⏱️","t":"스케줄링 · 페이지 교체","h":"<h3>CPU 스케줄링</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>기법</th><th>선점?</th><th>핵심</th></tr>\n      <tr><td>FCFS</td><td>비선점</td><td>도착 순서대로</td></tr>\n      <tr><td>SJF</td><td>비선점</td><td>최단 작업 우선 — <b>기아 발생</b></td></tr>\n      <tr><td>HRN</td><td>비선점</td><td><b>(대기+서비스) ÷ 서비스</b> — 값 큰 것부터, 기아 보완</td></tr>\n      <tr><td>SRT</td><td><b>선점</b></td><td>SJF의 선점형 — 남은 시간 짧으면 뺏음</td></tr>\n      <tr><td>RR</td><td><b>선점</b></td><td>시간 할당량 순환 — 시분할</td></tr>\n    </table>\n    </div>\n    <div class=\"box box-tip\">\n      <span class=\"box-title\">💡 계산 공식</span>\n      HRN 우선순위 = (대기시간 + 서비스시간) ÷ <b>서비스시간</b><br>\n      예) 대기 20, 서비스 10 → (20+10)÷10 = <b>3</b>\n    </div>\n\n    <h3>페이지 교체</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><td><b>FIFO</b></td><td>먼저 들어온 것부터 — <b>벨레이디의 모순</b> 발생</td></tr>\n      <tr><td><b>LRU</b></td><td>가장 오래 <b>사용 안 된</b> 것 (시간)</td></tr>\n      <tr><td><b>LFU</b></td><td>사용 <b>빈도(횟수)</b>가 가장 적은 것</td></tr>\n      <tr><td><b>NUR</b></td><td>최근 미사용 — 참조·변형 비트 2개</td></tr>\n      <tr><td><b>OPT</b></td><td>앞으로 가장 오래 안 쓸 것 (이론상 최적)</td></tr>\n    </table>\n    </div>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ LRU vs LFU</span>\n      <b>시간</b>이면 LRU(Recently) · <b>횟수</b>면 LFU(Frequently)<br>\n      '벨레이디의 모순' 나오면 무조건 <b>FIFO</b>\n    </div>\n\n    <h3>지역성</h3>\n    <ul>\n      <li><b>시간</b>(Temporal) — 최근 참조한 곳을 다시 (루프, 카운터)</li>\n      <li><b>공간</b>(Spatial) — 참조한 곳 근처를 (배열 순회)</li>\n      <li><b>순차</b>(Sequential) — 순서대로 액세스</li>\n    </ul>\n    <h3>IPC 기법</h3>\n    <p>공유 메모리 · 소켓 · 세마포어 · 메시지 큐 · 파이프 → <b>공·소·세·메·파</b></p>"},{"id":"db","ico":"💾","t":"트랜잭션 · 무결성","h":"<h3>ACID</h3>\n    <ul>\n      <li><b>원자성</b>(Atomicity) — All or Nothing</li>\n      <li><b>일관성</b>(Consistency) — 수행 전후 일관된 상태</li>\n      <li><b>격리성</b>(Isolation, 고립성/독립성) — 수행 중 간섭 불가</li>\n      <li><b>지속성</b>(Durability) — 완료 결과는 영구 반영</li>\n    </ul>\n    <h3>연산</h3>\n    <p><b>COMMIT</b> — 성공 → 영구 반영 &nbsp;|&nbsp; <b>ROLLBACK</b> — 비정상 종료 → 시작 전 상태로</p>\n    <h3>무결성 제약조건</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>종류</th><th>대상</th><th>관련 키</th><th>개수</th></tr>\n      <tr><td><b>도메인</b></td><td>속성</td><td>없음</td><td>속성 수와 동일</td></tr>\n      <tr><td><b>개체</b></td><td>튜플</td><td><b>기본키</b></td><td>1개</td></tr>\n      <tr><td><b>참조</b></td><td>속성과 튜플</td><td><b>외래키</b></td><td>0개~여러 개</td></tr>\n    </table>\n    </div>\n    <h3>병행 제어</h3>\n    <ul>\n      <li><b>로킹</b> — Lock 설정 후 Unlock까지 독점 (상호배제)</li>\n      <li><b>낙관적 검증</b> — 일단 수행 후 <b>종료 시점에</b> 검증</li>\n      <li><b>2PC</b> — 분산 DB, 준비 + 커밋 <b>2단계</b></li>\n      <li><b>타임스탬프</b> / <b>MVCC</b>(다중 버전)</li>\n    </ul>\n    <h3>SQL 옵션·명령</h3>\n    <ul>\n      <li><code>CASCADE</code> — 참조 객체까지 <b>연쇄 삭제</b> / <code>RESTRICT</code> — 참조 있으면 <b>취소</b></li>\n      <li><b>트리거</b> — INSERT/UPDATE/DELETE 시 <b>자동</b> 실행되는 절차형 SQL</li>\n      <li><b>뷰 생성</b>: <code>CREATE VIEW 뷰명 AS SELECT ... WHERE ...;</code></li>\n      <li><b>삽입</b>: <code>INSERT INTO 테이블 VALUES(...);</code> · 문자는 <b>따옴표</b>, 숫자는 없이</li>\n      <li>DCL: <code>GRANT</code>(부여) / <code>REVOKE</code>(회수)</li>\n    </ul>\n    <h3>3계층 스키마</h3>\n    <p><b>외부</b>(사용자·개발자 뷰) → <b>개념</b>(조직 전체 논리 구조) → <b>내부</b>(물리적 저장)</p>"},{"id":"sec","ico":"🔐","t":"암호화 · 공격 기법","h":"<h3>암호화 알고리즘</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><th>구분</th><th>특징</th><th>알고리즘</th></tr>\n      <tr><td><b>대칭키</b></td><td>암·복호화 키 동일, <b>빠름</b>, 키 분배 어려움</td><td>DES(64bit블록·56bit키), <b>AES</b>(128bit블록·키 128/192/256), SEED·ARIA(국산), IDEA</td></tr>\n      <tr><td><b>비대칭키</b></td><td>공개키+개인키, <b>느림</b>, 키 분배 해결</td><td><b>RSA</b>(소인수분해), ECC(타원곡선), 디피-헬만(키 교환)</td></tr>\n      <tr><td><b>해시</b></td><td><b>단방향</b>, 복호화 불가</td><td>SHA-256, <b>MD5</b>(128bit, RFC 1321, 취약)</td></tr>\n    </table>\n    </div>\n    <h3>DoS 계열</h3>\n    <div class=\"tbl-wrap\">\n    <table>\n      <tr><td><b>SYN Flooding</b></td><td>SYN만 보내고 ACK 안 보냄 → 연결 대기 고갈</td></tr>\n      <tr><td><b>Land Attack</b></td><td>출발지 = 목적지 IP 동일 → 자기 응답 무한 루프</td></tr>\n      <tr><td><b>Smurf</b></td><td>출발지를 피해자로 위조 + <b>브로드캐스트</b> ICMP</td></tr>\n      <tr><td><b>Ping of Death</b></td><td>비정상적으로 <b>큰 ICMP</b> 패킷</td></tr>\n      <tr><td><b>Tear Drop</b></td><td>분할 패킷 <b>오프셋 조작</b> → 재조립 오류</td></tr>\n      <tr><td><b>UDP Flooding</b></td><td>대량 UDP로 대역폭 고갈</td></tr>\n    </table>\n    </div>\n    <h3>공격 기법 구분</h3>\n    <ul>\n      <li><b>스니핑</b>(엿보기·수동) vs <b>스푸핑</b>(위장·능동) vs <b>세션 하이재킹</b>(세션 탈취)</li>\n      <li><b>XSS</b> — 악성 <b>스크립트</b> 삽입, 피해자는 <b>브라우저</b></li>\n      <li><b>SQL Injection</b> — 악성 <b>SQL</b> 삽입, 피해자는 <b>DB</b></li>\n      <li><b>사전 공격</b>(단어 목록) vs <b>무차별 대입</b>(모든 조합)</li>\n      <li><b>APT</b> — 명확한 표적 + 지속적 (침투→검색→수집→유출)</li>\n      <li><b>제로데이</b> — 패치 <b>공표 전</b> 공격 → 대처 불가</li>\n      <li><b>레이스 컨디션</b> — <b>심볼릭 링크</b>로 검사·사용 시점 틈(TOCTOU) 공격</li>\n    </ul>\n    <h3>접근 통제</h3>\n    <p><b>DAC</b>(소유자 재량·신분) · <b>MAC</b>(보안 등급 강제) · <b>RBAC</b>(역할 기반)</p>\n    <h3>인증·보안 기술</h3>\n    <ul>\n      <li><b>SSO</b> — 한 번 로그인으로 여러 시스템 (기반: <b>커버로스</b>)</li>\n      <li><b>OAuth</b> — 비밀번호 없이 <b>토큰으로 권한 위임</b></li>\n      <li><b>OTP</b> — 일회용 비밀번호, 단방향 해시 기반</li>\n      <li><b>IPSec</b> — 3계층 VPN · <b>AH</b>(무결성+인증) / <b>ESP</b>(기밀성+무결성+인증)</li>\n      <li>정보보안 3요소: <b>기밀성 · 무결성 · 가용성</b></li>\n    </ul>"},{"id":"test","ico":"🧪","t":"테스트","h":"<h3>커버리지 강도</h3>\n    <div class=\"order\">\n      <span>구문</span><span class=\"arw\">‹</span>\n      <span>결정(분기)</span><span class=\"arw\">‹</span>\n      <span>조건</span><span class=\"arw\">‹</span>\n      <span>조건/결정</span><span class=\"arw\">‹</span>\n      <span>MC/DC</span><span class=\"arw\">‹</span>\n      <span>다중 조건</span>\n    </div>\n    <ul>\n      <li><b>구문</b>(Statement) — 모든 <b>명령문</b> 1회 이상</li>\n      <li><b>결정/분기</b>(Decision/Branch) — 각 <b>결정문</b> 참/거짓 1회씩</li>\n      <li><b>조건</b>(Condition) — 결정문 <b>내부 개별 조건식</b> 참/거짓</li>\n      <li><b>MC/DC</b> — 각 조건이 <b>독립적으로</b> 결과에 영향 (변경 조건/결정)</li>\n      <li><b>다중 조건</b> — <b>모든 조합</b>, 가장 강력</li>\n    </ul>\n    <h3>블랙박스 vs 화이트박스</h3>\n    <ul>\n      <li><b>블랙박스</b>(명세 기반) — 동등 분할, 경계값 분석, 원인-효과 그래프, 오류 예측, 비교 검사</li>\n      <li><b>화이트박스</b>(구조 기반) — 구문·조건·분기 커버리지, 기초 경로 검사</li>\n    </ul>\n    <h3>정적 vs 동적</h3>\n    <p><b>정적</b>(실행 X) — 코드 검토, 인스펙션, 워크스루, 정적 분석 도구(pmd, cppcheck)<br>\n    <b>동적</b>(실행 O) — 블랙/화이트박스 테스트, Avalanche, Valgrind</p>\n    <h3>테스트 오라클</h3>\n    <p><b>참</b>(전수 기댓값) · <b>샘플링</b>(일부만) · <b>휴리스틱</b>(샘플링 개선, 나머지는 추정) · <b>일관성 검사</b>(변경 전후 결과 동일 확인)</p>\n    <h3>테스트 원칙 중 자주 나오는 것</h3>\n    <ul>\n      <li><b>살충제 패러독스</b> — 같은 케이스 반복하면 새 결함 못 찾음 → 케이스 주기적 개선</li>\n      <li><b>결함 집중</b>(파레토) — 결함 80%는 모듈 20%에 몰림</li>\n      <li><b>오류-부재의 궤변</b> — 결함 없어도 요구를 못 채우면 무용</li>\n    </ul>\n    <h3>통합 테스트</h3>\n    <p><b>하향식</b> — <b>스텁</b>(Stub) 필요 &nbsp;|&nbsp; <b>상향식</b> — <b>드라이버</b>(Driver) 필요</p>"},{"id":"etc","ico":"📎","t":"기타 암기","h":"<h3>UI 설계 원칙</h3>\n    <p><b>직관성</b>(쉽게 이해) · <b>유효성</b>(목적을 정확·완벽히 달성) · <b>학습성</b>(쉽게 익힘) · <b>유연성</b>(요구 수용, 실수 최소화) → <b>직·유·학·유</b></p>\n    <h3>개발 방법론</h3>\n    <ul>\n      <li><b>폭포수</b> — 순차 진행, 회귀 어려움</li>\n      <li><b>프로토타이핑</b> — 시제품으로 요구 구체화</li>\n      <li><b>나선형</b> — 계획→위험분석→개발→평가 반복 (<b>위험 관리</b>)</li>\n      <li><b>애자일</b> — 짧은 반복 + 변화 수용 (스크럼, XP, 칸반, 린)</li>\n    </ul>\n    <h3>비용 산정</h3>\n    <ul>\n      <li><b>Man Month</b> = 총 LoC ÷ 1인당 월 생산성</li>\n      <li><b>개발 기간</b> = Man Month ÷ 투입 인원</li>\n      <li><b>COCOMO</b>(보헴) — 조직형 / 반분리형 / 임베디드형</li>\n    </ul>\n    <div class=\"box box-warn\">\n      <span class=\"box-title\">⚠️ 계산 문제 필독</span>\n      \"Man Month를 구하시오\"와 \"개발 기간을 구하시오\"는 <b>답이 다릅니다</b>. 인원으로 나눴는지 꼭 확인!\n    </div>\n    <h3>일정 관리</h3>\n    <p><b>CPM</b> — 노드·액티비티로 <b>임계 경로</b> 계산 &nbsp;|&nbsp; <b>PERT</b> — <b>3점 추정</b>(비관·중간·낙관)<br>\n    PERT 기대치 = (비관치 + 4×중간치 + 낙관치) ÷ 6</p>\n    <h3>형상 관리</h3>\n    <p>절차: <b>식별 → 통제 → 감사 → 기록</b> &nbsp;|&nbsp; 도구: CVS → SVN → <b>Git</b>(분산)</p>\n    <h3>럼바우 모델링</h3>\n    <p><b>객체</b>(객체 다이어그램) → <b>동적</b>(상태 다이어그램) → <b>기능</b>(DFD)</p>\n    <h3>UML 관계</h3>\n    <p><b>연관</b>(관련) · <b>집합</b>(포함, 빈 마름모) · <b>합성</b>(강한 포함, 채운 마름모) · <b>일반화</b>(is-a, 빈 화살표) · <b>의존</b>(점선 화살표) · <b>실체화</b>(인터페이스 구현)</p>\n    <h3>성능 지표</h3>\n    <p><b>처리량</b>(단위 시간당 트랜잭션) · <b>응답 시간</b>(입력→응답 <b>시작</b>) · <b>반환 시간</b>(입력→출력 <b>완료</b>) · <b>자원 사용률</b></p>\n    <h3>복구 목표</h3>\n    <p><b>RTO</b> — 얼마나 <b>빨리</b> 복구하나(시간) &nbsp;|&nbsp; <b>RPO</b> — 얼마나 <b>과거 데이터까지</b> 살리나(시점)</p>\n    <h3>유닉스 명령어</h3>\n    <p><code>pwd</code>(현재 경로) · <code>ls</code>(목록) · <code>cd</code>(이동) · <code>cp</code>(복사) · <code>mv</code>(이동/이름변경) · <code>rm</code>(삭제) · <code>chmod</code>(권한)</p>\n    <p>권한 숫자: 읽기 <b>4</b> + 쓰기 <b>2</b> + 실행 <b>1</b> → <code>chmod 755</code> = 소유자 rwx, 그룹·기타 r-x</p>"}];
let noteSel=NOTE[0].id;
function renderNote(){
  const v=$('#view');
  const cur=NOTE.find(x=>x.id===noteSel)||NOTE[0];
  const items=NOTE.map(s=>'<button class="dd-item'+(noteSel===s.id?' on':'')+'" data-note="'+s.id+'"><span>'+(noteSel===s.id?'✓ ':'')+s.ico+' '+esc(s.t)+'</span></button>').join('');
  v.innerHTML='<div class="dropdown"><button class="dd-btn" id="noteBtn">'+
      '<span class="dd-label">주제</span><span class="dd-value">'+cur.ico+' '+esc(cur.t)+'</span><span class="dd-caret">▾</span></button>'+
      '<div class="dd-menu" id="noteMenu">'+items+'</div></div>'+
    '<div class="card notewrap"><h2 class="note-h2">'+cur.ico+' '+esc(cur.t)+'</h2>'+cur.h+
    '<div class="note-nav">'+
      (NOTE.findIndex(x=>x.id===noteSel)>0?'<button class="ghost" id="notePrev">← 이전</button>':'<span></span>')+
      (NOTE.findIndex(x=>x.id===noteSel)<NOTE.length-1?'<button class="ghost" id="noteNext">다음 →</button>':'<span></span>')+
    '</div></div>';
  const btn=$('#noteBtn'),menu=$('#noteMenu');
  btn.onclick=e=>{e.stopPropagation();menu.classList.toggle('open');};
  menu.querySelectorAll('[data-note]').forEach(it=>it.onclick=e=>{
    e.stopPropagation();noteSel=it.dataset.note;menu.classList.remove('open');renderNote();window.scrollTo({top:0,behavior:'smooth'});
  });
  if(!window.__ddCloseBound){window.__ddCloseBound=true;
    document.addEventListener('click',()=>document.querySelectorAll('.dd-menu.open').forEach(x=>x.classList.remove('open')));}
  const i=NOTE.findIndex(x=>x.id===noteSel);
  const pv=$('#notePrev');if(pv)pv.onclick=()=>{noteSel=NOTE[i-1].id;renderNote();window.scrollTo({top:0,behavior:'smooth'});};
  const nx=$('#noteNext');if(nx)nx.onclick=()=>{noteSel=NOTE[i+1].id;renderNote();window.scrollTo({top:0,behavior:'smooth'});};
}
function renderQuiz(onlyWrong){

      <div class="btn-row" style="justify-content:center;">

  const q=DB.questions.find(x=>x.id===session.ids[session.idx]);

      <button class="chip ${session.mode==='random'?'on':''}" id="mRandom" title="틀린 문제와 안 푼 문제가 더 자주 나와요">랜덤 · 오답 우선</button>
      <button class="chip ${session.mode==='order'?'on':''}" id="mOrder">순서대로</button>
      <span class="progress">${session.idx+1} / ${session.ids.length} · 맞힌 문제 ${session.ok}</span>
    </div>
    <div class="card" style="position:relative;">
      <button class="starbtn ${q.star?'on':''}" id="starBtn" title="따로 풀 문제로 체크 (오답 노트 > ⭐ 체크에서 모아 풀기)">${q.star?'★':'☆'}</button>
      ${q.tag?'<span class="tag">'+esc(q.tag)+'</span>':''}

      <div class="blanks">`;
  q.b.forEach((_,i)=>{

  // 보기 칩 클릭 → 현재 입력칸에 채우기

    (next||t).focus();
  });
  $('#mRandom').onclick=()=>{startSession('random',onlyWrong);render();};
  $('#mOrder').onclick=()=>{startSession('order',onlyWrong);render();};
  if(onlyWrong)bindWrongFilter(v);else bindCatBar(v,()=>{session=null;render();});
  $('#starBtn').onclick=async()=>{
    q.star=!q.star;
    await saveDB();
    const b=$('#starBtn');b.classList.toggle('on',q.star);b.textContent=q.star?'★':'☆';
    toast(q.star?'⭐ 체크했어요 — 오답 노트의 [⭐ 체크]에서 모아 풀 수 있어요.':'체크를 해제했어요.');
  };

  const inputs=[...v.querySelectorAll('.blank-row input')];
  if(session.submitted){showResult(q,session.lastResult);}
  else{
    inputs[0].focus();
    inputs.forEach(inp=>inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'&&!e.shiftKey){
        if(e.isComposing||e.keyCode===229)return; // 한글 조합 중 Enter는 무시(마지막 글자 누락 방지)
        e.preventDefault();
        const i=+inp.dataset.i;
        if(i<inputs.length-1&&inputs.slice(i+1).some(x=>!x.value.trim())){
          (inputs.slice(i+1).find(x=>!x.value.trim())).focus();
        }else submit();
      }
    }));
    $('#submitBtn').onclick=submit;
    $('#giveupBtn').onclick=()=>submit(true);
  }

  async function submit(giveup){
    if(document.activeElement&&document.activeElement.blur)document.activeElement.blur(); // 조합 중 글자 확정
    const vals=inputs.map(x=>x.value); // 정답 보기여도 입력한 값은 그대로 채점
    const res=grade(q,vals);
    const allOk=res.okCount===q.b.length;
    session.submitted=true;
    session.lastResult={res,giveup:!!giveup};
    if(allOk)session.ok++;
    const s=stat(q.id);s.att++;if(allOk)s.ok++;s.lastOk=allOk;s.streak=allOk?(s.streak||0)+1:0;
    await saveDB();updateHeader();
    inputs.forEach((inp,i)=>{inp.disabled=true;inp.classList.add(res.per[i].ok?'ok':'no');});
    const br=$('.btn-row'),h=$('.hint');if(br)br.remove();if(h)h.remove();
    showResult(q,session.lastResult);
  }

  function showResult(q,{res,giveup}){
    const allOk=res.okCount===q.b.length;
    const multi=q.b.length>1;
    let verdict,cls;
    if(allOk){verdict='정답! ⭕';cls='ok';}
    else if(res.okCount>0){verdict=`부분 정답 ${res.okCount}/${q.b.length}`;cls='part';}
    else{verdict=giveup?'정답 확인':'오답 ❌';cls='no';}
    let html=`<div class="result"><div class="verdict ${cls}">${verdict}</div>`;
    q.b.forEach((answers,i)=>{
      const p=res.per[i];
      html+=`<div class="ans-line">${multi?'<span class="lbl">'+(CIRC[i]||i+1)+'</span>':''}`;
      if(p&&p.ok){html+=`<span class="ok">${esc(p.user)}</span> ✓`;}
      else{
        if(p&&p.user.trim())html+=`<span class="no">${esc(p.user)}</span> → `;
        html+=`<span class="real">${answers.map(esc).join(' 또는 ')}</span>`;
      }
      html+=`</div>`;
    });
    html+=optionNotes(q);
    if(q.ex)html+=`<div class="explain"><span class="ex-lbl">풀이</span>${esc(q.ex)}</div>`;
    html+=refNotes(q);
    html+=`<div class="btn-row" style="margin-top:14px;"><button class="primary" id="nextBtn">다음 문제 →</button></div></div>`;
    $('#resultBox').innerHTML=html;
    const nb=$('#nextBtn');
    nb.focus();
    nb.onclick=()=>{session.idx++;session.submitted=false;session.lastResult=null;render();};
  }
}

/* ----- 관리 화면 ----- */
function renderManage(){
  const v=$('#view');
  const total=DB.questions.length;
  let html=`<div class="card form-card" id="formCard">
    <label>${editingId?'문제 수정':'새 문제 추가'}</label>
    <textarea id="fQ" placeholder="문제 내용을 입력하세요. 괄호 문제는 ( ① ) 처럼 표시하면 좋아요."></textarea>
    <label>정답 (빈칸별로 입력 · 인정되는 답이 여러 개면 쉼표로 구분: 예) 블록체인, Blockchain)</label>
    <div id="blankEdits"></div>
    <button class="add-blank" id="addBlank">+ 빈칸 추가 (①②③…)</button>
    <div class="check-row"><input type="checkbox" id="fUnordered"><label for="fUnordered" style="margin:0;font-weight:500;">여러 빈칸의 순서 상관없음 (예: "3가지를 쓰시오")</label></div>
    <label>풀이 / 해설 (선택)</label>
    <textarea id="fEx" placeholder="채점 후에 함께 보여줄 해설을 입력하세요." style="min-height:70px;"></textarea>
    <label>출처 태그 (선택)</label>
    <input type="text" id="fTag" placeholder="예: [실기]22년3회">
    <div class="btn-row" style="margin-top:16px;">
      <button class="primary" id="saveQ">${editingId?'수정 저장':'문제 추가'}</button>
      ${editingId?'<button class="ghost" id="cancelEdit">취소</button>':''}
    </div>
  </div>
  <div class="statline" style="margin-top:20px;">전체 <b>${total}</b>문제${wrongIds().length?` · 오답 <b>${wrongIds().length}</b>문제`:''}</div>
  `+catBar()+`
  <div class="qlist">`;
  DB.questions.forEach((q,idx)=>{
    if(catFilter!=='전체'&&q.tag!==catFilter)return;
    const s=DB.stats[q.id];
    html+=`<div class="qitem" data-id="${q.id}">
      <div class="preview">${idx+1}. ${q.star?'<span style="color:#E8A800;">★</span> ':''}${esc(q.q)}</div>
      <div class="meta">
        <span class="ansview">정답: ${q.b.map(a=>a[0]).map(esc).join(' / ')}</span>
        ${q.tag?'<span>'+esc(q.tag)+'</span>':''}
        ${s&&s.att?`<span>${s.att}회 풀이 · ${s.ok}회 정답${s.lastOk===false?' · <b style="color:var(--wrong)">최근 오답</b>':''}</span>`:'<span>아직 안 푼 문제</span>'}
      </div>
      <div class="acts"><button class="edit">수정</button><button class="del">삭제</button></div>
    </div>`;
  });
  html+=`</div><div class="btn-row" style="margin-top:20px;">
    <button class="ghost" id="exportBtn">💾 백업 내보내기</button>
    <button class="ghost" id="importBtn">📂 백업 가져오기</button>
    <button class="danger-ghost" id="resetStats">풀이 기록 초기화</button>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none">
  </div>
  <div class="hint" style="margin-top:8px;">브라우저를 바꾸거나 캐시를 지우면 기록이 사라질 수 있어요. 주기적으로 백업해 두세요.</div>`;
  v.innerHTML=html;

  // 빈칸 편집 UI
  const be=$('#blankEdits');
  function addBlankRow(val=''){
    const n=be.children.length;
    const row=document.createElement('div');row.className='blank-edit';
    row.innerHTML=`<span class="num">${CIRC[n]||n+1}</span><input type="text" placeholder="정답 (쉼표로 여러 개)" value="${esc(val)}"><button class="rm" title="삭제">✕</button>`;
    row.querySelector('.rm').onclick=()=>{if(be.children.length>1){row.remove();renum();}};
    be.appendChild(row);
  }
  function renum(){[...be.children].forEach((r,i)=>r.querySelector('.num').textContent=CIRC[i]||i+1);}
  $('#addBlank').onclick=()=>addBlankRow();

  // 수정 모드 값 채우기
  if(editingId){
    const q=DB.questions.find(x=>x.id===editingId);
    if(q){
      $('#fQ').value=q.q;$('#fTag').value=q.tag||'';$('#fEx').value=q.ex||'';$('#fUnordered').checked=!!q.unordered;
      q.b.forEach(a=>addBlankRow(a.join(', ')));
      $('#formCard').scrollIntoView({behavior:'smooth'});
    }else{editingId=null;addBlankRow();}
    const c=$('#cancelEdit');if(c)c.onclick=()=>{editingId=null;renderManage();};
  }else addBlankRow();

  $('#saveQ').onclick=async()=>{
    const qt=$('#fQ').value.trim();
    const blanks=[...be.querySelectorAll('input')].map(i=>i.value.split(',').map(s=>s.trim()).filter(Boolean)).filter(a=>a.length);
    if(!qt){toast('문제 내용을 입력해 주세요.');return;}
    if(!blanks.length){toast('정답을 1개 이상 입력해 주세요.');return;}
    const data={q:qt,b:blanks,unordered:$('#fUnordered').checked&&blanks.length>1,tag:$('#fTag').value.trim(),ex:$('#fEx').value.trim()};
    if(editingId){
      const q=DB.questions.find(x=>x.id===editingId);
      Object.assign(q,data);editingId=null;
      await saveDB();toast('문제를 수정했어요.');
    }else{
      DB.questions.push({id:uid(),...data});
      await saveDB();toast('문제를 추가했어요.');
    }
    session=null;renderManage();updateHeader();
  };

  v.querySelectorAll('.qitem').forEach(el=>{
    const id=el.dataset.id;
    el.querySelector('.edit').onclick=()=>{editingId=id;renderManage();};
    el.querySelector('.del').onclick=async()=>{
      if(!confirm('이 문제를 삭제할까요?'))return;
      DB.questions=DB.questions.filter(x=>x.id!==id);delete DB.stats[id];
      if(editingId===id)editingId=null;
      session=null;await saveDB();renderManage();updateHeader();toast('삭제했어요.');
    };
  });
  bindCatBar(v,()=>renderManage());
  $('#exportBtn').onclick=()=>{
    const payload={v:1,exported:new Date().toISOString(),questions:DB.questions,stats:DB.stats};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='암기노트_백업_'+new Date().toISOString().slice(0,10)+'.json';
    a.click();URL.revokeObjectURL(a.href);
    toast('백업 파일을 내려받았어요.');
  };
  $('#importBtn').onclick=()=>$('#importFile').click();
  $('#importFile').onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    try{
      const data=JSON.parse(await file.text());
      if(!data||!Array.isArray(data.questions))throw new Error('bad');
      const map=new Map(DB.questions.map(x=>[norm(x.q),x]));
      let added=0,updated=0;
      data.questions.forEach(iq=>{
        if(!iq||!iq.q||!Array.isArray(iq.b))return;
        const key=norm(iq.q);
        const exist=map.get(key);
        const st=data.stats&&iq.id?data.stats[iq.id]:null;
        if(!exist){
          const nq={id:iq.id||uid(),q:iq.q,b:iq.b,unordered:!!iq.unordered,tag:iq.tag||'',ex:iq.ex||'',star:!!iq.star};
          DB.questions.push(nq);map.set(key,nq);
          if(st)DB.stats[nq.id]=st;
          added++;
        }else{
          exist.b=iq.b;if(iq.ex)exist.ex=iq.ex;if(iq.tag)exist.tag=iq.tag;
          if(iq.star)exist.star=true; // ⭐ 체크 유지
          if(st)DB.stats[exist.id]=st; // 백업 시점 기록으로 복원
          updated++;
        }
      });
      await saveDB();session=null;renderManage();updateHeader();
      toast('가져오기 완료 · 추가 '+added+'문제, 갱신 '+updated+'문제');
    }catch(err){toast('가져오기에 실패했어요. 올바른 백업 파일인지 확인해 주세요.');}
    e.target.value='';
  };
  $('#resetStats').onclick=async()=>{
    if(!confirm('모든 풀이 기록(정답/오답)을 초기화할까요? 문제는 그대로 남아요.'))return;
    DB.stats={};session=null;await saveDB();renderManage();updateHeader();toast('기록을 초기화했어요.');
  };
}

/* ---------- 시작 ---------- */
$('#tab-quiz').onclick=()=>{session=null;setTab('quiz');};
$('#tab-wrong').onclick=()=>{session=null;setTab('wrong');};
$('#tab-manage').onclick=()=>setTab('manage');
$('#tab-note').onclick=()=>setTab('note');
(async()=>{
  try{
    detectStorage();
    await loadDB();
  }catch(e){
    // 어떤 오류가 나도 기본 문제로 시작
    if(!DB||!Array.isArray(DB.questions)||!DB.questions.length){
      DB={questions:SEED.map(s=>({id:uid()+Math.random().toString(36).slice(2,4),q:s.q,b:s.b,unordered:!!s.unordered,tag:s.tag||'',ex:s.ex||''})),stats:{}};
    }
  }
  render();
  if(storageMode==='memory')toast('이 환경에서는 기록이 저장되지 않아요 (창을 닫으면 초기화)');
})();
</script>
