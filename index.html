<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실기 암기 노트</title>
<style>
  :root{
    --paper:#F7F6F1;
    --card:#FFFFFF;
    --ink:#232A35;
    --ink-soft:#6B7280;
    --line:#E5E2D9;
    --correct:#1E7A4C;
    --correct-bg:#EAF5EE;
    --wrong:#C4373C;
    --wrong-bg:#FBEEEE;
    --accent:#2B4A8B;
    --accent-soft:#EEF2FA;
    --hl:#FFE9A8;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard','Noto Sans KR','Malgun Gothic',sans-serif;
    line-height:1.6;
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 80px;}
  header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  h1{font-size:1.35rem;letter-spacing:-0.02em;}
  h1 .mark{background:linear-gradient(transparent 55%,var(--hl) 55%);padding:0 2px;}
  .sub{font-size:.8rem;color:var(--ink-soft);}
  nav{display:flex;gap:6px;margin-bottom:18px;border-bottom:2px solid var(--line);padding-bottom:0;}
  nav button{
    background:none;border:none;font:inherit;font-size:.92rem;font-weight:600;
    color:var(--ink-soft);padding:8px 12px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;
  }
  nav button.on{color:var(--ink);border-bottom-color:var(--ink);}
  nav button .badge{
    display:inline-block;min-width:20px;text-align:center;font-size:.72rem;font-weight:700;
    background:var(--wrong);color:#fff;border-radius:10px;padding:1px 6px;margin-left:4px;vertical-align:1px;
  }
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:0 1px 3px rgba(35,42,53,.05);}
  .starbtn{position:absolute;top:12px;right:14px;background:none;border:none;font-size:1.45rem;line-height:1;cursor:pointer;color:#C9C4B4;padding:4px;}
  .dropdown{position:relative;display:inline-block;margin-bottom:12px;}
  .dd-btn{display:flex;align-items:center;gap:9px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:9px 15px;cursor:pointer;font-family:inherit;font-size:.92rem;box-shadow:0 1px 2px rgba(35,42,53,.05);transition:border-color .15s;}
  .dd-btn:hover{border-color:var(--accent);}
  .dd-label{font-size:.76rem;font-weight:700;color:var(--ink-soft);letter-spacing:.5px;}
  .dd-value{font-weight:700;color:var(--ink);}
  .dd-caret{color:var(--ink-soft);font-size:.8rem;}
  .dd-menu{position:absolute;top:calc(100% + 6px);left:0;min-width:235px;max-height:330px;overflow:auto;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 10px 28px rgba(35,42,53,.14);padding:6px;display:none;z-index:40;}
  .dd-menu.open{display:block;animation:pop .16s ease;}
  .dd-item{display:flex;justify-content:space-between;align-items:center;gap:14px;width:100%;text-align:left;background:none;border:none;border-radius:9px;padding:10px 12px;cursor:pointer;font-family:inherit;font-size:.92rem;color:var(--ink);}
  .dd-item:hover{background:var(--accent-soft);}
  .dd-item.on{background:var(--accent-soft);color:var(--accent);font-weight:700;}
  .dd-count{font-size:.76rem;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:1px 9px;flex-shrink:0;}
  .dd-item.on .dd-count{color:var(--accent);border-color:var(--accent-soft);}
  .starbtn.on{color:#E8A800;}
  .starbtn:hover{transform:scale(1.15);}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;}
  .chip{
    border:1px solid var(--line);background:var(--card);border-radius:999px;
    font:inherit;font-size:.82rem;padding:5px 12px;cursor:pointer;color:var(--ink-soft);
  }
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .progress{margin-left:auto;font-size:.82rem;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
  .tag{
    display:inline-block;font-size:.72rem;font-weight:700;color:var(--wrong);
    background:var(--wrong-bg);border-radius:6px;padding:2px 8px;margin-bottom:10px;
  }
  .qtext{white-space:pre-wrap;font-size:.98rem;margin-bottom:18px;}
  .choices{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:10px 0 2px;white-space:normal;}
  .opt-label{font-size:.72rem;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:6px;padding:3px 8px;letter-spacing:.5px;}
  .hintbox{margin:0 0 16px;}
  .hint-toggle{background:var(--card);border:1.5px dashed var(--line);border-radius:999px;padding:5px 13px;font-size:.8rem;font-family:inherit;color:var(--ink-soft);cursor:pointer;transition:all .12s;}
  .hint-toggle:hover{border-color:var(--accent);color:var(--accent);}
  .hint-toggle.on{border-style:solid;border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .hint-choices{margin-top:9px;}
  .hint-note{font-size:.73rem;color:var(--ink-soft);margin-top:7px;}
  .opt{background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:4px 13px;font-size:.9rem;font-family:inherit;color:var(--ink);box-shadow:0 1px 1px rgba(0,0,0,.04);cursor:pointer;transition:all .12s;}
  .opt:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .opt:active{transform:scale(.94);}
  .opt.used{background:var(--correct-bg);border-color:var(--correct);color:var(--correct);}
  .blanks{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .blank-row{display:flex;align-items:center;gap:8px;}
  .blank-row .num{font-size:.9rem;color:var(--accent);font-weight:700;flex-shrink:0;width:24px;text-align:center;}
  .blank-row input{
    flex:1;font:inherit;font-size:.95rem;padding:10px 12px;border:1.5px solid var(--line);
    border-radius:10px;background:#FCFBF8;outline:none;min-width:0;
  }
  .blank-row input:focus{border-color:var(--accent);background:#fff;}
  .blank-row input.ok{border-color:var(--correct);background:var(--correct-bg);}
  .blank-row input.no{border-color:var(--wrong);background:var(--wrong-bg);}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
  button.primary,button.ghost,button.danger-ghost{
    font:inherit;font-size:.9rem;font-weight:600;border-radius:10px;padding:10px 18px;cursor:pointer;border:1.5px solid transparent;
  }
  button.primary{background:var(--ink);color:#fff;}
  button.primary:active{transform:translateY(1px);}
  button.ghost{background:none;border-color:var(--line);color:var(--ink-soft);}
  button.danger-ghost{background:none;border-color:var(--line);color:var(--wrong);}
  .result{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line);animation:pop .25s ease;}
  .refcard{margin-top:10px;border:1px solid var(--line);border-radius:10px;background:#FFFDF5;overflow:hidden;}
  .refcard summary{padding:10px 14px;cursor:pointer;font-size:.86rem;font-weight:700;color:var(--ink-soft);list-style:none;user-select:none;}
  .refcard summary::-webkit-details-marker{display:none;}
  .refcard summary::after{content:'펼치기 ▾';float:right;font-weight:500;font-size:.76rem;color:var(--accent);}
  .refcard[open] summary::after{content:'접기 ▴';}
  .refcard[open] summary{border-bottom:1px dashed var(--line);color:var(--ink);}
  .refbody{padding:11px 14px;font-size:.86rem;line-height:1.65;white-space:pre-wrap;color:var(--ink);}
  .opt-notes{background:#FBFAF6;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:12px;font-size:.88rem;line-height:1.55;}
  .opt-notes .ex-lbl{display:inline-block;margin-bottom:6px;}
  .opt-note{display:flex;gap:7px;align-items:baseline;color:var(--ink-soft);padding:2px 0;}
  .opt-note b{color:var(--ink);font-weight:600;flex-shrink:0;}
  .opt-note .mark{width:14px;text-align:center;flex-shrink:0;color:#C9C4B4;}
  .opt-note.ans{color:var(--ink);}
  .opt-note.ans .mark{color:var(--correct);font-weight:700;}
  .opt-note.ans b{color:var(--correct);}
  @keyframes pop{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .verdict{font-weight:800;font-size:1.02rem;margin-bottom:8px;}
  .verdict.ok{color:var(--correct);}
  .verdict.no{color:var(--wrong);}
  .verdict.part{color:#B07B10;}
  .ans-line{font-size:.9rem;margin-bottom:4px;}
  .ans-line .lbl{color:var(--ink-soft);margin-right:6px;}
  .ans-line .ok{color:var(--correct);font-weight:700;}
  .ans-line .no{color:var(--wrong);font-weight:700;text-decoration:line-through;text-decoration-thickness:1.5px;}
  .ans-line .real{color:var(--correct);font-weight:700;}
  .explain{
    margin-top:12px;background:var(--accent-soft);border-radius:10px;padding:12px 14px;
    font-size:.88rem;white-space:pre-wrap;line-height:1.65;
  }
  .explain .ex-lbl{display:block;width:fit-content;font-weight:800;color:var(--accent);margin-bottom:6px;font-size:.76rem;background:#fff;border-radius:6px;padding:1px 8px;}
  .hint{font-size:.78rem;color:var(--ink-soft);margin-top:10px;}
  .empty{padding:40px 10px;text-align:center;color:var(--ink-soft);font-size:.92rem;}
  .done-card{text-align:center;padding:40px 20px;}
  .done-card .big{font-size:2rem;font-weight:800;margin-bottom:6px;}
  .done-card .big .c{color:var(--correct);}
  /* 관리 */
  .qlist{display:flex;flex-direction:column;gap:10px;}
  .qitem{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;}
  .qitem .preview{font-size:.88rem;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap;}
  .qitem .meta{font-size:.76rem;color:var(--ink-soft);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .qitem .meta .ansview{color:var(--correct);font-weight:600;}
  .qitem .acts{display:flex;gap:6px;margin-top:8px;}
  .qitem .acts button{font:inherit;font-size:.78rem;padding:4px 10px;border-radius:8px;border:1px solid var(--line);background:none;cursor:pointer;color:var(--ink-soft);}
  .qitem .acts button.del{color:var(--wrong);}
  .form-card label{display:block;font-size:.82rem;font-weight:700;margin:14px 0 6px;color:var(--ink);}
  .form-card label:first-child{margin-top:0;}
  .form-card textarea,.form-card input[type=text]{
    width:100%;font:inherit;font-size:.92rem;padding:10px 12px;border:1.5px solid var(--line);
    border-radius:10px;background:#FCFBF8;outline:none;
  }
  .form-card textarea{min-height:110px;resize:vertical;}
  .form-card textarea:focus,.form-card input:focus{border-color:var(--accent);background:#fff;}
  .blank-edit{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .blank-edit .num{font-size:.85rem;color:var(--accent);font-weight:700;width:22px;flex-shrink:0;text-align:center;}
  .blank-edit input{flex:1;}
  .blank-edit .rm{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:1rem;padding:4px;}
  .mini{font-size:.78rem;color:var(--ink-soft);margin-top:4px;}
  .check-row{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:.86rem;}
  .add-blank{font:inherit;font-size:.8rem;border:1px dashed var(--line);background:none;border-radius:8px;padding:6px 12px;cursor:pointer;color:var(--accent);font-weight:600;}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;font-size:.85rem;padding:10px 20px;border-radius:999px;
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;box-shadow:0 4px 14px rgba(0,0,0,.2);
  }
  .toast.show{opacity:1;}
  .loading{text-align:center;padding:60px 0;color:var(--ink-soft);}
  .boot-help{
    opacity:0;animation:bootShow .4s ease 2.5s forwards;
    margin:24px auto 0;max-width:420px;text-align:left;
    background:#FFF6E5;border:1px solid #F0DCB0;border-radius:12px;
    padding:14px 16px;font-size:.85rem;color:var(--ink);line-height:1.7;
  }
  @keyframes bootShow{to{opacity:1;}}
  .statline{font-size:.8rem;color:var(--ink-soft);margin-bottom:14px;}
  .statline b{color:var(--ink);}
  @media (max-width:480px){
    .wrap{padding:14px 10px 70px;}
    .card{padding:16px 14px;}
  }

  /* ----- 체크 노트 ----- */
  .notewrap{line-height:1.65;}
  .note-h2{font-size:1.14rem;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--line);}
  .notewrap .lead{font-size:.85rem;color:var(--ink-soft);margin:-8px 0 16px;}
  .notewrap h3{font-size:.95rem;margin:20px 0 8px;color:var(--accent);}
  .notewrap h3:first-of-type{margin-top:10px;}
  .notewrap p{font-size:.9rem;margin:6px 0;}
  .notewrap ul,.notewrap ol{padding-left:20px;margin:6px 0;}
  .notewrap li{margin:4px 0;font-size:.9rem;}
  .notewrap table{width:100%;border-collapse:collapse;font-size:.88rem;margin:8px 0 4px;}
  .notewrap th,.notewrap td{border:1px solid var(--line);padding:7px 10px;text-align:left;vertical-align:top;}
  .notewrap th{background:var(--paper);font-weight:700;font-size:.8rem;color:var(--ink-soft);}
  .notewrap .tbl-wrap{overflow-x:auto;}
  .notewrap code{background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:.86em;}
  .notewrap .code{background:#2A2F3A;color:#E8E6E1;border:none;border-radius:9px;padding:12px 14px;margin:10px 0;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:.8rem;line-height:1.7;overflow-x:auto;white-space:pre;display:block;}
  .notewrap .code b{color:#FFD866;font-weight:700;}
  .notewrap .hl{background:var(--hl);padding:0 3px;border-radius:3px;font-weight:600;}
  .notewrap .ok{color:var(--correct);font-weight:700;}
  .notewrap .no{color:var(--wrong);font-weight:700;}
  .notewrap .box{border-radius:10px;padding:12px 14px;margin:12px 0;font-size:.88rem;}
  .notewrap .box-warn{background:var(--wrong-bg);border:1px solid #F0D5D5;}
  .notewrap .box-tip{background:var(--accent-soft);border:1px solid #DCE4F5;}
  .notewrap .box-mem{background:#FFFBEF;border:1px solid #F0E3C0;}
  .notewrap .box-title{font-weight:800;font-size:.78rem;letter-spacing:.4px;margin-bottom:6px;display:block;}
  .notewrap .box-warn .box-title{color:var(--wrong);}
  .notewrap .box-tip .box-title{color:var(--accent);}
  .notewrap .box-mem .box-title{color:#9A7B18;}
  .notewrap .order{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin:10px 0;font-size:.88rem;}
  .notewrap .order span{background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:4px 11px;font-weight:600;}
  .notewrap .order span.best{border-color:var(--correct);color:var(--correct);background:var(--correct-bg);}
  .notewrap .order span.worst{border-color:var(--wrong);color:var(--wrong);background:var(--wrong-bg);}
  .notewrap .order .arw{color:var(--ink-soft);font-size:.8rem;background:none;border:none;padding:0;}
  .notewrap .layer{display:flex;gap:10px;align-items:baseline;padding:7px 0;border-bottom:1px dashed var(--line);font-size:.89rem;}
  .notewrap .layer:last-child{border-bottom:none;}
  .notewrap .layer .n{flex-shrink:0;width:26px;height:26px;border-radius:7px;background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
  .notewrap .layer .nm{flex-shrink:0;font-weight:700;min-width:62px;}
  .notewrap .layer .ds{color:var(--ink-soft);}
  .note-nav{display:flex;justify-content:space-between;gap:8px;margin-top:24px;padding-top:16px;border-top:1px dashed var(--line);}
  @media(max-width:600px){
    .notewrap table{font-size:.8rem;}
    .notewrap th,.notewrap td{padding:6px 7px;}
    .notewrap .code{font-size:.74rem;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="mark">실기 암기 노트</span></h1>
    <span class="sub" id="totalCount"></span>
  </header>
  <nav>
    <button id="tab-quiz" class="on">문제 풀기</button>
    <button id="tab-wrong">오답 노트<span class="badge" id="wrongBadge" style="display:none">0</span></button>
    <button id="tab-manage">문제 관리</button>
    <button id="tab-note">📋 체크 노트</button>
  </nav>
  <main id="view"><div class="loading">불러오는 중…<div class="boot-help">⚠️ 이 메시지가 3초 이상 계속 보인다면,<br>지금 연 프로그램(미리보기·문서뷰어 등)이 자바스크립트를 실행하지 않는 환경입니다.<br><br><b>해결 방법</b>: 파일을 기기에 저장(다운로드)한 뒤,<br>Chrome · Safari · 삼성 인터넷 같은 <b>브라우저 앱으로 직접 열어주세요.</b></div></div></main>
</div>
<div class="toast" id="toast"></div>

<script>
/* 오류가 나면 멈추지 않고 화면에 표시 */
window.onerror=function(msg,src,line){
  var v=document.getElementById('view');
  if(v)v.innerHTML='<div class="card" style="color:#C4373C;font-size:.88rem;line-height:1.7;">⚠️ 오류가 발생했어요.<br><b>'+msg+'</b> (줄 '+line+')<br><br>이 화면을 캡처해서 알려주시면 바로 고칠 수 있어요.</div>';
  return true;
};

const STORE_KEY='gisa-quiz-v1';

/* ---------- 저장소 어댑터: Claude → localStorage → 메모리 순 ---------- */
const MEM={};
let storageMode='memory';
function detectStorage(){
  try{if(window.storage&&typeof window.storage.get==='function'){storageMode='claude';return;}}catch(e){}
  try{const t='__probe_'+Date.now();localStorage.setItem(t,'1');localStorage.removeItem(t);storageMode='local';return;}catch(e){}
  storageMode='memory';
}
async function storeGet(k){
  if(storageMode==='claude')return await window.storage.get(k);
  if(storageMode==='local'){const v=localStorage.getItem(k);return v===null?null:{key:k,value:v};}
  return MEM[k]!==undefined?{key:k,value:MEM[k]}:null;
}
async function storeSet(k,v){
  if(storageMode==='claude')return await window.storage.set(k,v);
  if(storageMode==='local'){localStorage.setItem(k,v);return{key:k,value:v};}
  MEM[k]=v;return{key:k,value:v};
}
let DB={questions:[],stats:{}}; // stats[id]={att,ok,lastOk}
let tab='quiz';
let session=null; // {ids:[],idx,ok,mode,submitted,lastResult}

 {"q":"다음은 결합도의 유형에 대한 설명이다. 괄호 ( ) 안에 알맞은 결합도를 보기에서 찾아 쓰시오.\n\n( ① )는 파라미터가 아닌 모듈 밖에 선언되어 있는 전역 변수를 참조하고 전역 변수를 갱신하는 식으로 상호 작용하는 경우의 결합도이다.\n( ② )는 모듈 간의 인터페이스로 배열이나 객체, 구조 등이 전달되는 경우의 결합도이다.\n( ③ )는 두 개의 모듈이 외부에서 도입된 데이터 포맷, 통신 프로토콜, 또는 디바이스 인터페이스를 공유할 경우의 결합도이다.\n\n[보기] Content Coupling / Common Coupling / External Coupling / Control Coupling / Stamp Coupling / Data Coupling","b":[["Common Coupling","공통 결합도","공통","Common"],["Stamp Coupling","스탬프 결합도","스탬프","Stamp"],["External Coupling","외부 결합도","외부","External"]],"tag":"소프트웨어 설계"},
 {"q":"다음이 설명하는 객체지향 설계 원칙은 무엇인지 쓰시오.\n\n객체지향 설계 원칙은 5가지가 있다. 그 중 ( ① )은 객체가 다른 클래스를 참조할 때 해당 클래스를 직접 참조하지 말고, 상위 요소인 추상 클래스나 인터페이스를 통해 참조하라는 원칙이다. ( ② )은 하위 클래스(서브 타입)는 언제든지 상위 클래스(기반 타입)으로 대체할 수 있어야 한다는 원칙이다.","b":[["DIP","의존 역전 원칙","의존관계 역전 원칙","Dependency Inversion Principle","의존성 역전 원칙"],["LSP","리스코프 치환 원칙","Liskov Substitution Principle","리스코프 치환"]],"tag":"소프트웨어 설계"},
 {"q":"다음은 비용 산정 모형에 대한 설명이다. 괄호 ( ) 안에 알맞은 모형은 무엇인지 쓰시오.\n\n( ① ) 모형은 한 사람이 1개월 동안 할 수 있는 일의 양을 기준으로 프로젝트 비용을 산정하는 방식으로 원시 코드 라인 수인 LoC를 프로그래머의 월간 생산성으로 나누어 계산한다.\n( ② ) 모형은 보헴(Boehm)이 제안한 프로그램 규모에 따라 비용을 산정하는 방식으로, 규모에 따라 조직형, 반분리형, 임베디드형으로 나뉘는 모형이다.","b":[["Man Month","맨먼스","M/M","맨 먼스","MM","Man-Month"],["COCOMO","코코모"]],"tag":"소프트웨어 설계"},
 {"q":"다음은 일정 관리에 대한 설명이다. 괄호 ( ) 안에 들어갈 올바른 용어를 쓰시오.\n\n일정 관리 모델 종류 중에서 ( ① )은/는 여러 작업의 수행 순서가 얽혀 있는 프로젝트의 일정을 계산하는 기법으로 모든 자원 제약사항을 배제한 상태로 프로젝트의 시작과 끝을 나타내는 노드(Node)와 노드 간의 연결을 통해 공정을 계산하기 위한 액티비티(Activity) 표기법이고, ( ② )은/는 일의 순서를 계획적으로 정리하기 위한 수렴 기법으로 비관치, 중간치, 낙관치의 3점 추정 방식을 통해 일정을 관리하는 기법이다.","b":[["CPM","Critical Path Method","주 공정법","임계 경로 기법","임계 경로"],["PERT","Program Evaluation and Review Technique","퍼트"]],"tag":"소프트웨어 설계"},
 {"q":"LoC가 20,000라인이고, 개발자가 10명이며, 개발자는 월평균 100라인을 개발한다고 할 때 Man Month를 구하시오.","b":[["200","200MM","200 Man Month","200맨먼스","200 M/M"]],"tag":"소프트웨어 설계"},
 {"q":"다음은 모듈의 응집도(Cohesion)에 관한 설명이다. 괄호 ( ① ), ( ② ), ( ③ )에 들어갈 가장 알맞은 응집도 유형을 보기에서 골라 쓰시오.\n\n- 한 활동이 출력을 만들면 그 다음 활동이 또 다른 작업을 수행하는 식으로 정해진 순서대로 실행되지만, 활동 간 출력값(데이터) 자체가 직접 전달·공유되지는 않는 경우의 응집도를 ( ① ) 응집도라고 한다.\n- 동일한 입력 데이터를 사용하거나 동일한 출력 데이터를 생성하는 기능들을 묶은 경우의 응집도를 ( ② ) 응집도라고 한다.\n- 모듈 내 모든 기능이 단일 목적을 수행하기 위해 구성된 응집도를 ( ③ ) 응집도라고 한다.\n\n[보기] 우연적 / 순차적 / 논리적 / 시간적 / 절차적 / 교환적 / 기능적","b":[["절차적","절차"],["교환적","교환","통신적","통신"],["기능적","기능"]],"tag":"소프트웨어 설계"},
 {"q":"다음은 비기능적 요구사항의 유형에 대한 설명이다. 각 설명에 해당하는 비기능적 요구사항 유형을 보기에서 골라 쓰시오.\n\n(1) 유닉스, 윈도우, 리눅스 등 여러 운영체제에서 프로그램을 사용할 수 있어야 한다.\n(2) 일정 메모리 이상을 확보해야 하며, 그래픽 카드 등 다양한 입력·출력 장치를 지원해야 한다.\n(3) 모든 요청은 1초 이내에 응답해야 하며, 트랜잭션이 즉시 반영되어 자유로운 쿼리가 가능해야 한다.\n\n[보기] 운영 / 자원 / 품질 / 문화/정책적 요구사항 / 보안 / 성능","b":[["운영","운영 요구사항"],["자원","자원 요구사항"],["성능","성능 요구사항"]],"tag":"소프트웨어 설계"},
 {"q":"다음은 모듈의 독립성을 평가하는 두 척도이다. 각 빈칸에 알맞은 용어를 쓰시오.\n\n- ( ① ): 한 모듈이 다른 모듈에 얼마나 의존적인지를 나타내는 척도로, 낮을수록 좋은 모듈로 평가된다.\n- ( ② ): 한 모듈 내부의 구성 요소들이 하나의 목적을 위해 얼마나 긴밀하게 연관되어 있는지를 나타내는 척도로, 높을수록 좋은 모듈로 평가된다.","b":[["결합도","Coupling"],["응집도","Cohesion"]],"tag":"소프트웨어 설계"},
 {"q":"애플리케이션의 성능을 측정하기 위한 지표에 대한 설명이다. ( ① ), ( ② ), ( ③ )에 들어갈 지표를 쓰시오.\n\n( ① ): 애플리케이션이 주어진 시간에 처리할 수 있는 트랜잭션의 수 (웹의 경우 시간당 페이지 수)\n( ② ): 사용자 입력이 끝난 후 응답 출력이 개시될 때까지의 시간 (메뉴 클릭 후 메뉴가 나타나기까지)\n( ③ ): 사용자가 요구를 입력한 시점부터 그 결과의 출력이 완료될 때까지 걸리는 시간\n(참고: 자원 사용률 = 트랜잭션 처리 중 사용하는 CPU·메모리·네트워크 사용량)","b":[["처리량","Throughput","스루풋"],["응답 시간","응답시간","Response Time"],["반환 시간","반환시간","경과 시간","Turnaround Time","턴어라운드 타임"]],"tag":"소프트웨어 설계"},
 {"q":"총 라인 수가 36,000 라인이고, 개발자가 6명이며 1인당 월 평균 300 라인을 개발한다고 가정할 때, 이 프로젝트의 개발 기간은 몇 개월인가? (LoC 기법 기준, 숫자만 입력)","b":[["20","20개월","20MM"]],"tag":"소프트웨어 설계"},
 {"q":"절차보다는 사람이 중심이 되어 변화에 유연하고 신속하게 적응하면서 효율적으로 시스템을 개발할 수 있는 신속 적응적 경량 개발 방법론으로, 개발 기간이 짧고 신속하며, 워터폴(Waterfall)에 대비되는 방법론은 무엇인지 쓰시오.","b":[["애자일","Agile","애자일 방법론","Agile Methodology"]],"tag":"소프트웨어 설계"},
 {"q":"UI 설계 원칙 중, 정확하고 완벽하게 사용자의 목표가 달성될 수 있도록 제작할 수 있어야 하는 특징은 무엇인지 쓰시오.","b":[["유효성","Validity"]],"tag":"소프트웨어 설계"},
 {"q":"소프트웨어 개발 과정에서 변경 사항을 관리하는 기법은 ( ① ) 기법이라고 하며, ( ① ) 기법을 활용한 도구로는 CVS, SVN, Git 등이 있다. ( ① )에 들어갈 용어를 쓰시오.","b":[["형상 관리","Software Configuration Management","SCM","형상관리"]],"tag":"소프트웨어 설계"},
 {"q":"컬렉션의 내부 구조를 노출하지 않고 요소에 순차적으로 접근하는 방법을 제공하는 패턴을 영어로 쓰시오\n\n[보기] Observer / Strategy / Iterator / Composite / Template Method","b":[["Iterator","반복자","이터레이터"]],"tag":"디자인 패턴"},
 {"q":"( )은/는 복잡한 시스템의 개발을 쉽게 할 수 있도록 객체의 대리자를 이용하는 디자인 패턴이다. 객체의 대리자는 원래 객체의 작업을 대신 처리한다.\n\n[보기] Adapter / Proxy / Decorator / Facade","b":[["Proxy","프록시"]],"tag":"디자인 패턴"},
 {"q":"다음은 디자인 패턴에 대한 설명이다. 괄호 안에 알맞은 답을 작성하시오.\n\n( ① )은/는 객체 하나만 생성하도록 하고 어디서든 참조할 수 있도록 하는 디자인 패턴이다. 클래스 내에서 인스턴스가 하나뿐임을 보장하며, 불필요한 메모리 낭비를 최소화할 수 있다.\n\n( ② )은/는 객체의 내부 상태에 접근할 수 있는 방법을 제공하여 호스트 객체에 새로운 연산을 추가할 수 있도록 하는 디자인 패턴이다. 객체 구조와 처리 기능을 분리하여, 데이터 구조 안의 요소들에 대해 처리 기능을 각 요소에서 분리하여 별도의 클래스로 정의해 사용한다.\n\n[보기] Proxy / Singleton / Facade / Adapter / Composite / Decorator / Observer / Visitor / Template Method / Strategy","b":[["Singleton","싱글톤"],["Visitor","비지터","방문자"]],"tag":"디자인 패턴"},
 {"q":"한 객체의 상태가 변화하면 그 객체에 의존하는 다른 객체들에게 자동으로 통지되어 내용이 갱신되도록 하는, 1:N 의존 관계를 정의하는 행위 디자인 패턴은?\n\n[보기] Observer / Mediator / Command / State / Memento","b":[["Observer","옵저버","감시자"]],"tag":"디자인 패턴"},
 {"q":"호환되지 않는 인터페이스를 가진 클래스들을 함께 동작할 수 있도록 인터페이스를 변환해주는 구조 디자인 패턴은?\n\n[보기] Adapter / Bridge / Proxy / Composite / Flyweight","b":[["Adapter","어댑터","적응자"]],"tag":"디자인 패턴"},
 {"q":"복잡한 서브시스템들을 하나의 단순화된 통합 인터페이스(창구)로 제공하여 시스템을 사용하기 쉽게 만드는 구조 디자인 패턴은?\n\n[보기] Facade / Decorator / Proxy / Adapter / Bridge","b":[["Facade","퍼사드"]],"tag":"디자인 패턴"},
 {"q":"알고리즘 군을 정의하고 각각을 캡슐화하여 상호 교환이 가능하도록 함으로써, 클라이언트와 독립적으로 알고리즘을 변경할 수 있게 하는 행위 디자인 패턴은?\n\n[보기] Strategy / Template Method / State / Command / Chain of Responsibility","b":[["Strategy","전략","스트래티지"]],"tag":"디자인 패턴"},
 {"q":"복잡한 객체의 생성 과정과 표현 방법을 분리하여, 동일한 생성 절차에서 서로 다른 표현의 객체를 만들 수 있게 하는 생성 디자인 패턴은?\n\n[보기] Builder / Factory Method / Abstract Factory / Prototype / Singleton","b":[["Builder","빌더"]],"tag":"디자인 패턴"},
 {"q":"다음이 설명하는 디자인 패턴을 영어로 쓰시오.\n\n① 구체적인 클래스에 의존하지 않고 서로 연관되거나 의존적인 객체들의 조합을 만드는 인터페이스를 제공하는 패턴으로, 이 패턴을 통해 생성된 클래스에서는 사용자에게 인터페이스(API)를 제공하고, 구체적인 구현은 ConcreteProduct 클래스에서 이루어지는 특징을 갖는 디자인 패턴\n\n② 처음부터 일반적인 원형을 만들어 놓고, 그것을 복사한 후 필요한 부분만 수정하여 사용하는 패턴으로, 생성할 객체의 원형을 제공하는 인스턴스에서 생성할 객체들의 타입이 결정되도록 설정하며 객체를 생성할 때 갖추어야 할 기본 형태가 있을 때 사용되는 디자인 패턴","b":[["Abstract Factory","추상 팩토리","앱스트랙트 팩토리"],["Prototype","프로토타입"]],"tag":"디자인 패턴"},
 {"q":"다음은 디자인 패턴에 관한 설명이다. 괄호 안에 들어갈 단어를 쓰시오.\n\n( ) 패턴은 클래스나 객체들이 상호 작용하는 방법과 책임 분담을 다루는 패턴이다. 이 패턴은 객체들 간 통신 방법을 정의하고 알고리즘을 캡슐화하여 객체간 결합도를 낮춘다. 이 패턴은 Mediator, Interpreter, Iterator 등의 패턴을 포함한다.","b":[["행위","행위 패턴","Behavioral","행동","Behavior"]],"tag":"디자인 패턴"},
 {"q":"다음이 설명하는 디자인 패턴을 보기에서 골라 영어로 쓰시오.\n\n(1) 추상부와 구현부를 분리하여 두 계층이 서로 영향을 받지 않고 독립적으로 확장될 수 있도록 다리 역할을 하는 구조 패턴은 무엇인가?\n(2) 한 객체의 상태가 변경되었을 때, 그 객체에 의존하는 다른 객체들에게 변경 사실을 자동으로 통지(알림)하는 행위 패턴은 무엇인가?\n\n[보기] Bridge / Decorator / Proxy / Visitor / Composite / Mediator / Adapter / Facade / Interpreter / Observer","b":[["Bridge","브리지"],["Observer","옵저버","감시자"]],"tag":"디자인 패턴"},
 {"q":"다음 설명에 해당하는 데이터베이스 회복 기법을 쓰시오.\n\n트랜잭션 수행 중 변경된 데이터를 즉시 데이터베이스에 반영하며, 장애 발생 시 로그를 이용해 REDO와 UNDO 연산을 모두 수행할 수 있어야 하는 회복 기법.","b":[["즉각 갱신","즉시 갱신","Immediate Update"]],"tag":"데이터베이스"},

 {"q":"다음은 관계 데이터 모델과 관련된 설명이다. 괄호 ( ) 안에 공통적으로 들어갈 용어를 쓰시오.\n\n( )은/는 관계 데이터베이스에 대한 비절차적 언어이며, 수학의 Predicate Calculus에 기반을 두고 있다. Codd 박사에 의하여 제시되었으며, 튜플 ( ), 도메인 ( )이/가 있다.","b":[["관계 해석","관계해석"]],"tag":"데이터베이스"},
 {"q":"정규화된 엔티티, 속성, 관계에 대해 성능 향상과 개발 운영의 단순화를 위해 중복, 통합, 분리 등을 수행하는 데이터 모델링의 기법을 무엇이라고 하는지 쓰시오.","b":[["반정규화","비정규화","Denormalization"]],"tag":"데이터베이스"},
 {"q":"다음은 데이터베이스 이상(Anomaly) 현상 중 하나에 대한 설명이다. 빈칸에 들어갈 용어를 쓰시오.\n\n릴레이션의 한 튜플을 삭제할 때 의도하지 않은 다른 데이터까지 함께 삭제되어 정보가 손실되는 현상을 ( ① ) 이상이라고 한다.","b":[["삭제","Deletion"]],"tag":"데이터베이스"},
 {"q":"다음은 데이터베이스에 관련된 내용이다. 각 괄호에 들어갈 답을 [보기]에서 골라 쓰시오.\n\n• ( ① )은/는 어떤 요소의 집합 혹은 행을 나타내며, 특정 속성에 중복된 값을 포함할 수 있다.\n• ( ② )은/는 특정 시점에 릴레이션의 내용, 저장된 데이터를 의미한다. 릴레이션 외연(Relation Extension)이라고도 표현한다.\n• ( ③ )은/는 데이터 집합 내에서 고유한(Unique) 값들의 총 개수를 나타낸다.\n\n[보기] 튜플 / 릴레이션 스키마 / 차수 / 릴레이션 인스턴스 / 카디널리티 / 속성","b":[["튜플","Tuple"],["릴레이션 인스턴스","Relation Instance"],["카디널리티","Cardinality"]],"tag":"데이터베이스"},
 {"q":"다음은 스키마와 관련된 내용이다. 각 괄호 안에 알맞은 답을 보기에서 찾아 작성하시오.\n\n( ① ) 스키마는 사용자나 개발자의 관점에서 필요로 하는 데이터베이스의 논리적 구조이고, 사용자 뷰를 나타내며, 서브 스키마로 불린다.\n\n( ② ) 스키마는 데이터베이스의 전체적인 논리적 구조이다. 전체적인 뷰를 나타내고, 개체 간의 관계, 제약조건, 접근 권한, 무결성, 보안에 대해 정의한다.\n\n( ③ ) 스키마는 물리적 저장 장치의 관점에서 보는 데이터베이스 구조이고, 실제로 데이터베이스에 저장될 레코드의 형식을 정의한다. 데이터 항목의 표현 방법, 내부 레코드의 물리적 순서 등을 표현한다.\n\n[보기] 내부 / 외부 / 개념","b":[["외부","External"],["개념","Conceptual"],["내부","Internal"]],"tag":"데이터베이스"},
 {"q":"다음은 데이터베이스 모델링 절차에 대한 설명이다. 괄호 ( ) 안에 들어갈 절차를 쓰시오.\n\n• 요구사항 분석은 현행 데이터의 문제점과 개선해야 할 점을 확인하고 향후 개선점을 도출하는 활동이다.\n• ( ① )은/는 업무 중심의 포괄적인 모델링으로 추상화하는 활동으로 주제 영역과 핵심 데이터 간 관계를 정의한다.\n• ( ② )은/는 관계(Relationship), 속성(Attribute), 키(Key) 등을 도출하는 활동이다.\n• 물리 모델링은 사용 DBMS 특성에 맞게 물리적 스키마를 만드는 활동이다.","b":[["개념 모델링","개념적 모델링","개념"],["논리 모델링","논리적 모델링","논리"]],"tag":"데이터베이스"},
 {"q":"조인은 두 릴레이션의 공통 속성을 기본으로 튜플을 결합한다. 다음에서 설명하는 조인의 종류를 보기에서 골라 쓰시오.\n\n① 조인에 참여하는 두 릴레이션의 속성값을 비교하여 조건을 만족하는 튜플만 반환하는 조인\n② ①에서 조건이 정확하게 (=) 등호로 일치하는 경우의 튜플만을 반환하는 조인\n③ ②에서 조인에 참여한 속성이 두 번 나오지 않도록 중복된 속성(두 번째 속성)을 제거한 결과를 반환하는 조인\n\n[보기] 세타 조인 / 중첩 조인 / 동등 조인 / 자연 조인 / 외부 조인","b":[["세타 조인","세타","Theta Join","θ 조인"],["동등 조인","동등","Equi Join","동일 조인"],["자연 조인","자연","Natural Join"]],"tag":"데이터베이스"},
 {"q":"키(key)에 대한 설명을 보고 괄호 안에 들어갈 키를 쓰시오. (하나의 보기가 중복으로 답이 될 수 없음)\n\n( ① ) 한 릴레이션의 컬럼이 다른 릴레이션의 기본키로 이용되는 키\n( ② ) 유일성은 만족하지만 최소성은 만족하지 않는 키\n( ③ ) 기본키로 선택되지 않은 나머지 후보키\n( ④ ) 튜플을 구별하는데 기준이 되는 키로 유일성과 최소성을 만족하는 키\n\n[보기] 슈퍼키 / 대체키 / 외래키 / 후보키","b":[["외래키","Foreign Key"],["슈퍼키","Super Key"],["대체키","Alternate Key","보조키"],["후보키","Candidate Key"]],"tag":"데이터베이스"},
 {"q":"다음은 병행 제어 기법에 대한 설명이다. 괄호 ( ) 안에 알맞은 기법을 쓰시오.\n\n( ① )은/는 트랜잭션이 어떠한 검증도 수행하지 않고 일단 트랜잭션을 수행하고, 트랜잭션 종료 시 검증을 수행하여 데이터베이스에 반영하는 기법이다.\n( ② )은/는 여러 개의 분산 데이터베이스 시스템에서 트랜잭션의 일관성을 유지하기 위한 기법으로 트랜잭션을 두 단계로 분리하여 제어하는 기법이다.","b":[["낙관적 검증","낙관적 병행제어","Optimistic Validation","낙관적 기법","낙관적 검증 기법"],["2PC","2단계 커밋","Two-Phase Commit","2 Phase Commit","투 페이즈 커밋"]],"tag":"데이터베이스"},
 {"q":"데이터베이스 시스템에서 삽입, 갱신, 삭제 등의 이벤트가 발생할 때마다 관련 작업이 자동으로 수행되는 절차형 SQL은 무엇인지 쓰시오.","b":[["트리거","Trigger"]],"tag":"데이터베이스"},
 {"q":"트랜잭션이 사용하는 데이터 항목에 대하여 잠금(Lock)을 설정한 트랜잭션이 해제(Unlock)할 때까지 독점적으로 사용할 수 있게 상호배제 기능을 제공하는 기법은 무엇인지 쓰시오.","b":[["로킹","Locking","락킹","잠금 기법","잠금"]],"tag":"데이터베이스"},
 {"q":"다음은 트랜잭션 연산에 대한 설명이다. 괄호 ( ) 안에 들어갈 명령어를 쓰시오.\n\n( ① )은/는 하나의 트랜잭션이 성공적으로 끝나고, 데이터베이스가 일관성 있는 상태에 있거나 하나의 트랜잭션이 끝났을 때 사용하는 연산이다. 반대로 ( ② )은/는 하나의 트랜잭션이 비정상적으로 종료되어 트랜잭션 원자성이 깨질 경우 모든 변경사항이 취소되고, 트랜잭션이 시작되기 전의 상태로 되돌리는 연산이다.","b":[["COMMIT","커밋"],["ROLLBACK","롤백"]],"tag":"데이터베이스"},
 {"q":"다음과 같이 위쪽 릴레이션을 아래쪽 릴레이션으로 정규화를 하였을 때 어떤 정규화 작업을 한 것인지 쓰시오.\n\n[변환 전] 국가-도시: 대한민국-{서울, 부산} / 미국-{워싱턴, 뉴욕} / 중국-베이징\n[변환 후] 대한민국-서울 / 대한민국-부산 / 미국-워싱턴 / 미국-뉴욕 / 중국-베이징 (한 칸에 하나의 값만 존재)","b":[["제1정규형","1정규형","1NF","제1정규화","1차 정규화","1차 정규형","제 1 정규화","1정규화"]],"tag":"데이터베이스"},
 {"q":"각 설명에 알맞은 용어를 보기에서 골라 쓰시오.\n\n1. 릴레이션에서 속성의 개수를 의미: ( 1 )\n2. 릴레이션에서 튜플의 개수를 의미: ( 2 )\n3. 한 릴레이션의 속성이 다른 릴레이션의 기본 키를 참조할 때, 참조하는 속성을 의미: ( 3 )\n4. 특정 속성에 대해 입력될 수 있는 값의 유형이나 범위를 의미하고 무결성을 보장하는 기준: ( 4 )\n\n[보기] primary / degree / attribute / cardinality / foreign / domain / candidate","b":[["degree","차수","디그리"],["cardinality","카디널리티"],["foreign","foreign key","외래키"],["domain","도메인"]],"tag":"데이터베이스"},
 {"q":"다음 표의 1, 2, 3 무결성 제약조건은 각각 무엇인가?\n\n( 1 ) 무결성: 제약 대상 = 속성 · 관련 키 = 없음 · 릴레이션 내 제약조건 개수 = 속성의 개수와 동일\n( 2 ) 무결성: 제약 대상 = 튜플 · 관련 키 = 기본키 · 릴레이션 내 제약조건 개수 = 1개\n( 3 ) 무결성: 제약 대상 = 속성과 튜플 · 관련 키 = 외래키 · 릴레이션 내 제약조건 개수 = 0개~여러 개","b":[["도메인","도메인 무결성","Domain"],["개체","개체 무결성","Entity"],["참조","참조 무결성","Referential"]],"tag":"데이터베이스"},
 {"q":"데이터베이스 물리 설계 시 레코드 접근 방법에는 순차 접근, [ ① ] 접근, 해싱 접근 방법 등이 있다. 이 중 [ ① ] 접근 방법은 레코드의 키 값과 주소 포인터를 쌍으로 구성한 별도의 자료 구조를 사용하여 검색 속도를 향상시킨다. 이 자료 구조를 통해 키 값을 기준으로 원하는 레코드를 빠르게 찾을 수 있을 때, 빈칸 ①에 들어갈 용어는 무엇인가?","b":[["인덱스","색인","Index"]],"tag":"데이터베이스"},
 {"q":"파일 구조상 데이터 항목 또는 데이터 필드에 해당하는 관계 데이터 모델 요소를 보기에서 골라 영어로 쓰시오.\n\n[보기] Tuple / Identifier / Attribute / Domain / Relation / Degree / Cardinality","b":[["Attribute","속성","어트리뷰트"]],"tag":"데이터베이스"},
 {"q":"트랜잭션의 특징 중, 일관성·지속성 외 2개의 특성을 쓰시오. (원자성/격리성 등 ACID 구성 요소)","b":[["원자성","Atomicity"],["격리성","고립성","독립성","Isolation"]],"unordered":true,"tag":"데이터베이스"},
 {"q":"다음은 SQL 명령어의 분류이다. 각 분류에 해당하는 명령어를 보기에서 모두 골라 쓰시오.\n\n( ① ) 데이터 정의어 — 스키마·테이블·뷰 등 구조를 정의\n( ② ) 데이터 조작어 — 데이터를 조회·삽입·수정·삭제\n( ③ ) 데이터 제어어 — 권한 부여·회수, 트랜잭션 제어\n\n[보기] DDL / DML / DCL","b":[["DDL","Data Definition Language","데이터 정의어"],["DML","Data Manipulation Language","데이터 조작어"],["DCL","Data Control Language","데이터 제어어"]],"tag":"SQL"},
 {"q":"다음은 [수강] 테이블을 생성하는 SQL문이다. 아래 [조건]을 모두 만족하도록 빈칸 ① ~ ⑤에 들어갈 알맞은 SQL 키워드를 쓰시오.\n\n[조건]\n- 학번은 기본키이다.\n- 이름은 NULL 값을 가질 수 없다.\n- 나이는 18 이상인 값만 입력할 수 있다.\n- 학과코드는 [학과] 테이블의 학과코드를 참조하는 외래키이다.\n\nCREATE TABLE 수강 (\n    학번      CHAR(8)      ( ① ),\n    이름      VARCHAR(20)  ( ② ),\n    나이      INT          ( ③ ) (나이 >= 18),\n    학과코드  CHAR(4),\n    CONSTRAINT FK_학과 ( ④ ) (학과코드) ( ⑤ ) 학과(학과코드)\n);","b":[["PRIMARY KEY","기본키"],["NOT NULL"],["CHECK"],["FOREIGN KEY","외래키"],["REFERENCES"]],"tag":"SQL"},
 {"q":"회사 테이블에 부서명 속성을 추가하는 SQL 문을 작성하시오. 빈칸 ( ① ), ( ② )을 채우시오.\n\n( ① ) TABLE 회사 ( ② ) 부서명 VARCHAR(30);","b":[["ALTER"],["ADD"]],"tag":"SQL"},
 {"q":"다음은 [학생] 테이블 스키마에 대한 명세이다. [학생] 테이블에서 학번이 '202101'이고, 성명은 '임꺽정', 과목은 '프로그래밍', 전화번호는 '010-1234-5678'인 학생의 정보를 입력하시오.\n\n[학생] 테이블 스키마: 학번 INTEGER / 성명 VARCHAR(10) / 과목명 VARCHAR(20) / 전화번호 CHAR(13)","b":[["INSERT INTO 학생 VALUES(202101, '임꺽정', '프로그래밍', '010-1234-5678');","INSERT INTO 학생 VALUES(202101, '임꺽정', '프로그래밍', '010-1234-5678')","INSERT INTO 학생(학번, 성명, 과목명, 전화번호) VALUES(202101, '임꺽정', '프로그래밍', '010-1234-5678');","INSERT INTO 학생(학번, 성명, 과목명, 전화번호) VALUES(202101, '임꺽정', '프로그래밍', '010-1234-5678')"]],"tag":"SQL"},
 {"q":"[학생] 테이블에서 학번이 '202101'인 학생의 학과명을 '컴퓨터공학'으로 수정하는 SQL문을 작성하시오. (학번은 문자형)","b":[["UPDATE 학생 SET 학과명 = '컴퓨터공학' WHERE 학번 = '202101';","UPDATE 학생 SET 학과명 = '컴퓨터공학' WHERE 학번 = '202101'"]],"tag":"SQL"},
 {"q":"[학생] 테이블에서 학생 이름이 '현진'인 튜플을 삭제하는 쿼리를 작성하시오.\n\n[학생] 테이블\n학번 / 학년 / 이름\n2401 / 3 / 현진\n2502 / 2 / 영희\n2601 / 1 / 순신\n2304 / 4 / 길동","b":[["DELETE FROM 학생 WHERE 이름 = '현진';","DELETE FROM 학생 WHERE 이름 = '현진'"]],"tag":"SQL"},
 {"q":"[학생] 테이블에서 학과가 '컴퓨터공학'인 학생의 이름과 학번을 학번 기준 내림차순으로 정렬하여 조회하는 SQL문을 작성하시오.","b":[["SELECT 이름, 학번 FROM 학생 WHERE 학과 = '컴퓨터공학' ORDER BY 학번 DESC;","SELECT 이름, 학번 FROM 학생 WHERE 학과 = '컴퓨터공학' ORDER BY 학번 DESC"]],"tag":"SQL"},
 {"q":"[학생] 테이블에서 학과별 학생 수를 구하되, 학생 수가 3명 이상인 학과만 조회하는 SQL문을 작성하시오. (조회 항목: 학과, 학생 수)","b":[["SELECT 학과, COUNT(*) FROM 학생 GROUP BY 학과 HAVING COUNT(*) >= 3;","SELECT 학과, COUNT(*) FROM 학생 GROUP BY 학과 HAVING COUNT(*) >= 3"]],"tag":"SQL"},
 {"q":"다음 사원 테이블 스키마를 보고, 사원 테이블에서 성별 값이 'M'을 가진 사원의 사번, 이름을 출력하는 '사원뷰'라는 이름의 뷰를 생성하는 쿼리를 작성하시오.\n\n사원 테이블(사번, 업무, 이름, 생년월일, 성별, 입사일)","b":[["CREATE VIEW 사원뷰 AS SELECT 사번, 이름 FROM 사원 WHERE 성별 = 'M';","CREATE VIEW 사원뷰 AS SELECT 사번, 이름 FROM 사원 WHERE 성별 = 'M'"]],"tag":"SQL"},
 {"q":"'사원뷰'라는 이름의 뷰를 제거하되, 해당 뷰를 참조하는 다른 뷰나 제약조건까지 함께 제거되도록 하는 SQL문을 작성하시오.","b":[["DROP VIEW 사원뷰 CASCADE;","DROP VIEW 사원뷰 CASCADE"]],"tag":"SQL"},
 {"q":"다음 [실행]을 완료할 수 있는 [SQL 쿼리]이다. 밑줄 안에 들어갈 옵션은 무엇인가?\n\n[실행]\n- \"gamja\" 뷰 테이블 제거\n- 연쇄적으로 \"gamja\" 뷰 테이블을 참조하는 테이블도 제거\n\n[SQL 쿼리]\nDROP VIEW gamja ______;","b":[["CASCADE","캐스케이드"]],"tag":"SQL"},
 {"q":"다음 [실행]을 완료할 수 있는 [SQL 쿼리]이다. 밑줄 안에 들어갈 옵션은 무엇인가?\n\n[실행]\n- \"gamja\" 뷰 테이블 제거를 시도\n- 단, 이 뷰를 참조하고 있는 다른 객체(테이블·뷰 등)가 있으면 제거를 취소(거부)\n\n[SQL 쿼리]\nDROP VIEW gamja ______;","b":[["RESTRICT","리스트릭트"]],"tag":"SQL"},
 {"q":"사용자 '홍길동'에게 [학생] 테이블에 대한 SELECT 권한을 부여하고, 홍길동이 이 권한을 다른 사용자에게 다시 부여할 수 있도록 하는 SQL문을 작성하시오.","b":[["GRANT SELECT ON 학생 TO 홍길동 WITH GRANT OPTION;","GRANT SELECT ON 학생 TO 홍길동 WITH GRANT OPTION"]],"tag":"SQL"},
 {"q":"사용자 '홍길동'에게 부여한 [학생] 테이블의 SELECT 권한을 회수하되, 홍길동이 다른 사용자에게 부여한 권한까지 연쇄적으로 회수하는 SQL문을 작성하시오.","b":[["REVOKE SELECT ON 학생 FROM 홍길동 CASCADE;","REVOKE SELECT ON 학생 FROM 홍길동 CASCADE"]],"tag":"SQL"},
 {"q":"프로세스의 주요 상태를 다음 설명과 매칭하시오.\n\n- ( ① ): CPU를 할당받기 위해 대기열에서 기다리는 상태.\n- ( ② ): CPU를 할당받아 명령어를 수행하는 상태.\n- ( ③ ): 입출력 등의 사건이 완료될 때까지 CPU를 반납하고 기다리는 상태.","b":[["준비","Ready"],["실행","Run","Running"],["대기","Wait","Waiting","Block","Blocked"]],"tag":"운영체제"},
 {"q":"다음 설명에 해당하는 운영체제를 쓰시오.\n\n여러 사용자가 동시에 사용할 수 있는 다중 사용자(Multi-User) 시스템이며, 다중 작업(Multi-Tasking)을 지원한다. C 언어로 작성되어 이식성이 높고, 트리 구조의 계층적 파일 시스템과 강력한 셸(Shell)을 제공하는 시분할 운영체제.","b":[["UNIX","유닉스"]],"tag":"운영체제"},
 {"q":"공유메모리, 소켓, 세마포어, 메시지 큐 등 프로세스 간 통신하는 기술을 무엇이라고 하는지 쓰시오.","b":[["IPC","Inter Process Communication"]],"tag":"운영체제"},
 {"q":"gamja.sh 라는 셸 스크립트 파일이 있다. 이 파일의 사용자는 모든 권한을 가져야 하고, 그룹에게는 읽기/실행 권한을 부여해야 한다. 그리고 그 외는 실행 권한만 부여하려 한다. 이를 실행하는 명령어는 다음과 같다.\n\n( ① ) ( ② ) gamja.sh\n\n괄호 안을 채우시오. (8진법을 사용하세요)","b":[["chmod"],["751"]],"tag":"운영체제"},
 {"q":"페이지 교체 기법 중, 각 페이지가 참조된 횟수를 기록해 두었다가 사용 빈도가 가장 적은 페이지를 교체하는 기법은?\n\n[보기] FIFO / LRU / LFU / NUR / OPT","b":[["LFU","Least Frequently Used"]],"tag":"운영체제"},
 {"q":"페이지 교체 기법 중, 가장 오랫동안 사용되지 않은(참조된 지 가장 오래된) 페이지를 교체하는 기법은?\n\n[보기] FIFO / LRU / LFU / NUR / OPT","b":[["LRU","Least Recently Used"]],"tag":"운영체제"},
 {"q":"페이지 교체 기법 중, 가장 먼저 적재된 페이지부터 교체하며, 프레임 수를 늘렸는데 오히려 페이지 부재가 증가하는 벨레이디의 모순(Belady's Anomaly)이 발생할 수 있는 기법은?\n\n[보기] FIFO / LRU / LFU / NUR / OPT","b":[["FIFO","First In First Out","선입선출"]],"tag":"운영체제"},
 {"q":"3개의 페이지 프레임을 가진 시스템에서 페이지 참조 순서가 다음과 같을 때, FIFO 기법 사용 시 발생하는 페이지 부재(Page Fault)의 횟수를 쓰시오. (초기 프레임은 모두 비어 있음)\n\n참조 순서: 1, 2, 3, 1, 2, 4, 1, 2, 5","b":[["6","6회","6번"]],"tag":"운영체제"},
 {"q":"CPU 스케줄링 기법 중, 실행 시간이 가장 짧은 프로세스에 CPU를 먼저 할당하는 비선점 기법으로, 실행 시간이 긴 작업이 무한정 대기하는 기아(Starvation) 현상이 발생할 수 있는 기법은?\n\n[보기] FCFS / SJF / SRT / RR / HRN","b":[["SJF","Shortest Job First","최단 작업 우선"]],"tag":"운영체제"},
 {"q":"CPU 스케줄링 기법 중, SJF를 선점 방식으로 변형한 것으로 현재 실행 중인 프로세스보다 남은 실행 시간이 더 짧은 프로세스가 도착하면 CPU를 빼앗는 기법은?\n\n[보기] FCFS / SJF / SRT / RR / HRN","b":[["SRT","Shortest Remaining Time","SRTF","Shortest Remaining Time First","최단 잔여 시간"]],"tag":"운영체제"},
 {"q":"CPU 스케줄링 기법 중, 시분할 시스템을 위해 고안된 선점 기법으로 각 프로세스에 동일한 시간 할당량(Time Quantum)을 부여하고, 할당 시간 내에 완료되지 않으면 준비 큐의 맨 뒤로 보내는 기법은?\n\n[보기] FCFS / SJF / SRT / RR / HRN","b":[["RR","Round Robin","라운드 로빈"]],"tag":"운영체제"},
 {"q":"CPU 스케줄링 기법 중, SJF의 기아 현상을 보완한 비선점 기법으로 우선순위를 (대기시간 + 서비스시간) ÷ 서비스시간 으로 계산하여 값이 큰 프로세스에 CPU를 할당하는 기법은?\n\n[보기] FCFS / SJF / SRT / RR / HRN","b":[["HRN","HRRN","Highest Response-ratio Next","Highest Response Ratio Next"]],"tag":"운영체제"},
 {"q":"HRN 스케줄링 기법에서 대기시간이 20, 서비스(실행)시간이 10인 프로세스의 우선순위 값을 구하시오.","b":[["3"]],"tag":"운영체제"},
 {"q":"다음은 지역성에 대한 설명이다. 괄호 ( ) 안에 들어갈 유형을 쓰시오.\n\n지역성은 크게 ( ① ) 지역성, ( ② ) 지역성, ( ③ ) 지역성이 있다. ( ① ) 지역성은 최근 사용되었던 기억장소들이 집중적으로 액세스하는 현상이고, ( ② ) 지역성은 프로세스 실행 시 일정 위치의 페이지를 집중적으로 액세스하는 현상이고, ( ③ ) 지역성은 데이터가 순차적으로 액세스 되는 현상이다.","b":[["시간","시간 지역성","Temporal","Temporal Locality"],["공간","공간 지역성","Spatial","Spatial Locality"],["순차","순차 지역성","Sequential","Sequential Locality"]],"tag":"운영체제"},
 {"q":"다음 상황에서 사용하는 유닉스 명령어를 보기에서 골라 작성하세요.\n\n① 현재 경로를 확인하는 명령어\n② 디렉토리 내용을 출력하는 명령어\n③ 디렉토리 위치를 이동하는 명령어\n④ 파일을 복사하는 명령어\n\n[보기] ls / pwd / cd / cp","b":[["pwd"],["ls"],["cd"],["cp"]],"tag":"운영체제"},
 {"q":"스케줄링 방식에서 HRN(Highest Response ratio Next) 우선순위 계산식의 빈칸 ( ① ), ( ② )에 들어갈 항목을 보기에서 고르시오.\n\n우선순위 = ( ( ① ) + ( ② ) ) ÷ ( ② )\n\n[보기] 서비스 시간 / 도착 시간 / 처리 시간 / 대기 시간 / 응답 시간","b":[["대기 시간","대기시간","대기"],["서비스 시간","서비스시간","서비스","실행 시간","실행시간"]],"tag":"운영체제"},
 {"q":"다음 설명에 해당하는 프로토콜을 쓰시오.\n\nIPv4의 주소 부족 문제를 해결하기 위해 등장한 차세대 인터넷 프로토콜로, 128비트 길이의 주소 체계를 사용하며 보안 기능과 자동 주소 설정(Stateless Address Autoconfiguration), 멀티캐스트 등을 기본으로 지원한다.","b":[["IPv6"]],"tag":"네트워크"},
 {"q":"다음은 OSI 7 Layer에 대한 설명이다. 각 항목에 해당하는 계층을 보기에서 골라 쓰시오.\n\n① 직접적으로 연결된 두 개의 노드 사이에 데이터 전송을 가능하게 하고, 오류를 수정\n② 단말기 간 데이터 전송을 위한 최적화된 경로 제공\n③ 데이터의 압축과 형식 설정, 암·복호화를 담당\n\n[보기] 전송 / 응용 / 데이터 링크 / 물리 / 세션 / 네트워크 / 표현","b":[["데이터 링크","Data Link"],["네트워크","Network"],["표현","Presentation"]],"tag":"네트워크"},
 {"q":"다익스트라 알고리즘을 이용한 대규모 네트워크에 적합한 링크 상태 라우팅 프로토콜은 무엇인지 영어 약어로 쓰시오.","b":[["OSPF","Open Shortest Path First"]],"tag":"네트워크"},
 {"q":"톰 마릴(Tom Marill)이 정의한, 서로 다른 시스템 간 데이터 통신을 가능하게 하는 \"기술적 은어(technical syntax)\"를 뜻하는 용어가 무엇인지 쓰시오.","b":[["프로토콜","Protocol"]],"tag":"네트워크"},
 {"q":"패킷 교환 방식에서 패킷이 전송되기 전에 송/수신 스테이션 간의 논리적인 통신 경로를 미리 설정하는 방식은 ( ① ) 방식이며, 연결 경로를 확립하지 않고 각각의 패킷을 순서에 무관하게 독립적으로 전송하는 방식은 ( ② ) 방식이다. 빈칸에 들어갈 알맞은 용어를 쓰시오.","b":[["가상 회선","Virtual Circuit","가상회선 방식"],["데이터그램","Datagram"]],"tag":"네트워크"},
 {"q":"IP의 동작 과정에서의 전송 오류가 발생하는 경우에 오류 정보를 전송하는 목적으로 사용하는 프로토콜로, Ping-of-Death에서도 사용하는 프로토콜은 무엇인가?\n\n[보기] 라우팅 프로토콜 / ARP / IGMP / ICMP / IP / NAT / RARP","b":[["ICMP","Internet Control Message Protocol"]],"tag":"네트워크"},
 {"q":"정보전달의 기본단위를 53바이트 셀 단위로 사용하는 비동기식 시분할 다중화 방식의 패킷형 전송 기술을 무엇인지 영어 약자로 쓰시오.","b":[["ATM","Asynchronous Transfer Mode"]],"tag":"네트워크"},

 {"q":"다음 괄호 ( ) 안에 들어갈 용어를 작성하시오.\n\n( )은/는 네트워크의 구성 및 유지를 위해 기지국이나 액세스 포인트와 같은 기반 네트워크 장치를 필요로 하지 않는 네트워크로 노드(Node)들에 의해 자율적으로 구성되는 구조이다. 긴급 구조, 긴급회의, 전쟁터에서의 군사 네트워크로 활용된다.","b":[["애드혹 네트워크","애드혹","Ad-hoc Network","Ad hoc","에드혹","Ad-hoc"]],"tag":"네트워크"},
 {"q":"다음이 설명하는 가장 적합한 라우팅 알고리즘은 무엇인지 쓰시오.\n\n· 인접 라우터와 정보를 공유하여 목적지까지의 거리와 방향을 결정하는 라우팅 프로토콜 알고리즘\n· 벨만-포드(Bellman-Ford) 알고리즘 사용\n· 각 라우터가 업데이트될 경우마다 전체 라우팅 테이블을 보내라고 요청하지만 수신된 경로 비용 정보는 이웃 라우터에게만 보냄","b":[["거리 벡터","Distance Vector","거리 벡터 알고리즘","디스턴스 벡터","거리 벡터 라우팅","RIP"]],"tag":"네트워크"},
 {"q":"다음은 공유 매체에 대한 다중 접근 방식에 대한 설명이다. 괄호 ( ) 안에 들어갈 용어를 쓰시오.\n\n( ① )은/는 IEEE802.3 유선 LAN의 반이중방식(Half Duplex)에서, 각 단말이 신호 전송 전에 현재 채널이 사용 중인지 체크하여 전송하는 매체 액세스 제어(MAC) 방식이다.\n( ② )은/는 무선 LAN의 반이중방식(Half Duplex)에서, 사전에 가능한 충돌을 회피(Collision Avoidance)하는 무선전송 다원접속 방식이다.","b":[["CSMA/CD","CSMACD","Carrier Sense Multiple Access / Collision Detection"],["CSMA/CA","CSMACA","Carrier Sense Multiple Access / Collision Avoidance"]],"tag":"네트워크"},
 {"q":"다음은 IoT 관련 용어이다. 괄호 ( ) 안에 들어갈 용어는 무엇인지 쓰시오.\n\n( ① )은/는 IoT 장치, 텔레메트리 장치 등에서 최적화되어 사용할 수 있도록 개발된 프로토콜로, 브로커를 사용한 Publish/Subscribe 방식의 라이트 메시징을 전송하는 프로토콜이다. 저전력 센서, 스위치, 밸브 등의 기기에 대한 표준적 인터넷 환경을 지원하고, 프로토콜 리소스 점유 최소화, 한정된 자원 시스템 지원하는 특징이 있다.\n( ② )은/는 M2M 노드들 사이에서 이벤트에 대한 송수신을 비동기적으로 전송하는 REST 기반의 프로토콜이자 제약이 있는(Constrained) 장치들을 위한 특수한 인터넷 애플리케이션 프로토콜이다.","b":[["MQTT","Message Queuing Telemetry Transport"],["CoAP","Constrained Application Protocol","코앱"]],"tag":"네트워크"},
 {"q":"다음은 네트워크 프로토콜에 대한 설명이다. 보기에서 골라 쓰시오.\n\n( ① ) 은/는 네트워크상에서 IP 주소를 MAC 주소로 변환하는 프로토콜이다.\n( ② ) 은/는 MAC 주소를 IP 주소로 변환하는 프로토콜이다.\n\n[보기] ARP / IGMP / NAT / ICMP / 라우팅 프로토콜 / IP / RARP","b":[["ARP","Address Resolution Protocol"],["RARP","Reverse ARP","Reverse Address Resolution Protocol"]],"tag":"네트워크"},
 {"q":"다음 괄호에 공통으로 들어갈 용어를 영어 약자로 쓰시오.\n\n( ) 는 오류 기법으로 데이터를 전송·저장할 때 데이터의 오류를 감지하는 데 사용하는 오류 검출 코드이다.\n( ) 는 데이터에 체크섬을 추가해 전송·저장 후, 수신·읽을 때 체크섬을 재계산하여 데이터 무결성을 확인하는 기법이다.\n송신 측은 데이터에 특정 다항식을 적용한 나머지를 함께 전송하고, 수신 측은 동일 다항식으로 검증하여 데이터 손상 여부를 판단한다. 이러한 방식으로 전송 중 오류를 검출하는 방법을 ( ) 라고 한다.","b":[["CRC","Cyclic Redundancy Check","순환 중복 검사"]],"tag":"네트워크"},
 {"q":"OSI 7계층 중 다음 설명에 해당하는 계층을 쓰시오.\n\n전기적·기계적·기능적 특성을 정의하여 비트 단위의 데이터를 송수신 매체를 통해 전송하는 역할을 담당하는 최하위 계층. 케이블, 허브, 리피터 등이 동작한다.\n\n[보기] 네트워크 계층 / 데이터링크 계층 / 표현 계층 / 물리 계층 / 전송 계층 / 세션 계층 / 응용 계층","b":[["물리 계층","물리","Physical","Physical Layer"]],"tag":"네트워크"},
 {"q":"프로토콜의 기본 3요소를 쓰시오.\n\n- ( ① ): 데이터의 형식이나 부호화·신호 레벨 등을 규정한다.\n- ( ② ): 데이터 전송의 제어 정보로, 무엇을 의미하는지 규정한다.\n- ( ③ ): 두 객체 간의 통신 속도, 메시지 순서 제어를 규정한다.","b":[["구문","Syntax","형식"],["의미","Semantics"],["시간","타이밍","Timing"]],"tag":"네트워크"},
 {"q":"다음 설명에 해당하는 정보 보안의 3대 요소 중 하나를 쓰시오.\n\n인가된 사용자가 정보 자산에 접근하고자 할 때 방해받지 않고 즉시 접근할 수 있어야 한다는 특성.","b":[["가용성","Availability"]],"tag":"보안"},
 {"q":"다음 설명에 해당하는 공격 기법을 쓰시오.\n\n네트워크 상을 지나다니는 암호화되지 않은 데이터 패킷을 몰래 엿보는 수동적(passive) 공격 행위로, 공격자가 직접 네트워크에 영향을 주지 않고 정보를 수집한다.","b":[["Sniffing","스니핑"]],"tag":"보안"},
 {"q":"괄호 안에 공통으로 들어갈 단어(영어 약자)를 적으시오.\n\n( )은/는 인터넷 등 공중 네트워크를 암호화 기술을 통해 사용자가 전용회선을 사용하는 것처럼 도와주는 보안 기술입니다. 사용자 IP주소를 암호화하고 데이터를 암호화하여 전송하는 기술입니다.","b":[["VPN"]],"tag":"보안"},
 {"q":"다음은 암호화 알고리즘에 대한 설명이다. 괄호 안에 들어갈 가장 적절한 용어를 쓰시오.\n\n( 1 )은/는 초기에 제시된 블록 암호화 알고리즘으로 128bit 키를 사용하여 64bit 평문을 8라운드에 거쳐 64bit의 암호문으로 만든다.\n\n( 2 )은/는 NSA에서 개발한 블록 알고리즘으로 전화기와 같은 음성을 암호화하는 데 주로 사용된다. 64bit 입출력과 80bit 키를 사용한다.","b":[["IDEA"],["Skipjack"]],"tag":"보안"},
 {"q":"다음에서 설명하는 용어를 쓰시오.\n\n- 커버로스에서 사용되는 기술로 한 번의 인증 과정으로 여러 컴퓨터상의 자원을 이용할 수 있도록 해주는 인증 기술","b":[["SSO"]],"tag":"보안"},
 {"q":"다음 ( ) 안에 들어갈 알맞은 용어를 쓰시오.\n\n- ( ① )은/는 보안학적 측면에서 기술적인 방법이 아닌 사람들 간의 기본적인 신뢰를 기반으로 사람을 속여 비밀 정보를 획득하는 기법이다.\n- ( ② )은/는 빅데이터와 비슷하면서도 구조화돼 있지 않고, 더는 사용하지 않는 '죽은' 데이터를 의미한다.","b":[["사회공학","Social Engineering"],["다크 데이터","Dark Data"]],"tag":"보안"},
 {"q":"다음에서 설명하는 용어의 영문 약자를 쓰시오.\n\n머신러닝 기술을 이용하여 IT 시스템에서 발생하는 대량의 로그를 통합 관리 및 분석하여 사전에 위협에 대응하는 보안 솔루션이다.","b":[["SIEM"]],"tag":"보안"},
 {"q":"다음 ( ) 안에 들어갈 알맞은 용어를 쓰시오.\n\n- ( ① )은/는 프로세서 안에 독립적인 보안 구역을 따로 두어 중요한 정보를 보호하는 ARM사에서 개발한 하드웨어 기반의 보안 기술이다.\n- ( ② )은/는 사용자들이 사이트에 접속할 때 주소를 잘못 입력하는 실수를 이용하여 유사한 유명 도메인을 미리 등록하는 일이다.","b":[["TrustZone","트러스트존"],["Typosquatting","타이포스쿼팅"]],"tag":"보안"},
 {"q":"다음은 3A에 대한 설명이다. 각각이 설명하는 3A의 구성 요소를 영어로 쓰시오.\n\n① 접근을 시도하는 가입자 또는 단말에 대한 식별 및 검증\n② 검증된 가입자나 단말에게 어떤 수준의 권한과 서비스를 허용\n③ 리소스 사용에 대한 정보를 수집하고 관리하는 서비스","b":[["Authentication"],["Authorization"],["Accounting"]],"tag":"보안"},
 {"q":"시스템 객체의 접근을 개인 또는 그룹의 식별자에 기반을 둔 방법, 어떤 종류의 접근 권한을 가진 사용자가 다른 사용자에 자신의 판단에 따라 권한을 허용하는 접근제어 방식은?","b":[["DAC","Discretionary Access Control","임의적 접근 통제","임의적 접근 제어","임의 접근 통제"]],"tag":"보안"},
 {"q":"다음 설명에 해당하는 무선랜 보안 프로토콜의 영문 약자를 쓰시오.\n\nWEP의 취약점을 보완하기 위해 IEEE 802.11i 표준의 일부로 설계된 무선랜 보안 프로토콜로, 임시 키 무결성 프로토콜이라고도 한다. 패킷마다 키를 동적으로 변경(키 믹싱)하고 메시지 무결성 검사(MIC)를 적용한다.","b":[["TKIP"]],"tag":"보안"},
 {"q":"다음에서 설명하는 용어를 쓰시오.\n\n- 사용자가 비밀번호를 제공하지 않고 다른 웹사이트나 애플리케이션의 접근 권한을 부여할 수 있게 하는 개방형 표준기술이다.\n- 구글, 페이스북 등의 외부 계정을 기반으로 토큰을 이용하여 간편하게 회원가입 및 로그인할 수 있는 기술이다.","b":[["OAuth"]],"tag":"보안"},
 {"q":"포트번호로 22번을 사용하며 인증, 암호화를 제공하고 Telnet보다 강력한 보안을 제공하는 프로토콜은?","b":[["SSH","Secure Shell"]],"tag":"보안"},
 {"q":"다음에서 설명하는 용어를 쓰시오.\n\n소프트웨어의 위·변조가 발생할 경우, 소프트웨어가 정상적으로 실행되지 않도록 실행 코드를 변형하거나 동작을 중단시키는 기법으로, 외부 공격자나 악의적인 사용자가 소스 코드를 분석·변경하지 못하도록 하여 소프트웨어의 무결성을 보장하는 보호 기술이다.","b":[["탬퍼프루핑","Tamperproofing","Tamper Proofing"]],"tag":"보안"},
 {"q":"다음은 암호화 알고리즘에 대한 설명이다. 괄호 안에 들어갈 가장 적절한 용어를 쓰시오.\n\n( 1 )은/는 암호화와 복호화에 사용하는 키가 동일하다. 비밀키 전달을 위한 키교환이 필요하다.\n\n( 2 )은/는 공개키와 개인키가 존재하며, 공개키는 모두에게 공개되고, 개인키는 소유자만 알 수 있다.","b":[["대칭키","대칭키 암호화","Symmetric"],["비대칭키","비대칭키 암호화","Asymmetric","공개키"]],"tag":"보안"},
 {"q":"다음 설명에 해당하는 보안 용어를 보기에서 고르시오.\n\n- 인터넷 공격자의 존재를 숨기면서 이 공격자에게 시스템에 대한 무제한 접근 권한을 부여하는 악성 프로그램이다.\n- 해커가 자신의 존재를 숨기면서 허가되지 않은 컴퓨터나 소프트웨어에 접근할 수 있도록 설계된 도구이다.\n- 시스템 침입 후 침입 사실을 숨긴 채 차후의 침입을 위한 백도어, 트로이목마 설치, 그리고 원격접근, 내부 사용 흔적 삭제, 관리자 권한 획득 등 주로 불법적인 해킹에 사용되는 기능들을 제공하는 프로그램들의 모음이다.\n- 해커와 같이 일반적으로 권한이 없는 사용자가 접근할 수 없는 영역에 접근하여 시스템을 제어하도록 설계된 악성 소프트웨어 모음이다.\n- 일반적으로 펌웨어, 가상화 계층 등의 다양한 시스템 영역에서 작동하며, 운영체제의 시스템콜을 해킹하여 악성코드의 실행 여부를 숨겨 안티바이러스 탐지를 우회할 수 있다.\n\n[보기] Trojan horse / Worm / Rootkit / Virus / Spyware / Ransomware / Backdoor","b":[["Rootkit","루트킷"]],"tag":"보안"},
 {"q":"다음에서 설명하는 공격 기법을 영어로 쓰시오.\n\n출발지 주소를 공격 대상의 IP로 변조하여 네트워크 전체에게 ICMP Echo 패킷을 직접 브로드캐스팅(Directed Broadcasting)하여 타깃 시스템을 마비시키는 공격\n\n[보기] ping of death / land attack / syn flooding / tear drop / smurf / udp flooding","b":[["smurf","스머프","smurfing"]],"tag":"보안"},
 {"q":"다음에서 설명하는 기술은?\n\n1. VPN에서 사용되는 프로토콜\n2. L2F와 PPTP 기능 결합하여 인터넷 상 두 지점 간 가상의 터널을 만들어 통신을 전송하는 기술","b":[["L2TP","Layer 2 Tunneling Protocol"]],"tag":"보안"},

 {"q":"다음은 서버 접근통제의 유형이다. 괄호 ( ) 안에 들어갈 용어를 쓰시오. (단, 영어 약어로 작성하시오.)\n\n- ( ① )은/는 규칙 기반(Rule-Based) 접근통제 정책으로, 객체에 포함된 정보의 허용 등급과 접근 정보에 대하여 주체가 갖는 접근 허가 권한에 근거하여 객체에 대한 접근을 제한하는 방법이다.\n\n- ( ② )은/는 중앙 관리자가 사용자와 시스템의 상호 관계를 통제하며 조직 내 맡은 역할(Role)에 기초하여 자원에 대한 접근을 제한하는 방법이다.\n\n- ( ③ )은/는 신분 기반(Identity-Based) 접근통제 정책으로, 주체나 그룹의 신분에 근거하여 객체에 대한 접근을 제한하는 방법이다.","b":[["MAC","Mandatory Access Control"],["RBAC","Role Based Access Control"],["DAC","Discretionary Access Control"]],"tag":"보안"},
 {"q":"특정 서버에게 수많은 접속 시도를 만들어 다른 이용자가 정상적으로 서비스 이용하지 못하게 하거나, 서버의 자원을 소진해서 원래 의도된 용도로 사용하지 못하게 하는 공격은 무엇인지 쓰시오.","b":[["DoS","서비스 거부 공격","서비스 거부","Denial of Service","도스"]],"tag":"보안"},
 {"q":"다음 아래 내용을 보고 보기에서 알맞은 용어를 골라 작성하시오.\n\n1. 불특정 다수가 아닌 명확한 표적을 정하여 지속적인 정보수집 후 공격감행을 할 수 있다.\n2. 시스템에 직접 침투하는 것뿐 아니라 표적 내부직원들이 이용하는 다양한 단말을 대상으로 한다.\n3. 한가지 기술만이 아닌 Zero-day 취약점, 악성코드 등 다양한 보안 위협 공격 기술을 사용한다.\n4. 일반적으로 공격은 침투, 검색, 수집 및 유출의 4단계로 실행되며, 각 단계별로 다양한 공격 기술을 사용한다.\n\n[보기] Adware / key logger attack / 사회공학 기법 / APT / MITM / XDR / Replace attack","b":[["APT","지능형 지속 위협","Advanced Persistent Threat","지능형 지속 공격"]],"tag":"보안"},
 {"q":"다음에서 설명하는 보안 기술은?\n\n1. 공중 인터넷망을 사설 인터넷망으로 사용할 수 있는 VPN 기술\n2. IP계층(3계층)에서 무결성과 인증을 보장하는 인증헤더(AH)와 기밀성을 보장하는 암호화(ESP)를 이용한 기술","b":[["IPSec","IP Security","아이피섹"]],"tag":"보안"},
 {"q":"DES의 성능과 한계를 극복하기 위해 NIST에서 개발한 암호화 알고리즘이다. 128bit 블록크기를 가지며 키 길이에 따라 128, 192, 256bit를 사용할 수 있다. 이 대칭키 알고리즘은 무엇인가?","b":[["AES","Advanced Encryption Standard"]],"tag":"보안"},
 {"q":"다음은 보안 공격에 대한 설명이다. 괄호 ( ) 안에 들어갈 용어를 쓰시오.\n\nID와 패스워드가 될 가능성이 있는 단어를 파일로 만들어 놓고 이 파일의 단어를 대입하여 크랙하는 공격 기법인 ( ① ) 공격 기법과, 패스워드로 사용될 수 있는 영문자(대소문자), 숫자, 특수문자 등을 무작위로 패스워드 자리에 대입하여 패스워드를 알아내는 공격 기법인 ( ② ) 공격 기법이 증가하고 있다. 또한 ( ③ ) 공격 기법은 공격자가 특정 호스트의 MAC 주소를 자신의 MAC 주소로 위조한 ARP Reply를 만들어 희생자에게 지속적으로 전송하여 희생자의 ARP Cache Table을 변조, 희생자로부터 특정 호스트로 나가는 패킷을 공격자가 스니핑하는 기법이다.","b":[["사전","사전 공격","사전 대입","사전 대입 공격","Dictionary","Dictionary Attack"],["무차별 대입","무차별 대입 공격","무작위 대입","무작위 대입 공격","Brute Force","브루트 포스","무차별","Brute Force Attack","전수 조사"],["ARP 스푸핑","ARP Spoofing","ARP 스푸핑 공격","ARP"]],"tag":"보안"},
 {"q":"다음은 보안 관련 용어에 대한 설명이다. 괄호 ( ) 안에 공통으로 들어갈 용어는 무엇인지 쓰시오.\n\n( )은/는 보안 취약점이 발견되어 널리 공표되기 전에 해당 취약점을 악용하여 이루어지는 보안 공격이다. 공격의 신속성을 의미하는 것으로, 일반적으로 취약점이 발견되면 제작자나 개발자가 패치를 배포하고 사용자가 이를 다운받아 대처하지만, ( )은/는 대응책이 공표되기도 전에 공격이 이루어지기 때문에 대처 방법이 없다.","b":[["제로데이 공격","Zero Day Attack","제로데이","Zero-Day","제로 데이 공격","Zero Day"]],"tag":"보안"},
 {"q":"다음은 입력 데이터 검증 및 표현 취약점에 대한 설명이다. 괄호 ( ) 안에 들어갈 공격 기법을 쓰시오.\n\n( ① )은/는 검증되지 않은 외부 입력 데이터가 포함된 웹페이지가 전송되는 경우, 사용자가 해당 웹페이지를 열람함으로써 웹페이지에 포함된 부적절한 스크립트가 실행되는 공격 기법이고, ( ② )은/는 응용 프로그램의 보안 취약점을 이용해서 악의적인 SQL 구문을 삽입, 실행시켜서 데이터베이스(DB)의 접근을 통해 정보를 탈취하거나 조작 등의 행위를 하는 공격 기법이다.","b":[["XSS","크로스 사이트 스크립팅","Cross Site Scripting","크로스 사이트 스크립트","크로스사이트 스크립팅"],["SQL 삽입","SQL Injection","SQL 인젝션","SQL 삽입 공격"]],"tag":"보안"},
 {"q":"다음 설명에 해당하는 악성 소프트웨어를 보기에서 골라 쓰시오.\n\n- 사용자가 원치 않는 소프트웨어를 구매하도록 조작하기 위해 사회 공학을 사용하여 충격, 불안 또는 위협에 대한 인식을 유발하는 악성 소프트웨어의 한 형태이다.\n- '겁을 주다'라는 영어 단어에서 유래한 것으로 공포를 이용하여 피해자를 속여 대가를 지불하거나 특정 행동을 유도하는 랜섬웨어이다.\n- 가짜 바이러스 경고나 시스템 문제를 표시하여 사용자가 돈을 지불하거나 특정 소프트웨어를 설치하도록 속이는 방식으로 작동한다.\n\n[보기] 셔블웨어 / 그룹웨어 / 스케어웨어 / 컴포넌트 웨어 / 안티 스파이웨어 / 네트웨어 / 애드웨어 / 유즈웨어","b":[["스케어웨어","Scareware"]],"tag":"보안"},
 {"q":"다음 괄호 ( ) 안에 공통으로 들어갈 공격 기법을 적으시오.\n\n( )은/는 '세션을 가로채다'라는 의미로 정상적 연결을 RST 패킷을 통해 종료시킨 후 재연결 시 희생자가 아닌 공격자에게 연결한다.\n( )은/는 세션 관리 취약점을 이용한 공격 기법이다.\nTCP ( )은/는 3-way handshake가 완료된 후 공격자가 정상적인 세션을 가로채고 인증 없이 통신을 탈취하는 공격 기법이다.\n\n[보기] 패스워드 크래킹 / IP 스푸핑 / ARP 스푸핑 / 세션 하이재킹 / 스니핑 / ICMP Redirect 공격 / 트로이 목마","b":[["세션 하이재킹","Session Hijacking","TCP 세션 하이재킹"]],"tag":"보안"},
 {"q":"3-way handshake의 취약점을 이용하여 공격하는 방법으로, 공격자가 클라이언트 역할로 수많은 SYN 패킷을 서버에 전송한 뒤 마지막 ACK를 고의로 보내지 않아 서버가 연결 대기 상태를 계속 유지하게 하는 공격 방법을 영어로 쓰시오.\n\n[보기] udp flooding / smurf / teardrop / syn flooding / land attack / ping of death","b":[["SYN Flooding","SYN 플러딩","syn flood"]],"tag":"보안"},
 {"q":"다음 괄호 안에 들어갈 보안 용어를 영어 약어로 쓰시오.\n\n( )은 금융권에서 주로 사용하며 유효 시간 세션이 끝나면 사라지는 인증 수단이다. ( )은 단방향 해시함수를 이용하여 일회용 비밀번호를 생성하는 방식을 사용한다. ( )은 한 번 사용 후 즉시 폐기되어 재사용이 불가능하다. ( ) 방식은 일회용 비밀번호를 사용하므로, 쉽게 비밀번호를 유추할 수 없다는 장점이 있다.","b":[["OTP","One Time Password","일회용 비밀번호"]],"tag":"보안"},
 {"q":"레이스 컨디션 공격에서 공격자는 임시 파일이 존재하는지 확인한 후, 동일한 임시 파일을 두 개 생성하는 것이 아니라 공격 대상 파일의 경로를 가리키는 ( )을/를 생성하여 프로그램이 의도치 않은 파일에 접근하도록 유도한다. 빈칸에 들어갈 용어를 보기에서 골라 쓰시오.\n\n[보기] 심볼릭 링크 / 하이퍼 링크 / 링크 로트 / 스태킹 링크 / 하드 링크 / 가상 패스 링크","b":[["심볼릭 링크","Symbolic Link","심링크","symlink"]],"tag":"보안"},
 {"q":"다음 설명에 해당하는 암호화 해시 함수는 무엇인지 쓰시오.\n\nRFC 1321로 지정되어 있으며, 주로 프로그램이나 파일이 원본 그대로인지를 확인하는 무결성 검사 등에 사용된다. 1991년 로널드 라이베스트가 예전에 쓰이던 MD4를 대체하기 위해 고안된 128비트 암호화 해시 함수이다.","b":[["MD5","Message Digest 5"]],"tag":"보안"},
 {"q":"다음 설명에 해당하는 공격 기법을 보기에서 골라 쓰시오.\n\n공격자가 패킷의 출발지 IP 주소와 목적지 IP 주소를 모두 공격 대상의 IP로 동일하게 설정하여 전송함으로써, 공격 대상 시스템이 자기 자신에게 응답을 보내는 무한 루프에 빠지게 하여 서비스 거부 상태에 빠지도록 하는 공격.\n\n[보기] Ping of Death / Tear Drop / Smurf / Land Attack / SYN Flooding / UDP Flooding","b":[["Land Attack","랜드 어택","랜드 공격"]],"tag":"보안"},
 {"q":"다음 설명에 해당하는 테스트 오라클의 종류를 쓰시오.\n\n전수(全數) 입력값에 대해 기댓값을 제공하는 것이 불가능할 때, 일부의 특정 입력값들에 대해서만 기댓값을 제공하는 오라클.","b":[["샘플링 오라클","Sampling Oracle","샘플링"]],"tag":"테스트"},

 {"q":"다음이 설명하는 테스트 커버리지를 보기에서 골라 쓰시오.\n\n1. 모든 분기와 조건의 조합을 고려하나 모든 조합을 테스트하는 대신에 테스트가 필요한 중요한 조합을 찾아내는 데에 중점을 둔다.\n2. 특정 조건을 수행할 때 다른 조건과는 상관없이 전체 결과에 영향을 미치는 조건만을 테스트한다.\n3. 각각의 파라미터는 적어도 한 번은 최종 결과에 영향을 주어야 한다.\n\n[보기] 결정 커버리지 / 경로 커버리지 / 조건 커버리지 / 구문 커버리지 / 조건/결정 커버리지 / 변경 조건/결정 커버리지 / 다중 조건 커버리지","b":[["변경 조건/결정 커버리지","변경 조건 결정 커버리지","MC/DC","MCDC","Modified Condition/Decision Coverage"]],"tag":"테스트"},

/*1 소프트웨어 설계*/"UML 구성 3요소: 사물(Things) · 관계(Relationships) · 다이어그램(Diagrams)\n· 클래스 다이어그램: 객체 타입 정의, 속성과 연산 표현\n· 인터페이스: 구현해야 할 오퍼레이션 집합만 정의하는 모델 요소",
/*2 소프트웨어 설계*/"· 집합(Aggregation): 전체-부분, 서로 독립적 (빈 마름모)\n· 포함(Composition): 부분이 전체에 종속되는 강한 관계 (채운 마름모)\n· 일반화(Generalization): 일반-구체(상속) 관계 (빈 삼각형 화살표)",
/*3 소프트웨어 설계*/"클래스 다이어그램: UML의 대표적인 '구조(정적)' 다이어그램\n클래스의 속성(Attribute)·메서드(Operation)와 클래스 간 관계(연관·일반화·의존 등)를 표현\n도메인의 추상적 개념 구조를 나타낼 때도 사용\n대비: 행위(동적) 다이어그램 = 유스케이스, 시퀀스, 상태, 활동 다이어그램",
/*4 소프트웨어 설계*/"럼바우 OMT 3단계 (순서 암기: 객-동-기)\n· 객체(Object) 모델링: ER 다이어그램\n· 동적(Dynamic) 모델링: 상태 다이어그램\n· 기능(Functional) 모델링: 자료 흐름도(DFD)",
/*5 소프트웨어 설계*/"· UX(User eXperience): 사용자가 느끼는 감정·경험\n· UI(User Interface): 정보를 주고받는 매개체 (CLI, GUI, NUI 등)\nUI가 수단이라면, UX는 그 결과로 얻는 경험",
/*6 소프트웨어 설계*/"· 기능적(Functional) 요구사항: 시스템이 '무엇을' 하는가 — 기능, 서비스, 입출력\n· 비기능적(Non-functional) 요구사항: '얼마나 잘' 하는가 — 성능, 보안, 신뢰성, 품질, 제약사항\n구분 요령: 동작·기능이면 기능적 / 속도·용량·보안 같은 품질 조건이면 비기능적",
/*7 소프트웨어 설계*/"· 연관(Association): 사물들이 서로 관련된 상태 (실선)\n· 일반화(Generalization): 일반-구체, 상속 관계\n· 의존(Dependency): 필요할 때만 잠깐 관계를 맺는 약한 관계 (점선)",
/*8 소프트웨어 설계*/"응집도 낮음 → 높음 (암기: 우논시절통순기)\n우연적 < 논리적 < 시간적 < 절차적 < 통신적 < 순차적 < 기능적\n시간적 응집도 = 초기화처럼 같은 시점에 실행되는 기능들의 묶음",
/*9 소프트웨어 설계*/"절차적 응집도: 순서대로 실행되지만 입출력 데이터의 연관은 없음\n대비: 순차적(Sequential) 응집도는 한 요소의 출력이 다음 요소의 입력 — 더 높은 응집도",
/*10 소프트웨어 설계*/"UI 설계 4원칙\n· 직관성: 누구나 쉽게 이해·사용\n· 유효성: 사용자 목표를 정확히 달성\n· 학습성: 누구나 쉽게 배움\n· 유연성: 요구사항 수용, 오류 최소화",
/*11 소프트웨어 설계*/"형상관리 절차: 식별 → 통제 → 감사 → 기록\n· 형상 식별: 관리 대상 정의\n· 형상 통제: 변경 요구를 검토·승인해 베이스라인 반영\n· 형상 감사: 베이스라인 무결성 검증\n· 형상 기록: 상태 보고",
/*12 소프트웨어 설계*/"'외부 동작(기능)은 그대로 + 내부 구조 개선' 키워드 = 리팩토링\n목적: 가독성·유지보수성·확장성 향상\nXP(eXtreme Programming)의 대표 실천 항목",
/*13 소프트웨어 설계*/"기능적(Functional) 응집도 = 가장 높음, 가장 바람직\n모듈의 모든 요소가 단 하나의 기능을 위해 수행\n순서(낮→높): 우연적 < 논리적 < 시간적 < 절차적 < 통신적 < 순차적 < 기능적 (우논시절통순기)",
/*14 소프트웨어 설계*/"순차적(Sequential): 한 활동의 출력이 다음 활동의 입력이 됨\n기능적 다음으로 높은 응집도\n대비: 절차적은 순서만 있고 입출력 데이터 연관은 없음",
/*15 소프트웨어 설계*/"논리적(Logical): 유사한 성격·같은 분류의 기능들을 한 모듈에 묶음\n예: 모든 출력 처리를 하나의 모듈에\n낮은 편의 응집도 (우연적 바로 위)",
/*16 소프트웨어 설계*/"우연적(Coincidental): 서로 아무 관련 없는 요소들의 모임 — 가장 낮은 응집도\n설계 원칙: 응집도는 높을수록, 결합도는 낮을수록 좋음",
/*17 소프트웨어 설계*/"통신적(Communication): 같은 입력/출력 데이터를 사용하는 서로 다른 기능들의 묶음\n위치: 절차적보다 높고 순차적보다 낮음",
/*18 소프트웨어 설계*/"결합도 순서(낮→높): 자료 < 스탬프 < 제어 < 외부 < 공통 < 내용 (암기: 자스제외공내)\n자료(Data) 결합도: 단순 값만 인자로 전달 — 가장 낮고 바람직",
/*19 소프트웨어 설계*/"스탬프(Stamp): 배열·레코드 등 자료 구조 전체를 전달\n필요 없는 필드까지 넘어가서 구조 변경 시 여파가 커질 수 있음\n대비: 자료 결합도는 필요한 값만 전달",
/*20 소프트웨어 설계*/"제어(Control): 제어 신호·플래그를 넘겨 상대 모듈의 논리 흐름을 좌우\n하위 모듈이 상위 모듈을 제어하는 '권리 전도' 문제 발생 가능",
/*21 소프트웨어 설계*/"공통(Common): 전역 변수 등 공통 데이터 영역을 여러 모듈이 공유\n한 곳의 수정이 공유하는 모든 모듈에 영향\n참고: 외부(External) 결합도는 외부에 선언된 데이터를 참조하는 경우",
/*22 소프트웨어 설계*/"내용(Content): 다른 모듈의 내부 기능·데이터를 직접 참조/수정 — 가장 높음(최악)\n결합도 순서: 자료 < 스탬프 < 제어 < 외부 < 공통 < 내용 (자스제외공내)",
/*23 소프트웨어 설계*/"정형 명세 기법: 수학적 원리·표기법으로 요구사항 서술\n도구: Z-스키마, Petri Nets, 상태 차트\n장점: 간결·명확·검증 용이 / 단점: 이해가 어려움\n대비: 비정형 명세는 자연어·그림 중심 — 이해 쉬우나 모호할 수 있음",
/*24 소프트웨어 설계*/"SOA(Service Oriented Architecture, 서비스 지향 아키텍처)\n애플리케이션을 '서비스' 단위로 분할하고 느슨하게(Loosely-Coupled) 연결\n키워드: 서비스 단위 분할 + Loosely-Coupled → SOA",
/*25 소프트웨어 설계*/"응집도 높음 → 낮음 (좋음 → 나쁨):\n기능적 > 순차적 > 교환(통신)적 > 절차적 > 시간적 > 논리적 > 우연적\n암기: '기순교절시논우'\n→ 기능(ㄱ) → 교환(ㄴ) → 시간(ㄹ) → 우연(ㄷ)",
/*26 소프트웨어 설계*/"· 공통(Common) 결합도: 전역 변수를 여러 모듈이 참조·갱신\n· 스탬프(Stamp) 결합도: 배열·객체·구조체 등 자료 구조 전체 전달\n· 외부(External) 결합도: 외부에서 도입된 데이터 포맷·통신 프로토콜·디바이스 인터페이스 공유\n결합도 낮음→높음: 자료 < 스탬프 < 제어 < 외부 < 공통 < 내용 ('자스제외공내')",
/*27 소프트웨어 설계*/"SOLID 5원칙\n· SRP(단일 책임): 클래스는 하나의 책임만\n· OCP(개방-폐쇄): 확장에는 열려있고 변경에는 닫혀있게\n· LSP(리스코프 치환): 하위 클래스는 상위 클래스를 대체 가능해야\n· ISP(인터페이스 분리): 쓰지 않는 인터페이스에 의존하지 않게\n· DIP(의존 역전): 구체 클래스가 아닌 추상(인터페이스)에 의존\n'추상을 통해 참조' = DIP / '상위로 대체 가능' = LSP",
/*28 소프트웨어 설계*/"· Man Month(M/M): LoC ÷ 프로그래머의 월간 생산성 = 한 사람이 1개월 걸리는 작업량 기준\n  개발 기간 = Man Month ÷ 투입 인원\n· COCOMO: 보헴(Boehm) 제안, LoC '규모' 기반 — 조직형(Organic) / 반분리형(Semi-detached) / 임베디드형(Embedded)\n비용 산정 모형 정리: LoC·Man Month(상향식) / COCOMO·Putnam·FP(수학적)",
/*29 소프트웨어 설계*/"· CPM(Critical Path Method): 노드와 연결(액티비티 표기)로 공정 계산, 자원 제약 배제, '임계 경로' 산출\n· PERT: 비관치·중간치·낙관치의 '3점 추정'으로 일정 관리\n  기대치 = (비관치 + 4×중간치 + 낙관치) ÷ 6\n구분: 노드·경로 = CPM / 3점 추정 = PERT",
/*30 소프트웨어 설계*/"Man Month = LoC ÷ 프로그래머의 월간 생산성 = 20,000 ÷ 100 = 200 (MM)\n참고: 개발 기간 = Man Month ÷ 투입 인원 = 200 ÷ 10 = 20개월\n문제가 'Man Month'를 물으면 200, '개발 기간'을 물으면 20개월 — 어느 쪽을 묻는지 꼭 확인",
/*31 소프트웨어 설계*/"· 절차적: 순서대로 실행되지만 데이터는 직접 주고받지 않음 — '순서만'\n· 교환(통신)적: 같은 입력/출력 '데이터'를 공유하는 기능들의 묶음\n· 순차적과 구분: 순차적은 출력이 다음 입력으로 '직접 전달'됨\n· 기능적: 단일 목적 — 가장 높은 응집도\n높→낮: 기능 > 순차 > 교환(통신) > 절차 > 시간 > 논리 > 우연",
/*32 소프트웨어 설계*/"비기능적 요구사항의 세부 유형\n· 운영: 어떤 환경(운영체제·플랫폼)에서 동작해야 하는가\n· 자원: 메모리·저장공간·하드웨어 등 필요한 자원 조건\n· 성능: 응답 시간, 처리량, 처리 속도\n· 품질: 신뢰성·사용성·유지보수성 등\n(2)는 '메모리·장치 = 자원' — 품질로 헷갈리기 쉬우니 주의",
/*33 소프트웨어 설계*/"모듈 독립성 = 결합도↓ + 응집도↑\n· 결합도(Coupling): 모듈 '간'의 의존 정도 — 낮을수록 좋음 (자스제외공내)\n· 응집도(Cohesion): 모듈 '내부'의 연관 정도 — 높을수록 좋음 (기순교절시논우)\n좋은 설계: 결합도는 약하게, 응집도는 강하게",
/*34 소프트웨어 설계*/"애플리케이션 성능 지표 4가지\n· 처리량(Throughput): 단위 시간당 처리 트랜잭션 수\n· 응답 시간(Response Time): 입력 후 '응답이 시작'될 때까지\n· 반환 시간(Turnaround Time): 입력 후 '출력이 완료'될 때까지\n· 자원 사용률: CPU·메모리·네트워크 사용량\n구분: 응답=시작까지 / 반환=완료까지",
/*35 소프트웨어 설계*/"LoC 기법 개발 기간 계산\n노력(Man Month) = 총 LoC ÷ 1인당 월 생산성 = 36,000 ÷ 300 = 120 MM\n개발 기간 = Man Month ÷ 투입 인원 = 120 ÷ 6 = 20개월\n주의: 'Man Month'를 물으면 120, '개발 기간'을 물으면 20 — 무엇을 묻는지 확인",
/*36 소프트웨어 설계*/"애자일(Agile): 사람·상호작용 중심, 짧은 반복(Iteration)으로 변화에 유연하게 대응하는 경량 방법론\n애자일 선언문 4가지 가치: 프로세스·도구보다 개인과 상호작용 / 문서보다 동작하는 SW / 계약 협상보다 고객 협력 / 계획 준수보다 변화 대응\n종류: 스크럼(Scrum), XP(eXtreme Programming), 칸반, 린(Lean), 크리스탈\n대비: 워터폴(폭포수)은 단계를 순차 진행하며 이전 단계로 되돌아가지 않음",
/*37 소프트웨어 설계*/"UI 설계 원칙 4가지\n· 직관성(Intuitiveness): 누구나 쉽게 이해하고 사용할 수 있어야\n· 유효성(Validity): 사용자의 목적을 정확하고 완벽하게 달성할 수 있어야\n· 학습성(Learnability): 누구나 쉽게 배우고 익힐 수 있어야\n· 유연성(Flexibility): 사용자의 요구를 최대한 수용하고 실수를 최소화\n암기: 직·유·학·유",
/*38 소프트웨어 설계*/"형상 관리(SCM, Software Configuration Management): 개발 과정의 변경 사항을 식별·통제·감사·기록하는 활동\n절차: 형상 식별 → 형상 통제 → 형상 감사 → 형상 기록\n도구: CVS(구식, 파일 단위) → SVN/Subversion(중앙집중식) → Git(분산형)\n대비: 버전 관리는 형상 관리의 일부 개념",
/*39 디자인 패턴*/"행위(Behavioral) 패턴\n컬렉션의 내부 구조를 노출하지 않고 요소에 순차적으로 접근\n'순차 접근' 키워드 = Iterator",
/*40 디자인 패턴*/"구조(Structural) 패턴\n실제 객체 대신 '대리자(Proxy)'가 접근을 맡아 작업을 대신 처리\n대비: Adapter = 인터페이스 변환 / Decorator = 기능을 동적으로 추가 / Facade = 복잡한 서브시스템을 단순한 창구로 제공",
/*41 디자인 패턴*/"· Singleton(생성 패턴): 인스턴스가 하나뿐임을 보장 + 어디서든 참조(전역 접근점), 메모리 낭비 최소화\n· Visitor(행위 패턴): 데이터 구조와 처리 기능을 분리 — 처리 기능을 별도 클래스(방문자)로 정의해 새 연산을 쉽게 추가",
/*42 디자인 패턴*/"행위(Behavioral) 패턴 / 1:N 의존 관계\n주체(Subject)의 상태 변화 → 등록된 관찰자(Observer)들에게 자동 통지·갱신\n예: 이벤트 리스너, 구독-알림 구조",
/*43 디자인 패턴*/"구조(Structural) 패턴\n호환되지 않는 인터페이스를 변환해 함께 동작하게 함 (여행용 돼지코 어댑터를 떠올리기)\n대비: Bridge는 추상부와 구현부를 분리해 각각 독립적으로 확장",
/*44 디자인 패턴*/"구조(Structural) 패턴\n복잡한 서브시스템 앞에 단순한 통합 창구(인터페이스)를 제공\n'단순화된 하나의 창구' 키워드 = Facade",
/*45 디자인 패턴*/"행위(Behavioral) 패턴\n알고리즘들을 각각 캡슐화해 교체 가능하게 만듦\n클라이언트 코드 변경 없이 알고리즘 변경 가능 (예: 정렬 방식을 런타임에 선택)",
/*46 디자인 패턴*/"생성(Creational) 패턴\n복잡한 객체의 '생성 절차'와 '표현'을 분리\n같은 절차로 서로 다른 결과물 생성 (단계별 조립)\nGoF 분류: 생성 5종 = Singleton·Prototype·Builder·Factory Method·Abstract Factory",
/*47 디자인 패턴*/"· Abstract Factory(추상 팩토리): 구체 클래스에 의존하지 않고 서로 연관·의존적인 객체들의 '조합'을 만드는 인터페이스 제공, 구현은 ConcreteProduct에서\n· Prototype(프로토타입): 원형을 만들어 두고 복사(clone)한 뒤 필요한 부분만 수정\n대비: Factory Method는 객체 '생성'을 하위 클래스에 위임 (Virtual Constructor) — '조합' 키워드가 나오면 Abstract Factory",
/*48 디자인 패턴*/"GoF 디자인 패턴 3분류\n· 생성(Creational): Singleton, Factory Method, Abstract Factory, Builder, Prototype\n· 구조(Structural): Adapter, Bridge, Composite, Decorator, Facade, Flyweight, Proxy\n· 행위(Behavioral): Mediator, Interpreter, Iterator, Observer, Strategy, Command, State, Visitor 등\n'상호 작용·책임 분담·통신 방법' 키워드 = 행위 패턴",
/*49 디자인 패턴*/"· Bridge(구조): 추상(기능 계층)과 구현(구현 계층)을 분리해 각각 독립적으로 확장 — '다리' 키워드\n· Observer(행위): 상태 변화를 의존 객체들에게 자동 통지 — 1:N 관계, 발행/구독\n혼동 주의: Adapter는 '호환 안 되는 인터페이스 변환', Bridge는 '처음부터 분리 설계'",
/*50 데이터베이스*/"즉각 갱신: 트랜잭션 완료 전이라도 변경 내용을 즉시 DB에 반영\n→ 장애 시 로그로 REDO(재실행) + UNDO(취소) 모두 필요\n대비: 지연 갱신(Deferred Update)은 커밋 후 반영 → REDO만 필요",
/*51 데이터베이스*/"원인: 정규화가 덜 된 테이블의 데이터 중복\n· 삽입 이상: 불필요한 데이터 없이는 삽입 불가\n· 삭제 이상: 삭제 시 다른 정보까지 함께 손실\n· 갱신 이상: 일부만 수정되어 데이터 불일치\n해결: 정규화",
/*52 데이터베이스*/"관계 해석: 비절차적 언어(무엇을 원하는지만 기술), Predicate Calculus 기반\n종류: 튜플 관계 해석 / 도메인 관계 해석\n대비: 관계 대수는 절차적 언어(어떻게 구할지 연산 순서 기술)",
/*53 데이터베이스*/"정규화된 구조를 성능 향상·운영 단순화를 위해 의도적으로 되돌리는 기법\n테이블 통합·분리, 중복 컬럼 허용 등\n트레이드오프: 데이터 일관성은 떨어질 수 있음",
/*54 데이터베이스*/"이상(Anomaly) 3형제 — 정규화가 덜 된 테이블에서 발생\n· 삽입 이상: 원치 않는(불필요한) 값까지 함께 넣어야만 삽입 가능\n· 삭제 이상: 튜플 하나를 지우면 의도치 않은 다른 정보까지 연쇄 삭제\n· 갱신 이상: 중복 튜플 중 일부만 수정되어 데이터 불일치 발생\n해결: 정규화(Normalization)",
/*55 데이터베이스*/"· 튜플(Tuple): 릴레이션의 행(Row)\n· 릴레이션 인스턴스: 특정 시점에 실제 저장된 데이터 (= 릴레이션 외연)\n· 카디널리티(Cardinality): 튜플(행)의 수\n대비: 차수(Degree) = 속성(열)의 수 / 릴레이션 스키마 = 구조 정의(내포)",
/*56 데이터베이스*/"3계층 스키마 (암기: 사용자=외부, 전체 통합=개념, 저장=내부)\n· 외부: 사용자·개발자 관점, 사용자 뷰, 서브 스키마\n· 개념: 전체 논리 구조 + 개체 관계·제약조건·접근 권한·무결성·보안 정의\n· 내부: 물리적 저장 구조, 레코드 형식·물리적 순서",
/*57 데이터베이스*/"DB 모델링 절차: 요구사항 분석 → 개념 모델링 → 논리 모델링 → 물리 모델링\n· 개념: 업무 중심의 포괄적 추상화, 주제 영역·핵심 데이터 간 관계 정의\n· 논리: 관계(Relationship)·속성(Attribute)·키(Key) 도출\n· 물리: 사용 DBMS 특성에 맞는 물리적 스키마 생성",
/*58 데이터베이스*/"· 세타 조인(θ Join): 비교 연산자(=, >, < 등)로 조건을 만족하는 튜플 결합 — 가장 일반적인 형태\n· 동등 조인(Equi Join): 세타 조인 중 조건이 '=' 인 경우 (중복 속성이 결과에 남음)\n· 자연 조인(Natural Join): 동등 조인 결과에서 중복 속성을 제거\n세타 ⊃ 동등 ⊃ 자연 순으로 좁아진다고 기억",
/*59 데이터베이스*/"· 슈퍼키: 유일성 O, 최소성 X (속성을 더 붙여도 유일하면 슈퍼키)\n· 후보키: 유일성 O, 최소성 O — 튜플 구별의 기준\n· 기본키: 후보키 중 대표로 선택된 키\n· 대체키: 기본키로 선택되지 못한 나머지 후보키\n· 외래키: 다른 릴레이션의 기본키를 참조하는 키\n유일성만 = 슈퍼 / 유일+최소 = 후보",
/*60 데이터베이스*/"· 낙관적 검증(Optimistic Validation): 일단 수행 → 종료 시점에 검증 후 DB 반영 (충돌이 드물다고 '낙관')\n· 2PC(Two-Phase Commit, 2단계 커밋): 분산 DB에서 일관성 유지 — 준비(Prepare) 단계 + 커밋(Commit) 단계\n병행 제어 기법: 로킹, 낙관적 검증, 타임스탬프 순서, 다중 버전 동시성 제어(MVCC)",
/*61 데이터베이스*/"트리거(Trigger): 삽입(INSERT)·갱신(UPDATE)·삭제(DELETE) 이벤트 발생 시 '자동으로' 수행되는 절차형 SQL\n대비: 프로시저는 CALL로 '호출'해야 실행, 트리거는 이벤트로 '자동' 실행\n키워드: '이벤트' + '자동 수행' = 트리거",
/*62 데이터베이스*/"로킹(Locking): 데이터 항목에 잠금(Lock)을 설정하면 해제(Unlock)까지 그 트랜잭션이 '독점' 사용 (상호배제)\n로킹 단위가 크면 → 병행성 낮아지고 관리 간단 / 작으면 → 병행성 높아지고 오버헤드 증가\n확장: 2단계 로킹(2PL) = 확장 단계에서 잠금만, 축소 단계에서 해제만",
/*63 데이터베이스*/"· COMMIT: 트랜잭션이 '성공적으로' 완료 → 변경 내용을 DB에 영구 반영\n· ROLLBACK: 트랜잭션이 '비정상' 종료(원자성 깨짐) → 모든 변경 취소, 시작 전 상태로 복귀\n관련: 원자성(Atomicity) = All or Nothing — COMMIT/ROLLBACK이 보장하는 성질",
/*64 데이터베이스*/"제1정규형(1NF): 모든 속성의 도메인이 '원자값'만 갖도록 분해 (한 칸에 값 하나)\n{서울, 부산}처럼 다중값을 가진 속성을 행으로 분리 → 1NF\n정규화 단계 암기: 원자값(1NF) → 부분 함수 종속 제거(2NF) → 이행 종속 제거(3NF) → 결정자가 후보키(BCNF)",
/*65 데이터베이스*/"· Degree(차수): 속성(열)의 개수\n· Cardinality(카디널리티): 튜플(행)의 개수\n· Foreign Key(외래키): 다른 릴레이션의 기본키를 참조하는 속성\n· Domain(도메인): 속성이 가질 수 있는 값의 범위 — 도메인 무결성의 기준\n암기: 차수는 '열', 카디널리티는 '행' (ㅊ-ㅇ / ㅋ-ㅎ 짝으로 외우면 헷갈림 끝)",
/*66 데이터베이스*/"무결성 제약조건 3대장\n· 도메인 무결성: 각 '속성' 값이 정의된 도메인(범위·타입)에 속해야 함\n· 개체 무결성: '기본키'는 NULL 불가, 중복 불가 — 튜플을 유일하게 식별\n· 참조 무결성: '외래키'는 NULL이거나 참조하는 릴레이션의 기본키 값이어야 함\n키워드 매칭: 속성·범위 = 도메인 / 기본키 = 개체 / 외래키 = 참조",
/*67 데이터베이스*/"인덱스(Index, 색인): <키 값, 주소 포인터> 쌍으로 구성된 별도 자료 구조\n검색 속도는 빨라지지만 삽입·삭제 시 인덱스 갱신 오버헤드 발생\n대표 구조: B-트리, B+트리\n레코드 접근 3방식: 순차(처음부터 차례로) / 인덱스(색인 경유) / 해싱(해시 함수로 주소 직접 계산)",
/*68 데이터베이스*/"파일 시스템 ↔ 관계 데이터 모델 대응\n· 파일(File) = 릴레이션(테이블)\n· 레코드(Record) = 튜플(행)\n· 데이터 항목/필드(Field) = 속성(Attribute, 열)\n'필드 = Attribute' 매핑만 기억하면 바로 풀리는 유형",
/*69 데이터베이스*/"트랜잭션 ACID\n· 원자성(Atomicity): 전부 반영 or 전부 취소 (All or Nothing)\n· 일관성(Consistency): 수행 전후 DB 일관성 유지\n· 격리성(Isolation, 고립성/독립성): 수행 중 다른 트랜잭션 간섭 불가\n· 지속성(Durability): 완료 결과는 영구 반영\n문제에서 일관성·지속성을 뺐으니 답은 원자성 + 격리성",
/*70 SQL*/"SQL 명령어 3분류\n· DDL(정의): CREATE, ALTER, DROP, TRUNCATE — 구조를 만들고 바꾸고 지움\n· DML(조작): SELECT, INSERT, UPDATE, DELETE — 데이터를 다룸\n· DCL(제어): GRANT, REVOKE, COMMIT, ROLLBACK — 권한과 트랜잭션\n암기: 정의는 CAD(Create·Alter·Drop), 조작은 SIUD, 제어는 GR+CR\n주의: DELETE(DML)는 행 삭제, DROP·TRUNCATE(DDL)는 구조·전체 삭제",
/*71 SQL*/"제약조건(Constraint) 키워드\n· PRIMARY KEY: 기본키 — NULL 불가 + 중복 불가 (개체 무결성)\n· NOT NULL: NULL 값 입력 금지\n· CHECK (조건): 입력 값의 범위 제한 (도메인 무결성)\n· FOREIGN KEY (컬럼) REFERENCES 테이블(컬럼): 외래키 — 참조 무결성\n  → FOREIGN KEY와 REFERENCES는 항상 짝으로 사용\n· UNIQUE: 중복 금지 (NULL은 허용) / DEFAULT: 기본값",
/*72 SQL*/"컬럼(속성) 추가: ALTER TABLE 테이블명 ADD 컬럼명 타입\n참고: 변경 = MODIFY, 삭제 = DROP COLUMN\n주의: INSERT는 행(튜플)을 추가하는 DML — 구조 변경은 DDL인 ALTER",
/*73 SQL*/"INSERT INTO 학생 VALUES(202101, '임꺽정', '프로그래밍', '010-1234-5678');\n· 모든 컬럼에 값을 넣을 때는 컬럼 목록 생략 가능 (스키마 순서대로)\n· 컬럼 목록을 쓰는 형태도 정답: INSERT INTO 학생(학번, 성명, 과목명, 전화번호) VALUES(...)\n· 문자형(VARCHAR/CHAR)은 따옴표 필요, 숫자형(INTEGER)은 불필요",
/*74 SQL*/"데이터 수정: UPDATE 테이블 SET 컬럼 = 값 WHERE 조건;\n· WHERE를 빠뜨리면 '모든 행'이 수정되므로 주의\n· 여러 컬럼 수정: SET 컬럼1 = 값1, 컬럼2 = 값2 (쉼표로 구분)\nDML 4대 명령: SELECT(조회) / INSERT(삽입) / UPDATE(수정) / DELETE(삭제)",
/*75 SQL*/"튜플(행) 삭제: DELETE FROM 테이블 WHERE 조건;\n문자열 값은 작은따옴표로: 이름 = '현진'\n구분: DELETE = 행 삭제(DML) / DROP = 테이블 자체 제거(DDL) / TRUNCATE = 전체 행 제거",
/*76 SQL*/"SELECT 컬럼 FROM 테이블 WHERE 조건 ORDER BY 컬럼 [ASC | DESC];\n· ASC: 오름차순(기본값, 생략 가능) / DESC: 내림차순\n· 중복 제거: SELECT DISTINCT 학과 FROM 학생;\n· 전체 조회: SELECT * FROM 학생;\n· 별칭: SELECT 이름 AS 성명 FROM 학생;\n작성 순서: SELECT → FROM → WHERE → GROUP BY → HAVING → ORDER BY",
/*77 SQL*/"그룹 조회: SELECT 컬럼, 집계함수 FROM 테이블 GROUP BY 컬럼 HAVING 그룹조건;\n· WHERE: 그룹 짓기 '전'에 개별 행을 거름\n· HAVING: 그룹 지은 '후'에 그룹을 거름 (집계함수 조건은 HAVING에!)\n· 집계 함수: COUNT, SUM, AVG, MAX, MIN\n· COUNT(*)는 NULL 포함, COUNT(컬럼)은 NULL 제외",
/*78 SQL*/"CREATE VIEW 사원뷰 AS SELECT 사번, 이름 FROM 사원 WHERE 성별 = 'M';\n구조: CREATE VIEW 뷰이름 AS + SELECT 문\n채점 참고: 세미콜론은 있어도 없어도 정답 처리. 공백·따옴표 차이는 무시되지만 컬럼 순서(사번, 이름)와 조건은 정확해야 함",
/*79 SQL*/"뷰 삭제: DROP VIEW 뷰이름 [CASCADE | RESTRICT];\n· CASCADE: 참조하는 객체까지 연쇄 삭제\n· RESTRICT: 참조하는 객체가 있으면 삭제 취소\n· 뷰는 ALTER 불가 → 수정하려면 DROP 후 다시 CREATE (또는 CREATE OR REPLACE VIEW)\n· 테이블 삭제도 동일 구조: DROP TABLE 학생 CASCADE;",
/*80 SQL*/"DROP VIEW 뷰이름 CASCADE → 해당 뷰를 참조하는 다른 객체(뷰 등)까지 연쇄 제거\n대비: RESTRICT는 참조하는 객체가 있으면 제거를 '취소'\nCASCADE = 연쇄 삭제 / RESTRICT = 제한(거부) — DROP TABLE 등에도 동일하게 적용",
/*81 SQL*/"DROP VIEW 뷰이름 RESTRICT → 참조하는 객체가 있으면 삭제 거부(취소) — 기본값\n대비: CASCADE는 참조 객체까지 연쇄 제거\n세트 암기: CASCADE(연쇄 제거) ↔ RESTRICT(있으면 거부)",
/*82 SQL*/"권한 부여: GRANT 권한 ON 테이블 TO 사용자 [WITH GRANT OPTION];\n· WITH GRANT OPTION: 받은 권한을 '다른 사람에게 또 줄 수 있는' 권한까지 부여\n· 권한 종류: SELECT, INSERT, UPDATE, DELETE, ALL\n· 모든 권한 부여: GRANT ALL ON 학생 TO 홍길동;\nDCL 명령: GRANT(부여) / REVOKE(회수) / COMMIT / ROLLBACK",
/*83 SQL*/"권한 회수: REVOKE 권한 ON 테이블 FROM 사용자 [CASCADE | RESTRICT];\n· CASCADE: 그 사용자가 다른 사람에게 준 권한까지 '연쇄 회수'\n· RESTRICT: 다른 사용자에게 부여한 권한이 있으면 회수를 '취소'\n· GRANT는 TO, REVOKE는 FROM — 전치사 주의!\n· GRANT OPTION만 회수: REVOKE GRANT OPTION FOR SELECT ON 학생 FROM 홍길동;",
/*84 운영체제*/"상태 전이: 생성 → 준비 → 실행 → (대기) → 종료\n· 준비(Ready): CPU 할당 대기\n· 실행(Run): CPU 점유, 명령어 수행\n· 대기(Wait/Block): 입출력 완료 대기\n준비→실행 = 디스패치(Dispatch), 실행→준비 = 타임아웃",
/*85 운영체제*/"키워드 조합: C 언어 작성·이식성 / 트리 구조 파일 시스템 / 셸 / 시분할·다중 사용자 = UNIX\n주의: Linux는 UNIX 기반의 오픈소스 OS — 혼동 금지",
/*86 운영체제*/"IPC(Inter-Process Communication): 프로세스 간 데이터를 주고받는 통신 기법\n대표 기법 5가지: 공유 메모리(Shared Memory) / 소켓(Socket) / 세마포어(Semaphore) / 메시지 큐(Message Queue) / 파이프(Pipe)\n암기: '공·소·세·메·파'",
/*87 운영체제*/"chmod + 8진수 권한: r(읽기)=4, w(쓰기)=2, x(실행)=1\n· 사용자: 모든 권한 = 4+2+1 = 7\n· 그룹: 읽기+실행 = 4+1 = 5\n· 기타: 실행만 = 1\n→ chmod 751 gamja.sh",
/*88 운영체제*/"LFU(Least Frequently Used): 참조 '횟수(빈도)'가 가장 적은 페이지 교체\n구분 키워드 — 빈도·횟수 = LFU / 최근·오래 사용 안 함(시간) = LRU / 먼저 들어온 순서 = FIFO",
/*89 운영체제*/"LRU(Least Recently Used): 가장 오랫동안 사용되지 않은(시간 기준) 페이지 교체\n각 페이지마다 계수기나 스택을 두어 참조 시점을 기록\n대비: LFU는 '횟수', LRU는 '시간'",
/*90 운영체제*/"FIFO(First In First Out): 가장 먼저 적재된 페이지부터 교체 (선입선출)\n벨레이디의 모순(Belady's Anomaly): 프레임을 늘렸는데 페이지 부재가 오히려 증가 — FIFO에서 발생\n'벨레이디' 키워드가 보이면 무조건 FIFO",
/*91 운영체제*/"프레임 3개, 참조 1,2,3,1,2,4,1,2,5\n1(부재) 2(부재) 3(부재) → [1,2,3]\n1 적중, 2 적중\n4(부재, 1교체) → [2,3,4]\n1(부재, 2교체) → [3,4,1]\n2(부재, 3교체) → [4,1,2]\n5(부재, 4교체) → [1,2,5]\n부재 총 6회 (적중 2회)",
/*92 운영체제*/"SJF(Shortest Job First): 실행 시간이 가장 짧은 작업 우선, '비선점'\n평균 대기시간 최소화에 유리하지만 긴 작업이 계속 밀리는 기아(Starvation) 발생 가능\n기아 해결책: 에이징(Aging), HRN",
/*93 운영체제*/"SRT(Shortest Remaining Time): SJF의 '선점형' 버전\n남은 실행 시간이 더 짧은 프로세스가 도착하면 CPU를 빼앗음\n키워드 — '남은 시간' + '선점' = SRT / '비선점' = SJF",
/*94 운영체제*/"RR(Round Robin): 시분할 시스템용 '선점' 기법\n동일한 시간 할당량(Time Quantum, Time Slice)을 순서대로 부여\n할당량이 크면 FCFS와 비슷해지고, 작으면 문맥 교환 오버헤드 증가",
/*95 운영체제*/"HRN(Highest Response-ratio Next): SJF의 기아 현상 보완, '비선점'\n우선순위 = (대기시간 + 서비스시간) ÷ 서비스시간 → 값이 '큰' 것부터 실행\n오래 기다릴수록 우선순위가 올라가므로 기아 방지",
/*96 운영체제*/"우선순위 = (대기시간 + 서비스시간) ÷ 서비스시간 = (20 + 10) ÷ 10 = 3\n공식만 외우면 바로 풀리는 문제 — 분모가 '서비스시간'이라는 것에 주의",
/*97 운영체제*/"지역성(Locality) 3종\n· 시간(Temporal): '최근' 참조한 곳을 다시 참조 — 루프, 카운터\n· 공간(Spatial): 참조한 곳 '근처'를 참조 — 배열 순회\n· 순차(Sequential): 데이터가 '순서대로' 액세스\n워킹 셋·페이지 교체(LRU)의 이론적 근거가 되는 개념",
/*98 운영체제*/"기본 유닉스/리눅스 명령어\n· pwd(print working directory): 현재 경로 출력\n· ls(list): 디렉토리 내용 출력\n· cd(change directory): 디렉토리 이동\n· cp(copy): 파일 복사\n함께 나오는 것: mv(이동/이름변경), rm(삭제), cat(내용 출력), chmod(권한 변경)",
/*99 운영체제*/"HRN 우선순위 = (대기 시간 + 서비스 시간) ÷ 서비스 시간\n값이 클수록 우선순위 높음 → 오래 기다린 작업의 우선순위가 올라가 SJF의 기아를 보완\n분모가 '서비스 시간'인 것에 주의 (서비스 시간이 짧을수록 유리)",
/*100 네트워크*/"IPv4(32비트)의 주소 고갈 문제 해결 → 128비트 주소 체계\n기본 지원: IPSec 보안 · 자동 주소 설정 · 멀티캐스트, 헤더 단순화\n주소 유형: 유니캐스트 / 멀티캐스트 / 애니캐스트",
/*101 네트워크*/"OSI 7계층(아래부터): 물리 - 데이터링크 - 네트워크 - 전송 - 세션 - 표현 - 응용\n· 데이터링크: 인접 노드 간 전송 + 오류 제어\n· 네트워크: 경로 설정(라우팅)\n· 표현: 압축 · 암호화 · 형식 변환",
/*102 네트워크*/"'링크 상태(Link State) + 다익스트라 + 대규모' = OSPF (Open Shortest Path First)\n대비: RIP = 거리 벡터(홉 수 기준, 최대 15홉, 소규모)\nBGP = AS(자율 시스템) 간 외부 라우팅",
/*103 네트워크*/"프로토콜: 서로 다른 시스템 간 통신 규약\n기본 3요소 (암기 필수)\n· 구문(Syntax): 데이터 형식\n· 의미(Semantics): 제어 정보·오류 처리\n· 시간(Timing): 순서·속도 조절",
/*104 네트워크*/"패킷 교환 2방식\n· 가상 회선: 전송 전에 논리적 경로를 미리 설정 → 패킷이 같은 경로, 순서 보장\n· 데이터그램: 경로 설정 없이 패킷마다 독립 전송 → 순서 무관, 도착 순서가 바뀔 수 있음",
/*105 네트워크*/"Internet Control Message Protocol\nIP 전송 중 오류 보고·진단 메시지 전달\nPing이 ICMP Echo를 사용 → 이를 악용한 공격이 Ping of Death\n대비: ARP = IP→MAC 변환 / RARP = MAC→IP / IGMP = 멀티캐스트 그룹 관리",
/*106 네트워크*/"Asynchronous Transfer Mode (비동기 전송 방식)\n53바이트 고정 길이 '셀' 단위 전송 (헤더 5바이트 + 페이로드 48바이트)\n비동기식 시분할 다중화 사용",
/*107 네트워크*/"Routing Information Protocol\nIGP(내부 라우팅) 중 거리 벡터 방식 — 홉 수 기준, 최대 15홉 제한, UDP(520번) 사용\n대비: OSPF = 링크 상태 + 다익스트라, 대규모 네트워크용",
/*108 네트워크*/"255.255.255.192 = /26 → 마지막 옥텟이 64 단위 블록(0, 64, 128, 192)\n130은 128~191 블록에 속함 → 네트워크 주소 = 192.168.10.128\n요령: 호스트 옥텟 ÷ 블록크기 후 내림 × 블록크기 (130÷64=2.03 → 2×64=128)",
/*109 네트워크*/"블록 128~191에서 마지막 주소가 브로드캐스트 = 192.168.10.191\n요령: 다음 네트워크 주소(192) − 1 = 191\n네트워크 주소는 블록의 첫 주소, 브로드캐스트는 블록의 마지막 주소",
/*110 네트워크*/"/26 → 호스트 비트 = 32 − 26 = 6\n할당 가능 호스트 = 2^6 − 2 = 62개\n−2 이유: 네트워크 주소와 브로드캐스트 주소는 호스트에 할당 불가",
/*111 네트워크*/"4개로 분할 → 2비트 추가 필요 (2² = 4) → /24 + 2 = /26\n/26 = 255.255.255.192 (11000000)\n각 서브넷: .0, .64, .128, .192 (블록 크기 64)",
/*112 네트워크*/"/27 → 블록 크기 32 → 172.16.4.64 ~ 172.16.4.95\n· 172.16.4.64 = 네트워크 주소 (사용 불가)\n· 172.16.4.95 = 브로드캐스트 주소 (사용 불가)\n→ 할당 가능 범위: 첫 주소 65, 마지막 주소 94",
/*113 네트워크*/"애드혹 네트워크(Ad-hoc Network)\n기지국·AP 등 기반 인프라 없이 노드들끼리 자율적으로 구성하는 무선 네트워크\n활용: 긴급 구조, 긴급 회의, 전쟁터 군사 네트워크\n키워드: '기지국/AP 불필요' + '노드 자율 구성'",
/*114 네트워크*/"거리 벡터(Distance Vector) 라우팅\n· 벨만-포드(Bellman-Ford) 알고리즘 사용, 인접(이웃) 라우터와만 정보 교환\n· 대표 프로토콜: RIP (최대 홉 수 15)\n대비: 링크 스테이트(Link State)는 다익스트라 사용, 전체 토폴로지 파악 — 대표: OSPF\n'벨만포드·이웃' = 거리 벡터 / '다익스트라·전체' = 링크 스테이트",
/*115 네트워크*/"· CSMA/CD(Collision Detection): '유선' LAN(IEEE 802.3, 이더넷) — 충돌을 '감지'하면 재전송\n· CSMA/CA(Collision Avoidance): '무선' LAN(IEEE 802.11) — 충돌을 사전에 '회피'\n무선은 충돌 감지가 어려워 회피 방식 사용. 유선=CD, 무선=CA로 암기",
/*116 네트워크*/"· MQTT(Message Queuing Telemetry Transport): '브로커' 경유 Publish/Subscribe 경량 메시징 — IoT·저전력 장치용\n· CoAP(Constrained Application Protocol): 'REST 기반', 제약 있는(Constrained) 장치용 M2M 프로토콜, UDP 기반\n구분: 브로커·발행/구독 = MQTT / REST·Constrained = CoAP",
/*117 네트워크*/"· ARP(Address Resolution Protocol): IP 주소 → MAC 주소 변환\n· RARP(Reverse ARP): MAC 주소 → IP 주소 변환 (ARP의 반대)\n암기: 'R'everse가 붙으면 방향이 거꾸로\n혼동 주의: NAT는 사설 IP ↔ 공인 IP 변환 (MAC과 무관)",
/*118 네트워크*/"CRC(Cyclic Redundancy Check, 순환 중복 검사)\n'다항식'을 이용해 나머지(체크값)를 계산·검증하는 오류 '검출' 기법 — 데이터 링크 계층에서 사용\n키워드: '다항식' + '오류 검출' = CRC\n대비: 패리티 비트는 1비트 오류만 검출 / 해밍 코드는 오류 '수정'까지 가능",
/*119 네트워크*/"물리 계층(Physical Layer, 1계층): 비트를 전기·광 신호로 변환해 전송 매체로 전달\n전기적·기계적·기능적 특성 규정, 전송 단위는 '비트'\n장비: 케이블, 허브, 리피터\n대비: 데이터 링크(2계층)는 프레임 단위 + 오류·흐름 제어",
/*120 네트워크*/"프로토콜 3요소\n· 구문(Syntax): 데이터의 '형식'·부호화·신호 레벨 — 어떻게 생겼나\n· 의미(Semantics): 제어 정보의 '뜻' — 무엇을 의미하나\n· 시간(Timing): 통신 '속도'·메시지 순서 — 언제 보내나\n암기: 구·의·시 (형식-뜻-타이밍)",
/*121 보안*/"보안 3대 요소\n· 기밀성(Confidentiality): 인가된 사람만 열람\n· 무결성(Integrity): 위·변조 방지\n· 가용성(Availability): 필요할 때 즉시 이용 가능\n'방해받지 않고 접근' = 가용성",
/*122 보안*/"스니핑(Sniffing): 패킷을 몰래 '엿보는' 수동적 공격\n대비: 스푸핑(Spoofing)은 다른 대상으로 '위장'하는 능동적 공격",
/*123 보안*/"VPN(Virtual Private Network, 가상 사설망)\n공중망(인터넷)에 암호화 터널을 만들어 전용회선처럼 안전하게 사용하는 기술\n관련 프로토콜 계층: PPTP·L2TP(2계층) / IPSec(3계층) / SSL VPN(4~7계층)\n키워드: '공중망을 사설망처럼' = VPN",
/*124 보안*/"· IDEA: 128bit 키, 64bit 평문, 8라운드 블록 암호\n· Skipjack: NSA 개발, 클리퍼 칩(음성 암호화)용, 80bit 키\n둘 다 블록 암호 알고리즘",
/*125 보안*/"SSO(Single Sign-On)\n한 번의 인증(로그인)으로 연계된 여러 시스템·서비스를 추가 로그인 없이 이용하는 기술\n대표 기반 기술: 커버로스(Kerberos) — 티켓 기반 인증 프로토콜\n키워드: '한 번의 로그인' + '여러 시스템'\n대비: OAuth는 로그인이 아니라 '권한 위임'이 목적",
/*126 보안*/"· 사회공학: 기술이 아닌 사람의 신뢰·심리를 이용해 정보를 빼내는 기법 (피싱 등)\n· 다크 데이터: 수집·저장만 되고 분석에 쓰이지 않는 '죽은' 데이터",
/*127 보안*/"Security Information and Event Management\n여러 장비의 로그·이벤트를 통합 수집 + 머신러닝 분석\n→ 위협에 선제 대응하는 보안 관제 솔루션",
/*128 보안*/"· TrustZone: ARM의 하드웨어 보안 기술, 프로세서 안에 분리된 보안 구역\n· Typosquatting: URL 오타를 노려 유사 도메인 선점 (= URL 하이재킹)",
/*129 보안*/"· Authentication(인증): 누구인지 식별·검증\n· Authorization(인가): 검증된 대상에 권한 부여\n· Accounting(계정 관리): 리소스 사용 정보 수집·관리 (과금·감사)",
/*130 보안*/"접근 통제 3방식\n· DAC(임의적): 신분 기반, 소유자가 자신의 판단으로 권한 부여\n· MAC(강제적): 보안 등급·레이블 기반\n· RBAC(역할 기반): 역할(Role)에 권한 부여",
/*131 보안*/"Temporal Key Integrity Protocol (임시 키 무결성 프로토콜)\nWEP 취약점 보완용, IEEE 802.11i 표준의 일부\n패킷마다 키 변경(키 믹싱) + 메시지 무결성 검사(MIC), WPA에서 사용",
/*132 보안*/"OAuth(Open Authorization)\n비밀번호를 직접 넘기지 않고 '토큰'으로 접근 권한을 위임하는 개방형 표준 프로토콜\n대표 사례: 구글·카카오 계정으로 소셜 로그인\n대비: SSO는 '한 번의 로그인(인증)', OAuth는 '권한 위임(인가)' — 목적이 다름",
/*133 보안*/"Secure Shell, 포트 22번\n암호화된 원격 접속·파일 전송 제공\n대비: Telnet(23번)은 평문 전송이라 취약 → SSH가 보안 대체",
/*134 보안*/"탬퍼프루핑: 위·변조(Tampering) 감지 시 실행 중단/코드 변형 → 무결성 보장\n대비: 난독화(Obfuscation)는 소스를 읽기 어렵게만 만드는 기술",
/*135 보안*/"· 대칭키: 암·복호화 키 동일 (AES, DES, SEED) — 빠르지만 키 전달 문제\n· 비대칭키(공개키): 공개키 + 개인키 쌍 (RSA, ECC) — 키 분배 쉽지만 느림",
/*136 보안*/"Root(최고 권한) + Kit(도구 모음)\n침입 흔적 은폐, 백도어·원격 접근 제공\n시스템콜 후킹으로 안티바이러스 탐지 회피",
/*137 보안*/"출발지 IP를 피해자 주소로 위조한 ICMP Echo 요청을 브로드캐스트\n→ 네트워크 전체의 응답이 피해자에게 몰려 마비\n대비: Land Attack은 출발지 = 목적지를 같게 위조",
/*138 보안*/"Layer 2 Tunneling Protocol\nL2F + PPTP의 기능을 결합한 2계층 터널링 프로토콜\nVPN에서 가상 터널 생성 — 자체 암호화가 없어 보통 IPSec과 함께 사용",
/*139 보안*/"해시 함수: 임의 길이 입력 → 고정 길이 출력, 단방향(역산 불가)\n대표 알고리즘: SHA 계열, MD5\n용도: 무결성 검증, 비밀번호 저장, 디지털 서명",
/*140 보안*/"접근통제 3유형 — 키워드 매칭이 핵심\n· MAC(강제적): 규칙(Rule) 기반, 보안 등급·허용 등급에 근거해 중앙에서 강제\n· RBAC: 역할(Role) 기반, 중앙 관리자가 역할에 권한 부여\n· DAC(임의적): 신분(Identity) 기반, 소유자의 판단으로 권한 부여\n암기: 규칙=MAC / 역할=RBAC / 신분=DAC",
/*141 보안*/"DoS(Denial of Service, 서비스 거부 공격)\n대량 접속 시도·자원 소진으로 정상 서비스 이용을 방해\n대표 기법: SYN Flooding, Smurf, Ping of Death 등\n대비: DDoS는 분산된 여러 좀비 PC가 동시에 공격 (Distributed)",
/*142 보안*/"APT(Advanced Persistent Threat, 지능형 지속 위협)\n키워드: '명확한 표적' + '지속적' + '다양한 기술(Zero-day 등)' + '침투→검색→수집→유출 4단계'\n대비: 사회공학 기법은 사람의 심리를 이용한 공격 (APT의 침투 단계에서 활용되기도 함)",
/*143 보안*/"IPSec(IP Security): IP 계층(3계층)에서 동작하는 VPN 보안 프로토콜\n· AH(Authentication Header): 무결성 + 인증 (암호화 없음)\n· ESP(Encapsulating Security Payload): 기밀성(암호화) + 무결성 + 인증\n전송 모드(페이로드만 보호) / 터널 모드(IP 패킷 전체 보호)",
/*144 보안*/"AES(Advanced Encryption Standard): DES를 대체하기 위해 NIST가 제정한 대칭키 블록 암호\n블록 크기 128bit 고정, 키 길이 128/192/256bit\n대비: DES는 64bit 블록·56bit 키 / SEED·ARIA는 국산 128bit 블록 암호\n키워드: 'NIST' + '128/192/256' = AES",
/*145 보안*/"· 사전(Dictionary) 공격: 가능성 있는 단어를 '파일(사전)'로 만들어 대입\n· 무차별 대입(Brute Force) 공격: 문자·숫자·특수문자를 '무작위로 전부' 대입\n· ARP 스푸핑: 위조 ARP Reply로 희생자의 ARP Cache를 오염시켜 패킷을 가로챔(스니핑)\n구분: 사전 = 단어 목록 / 무차별 = 모든 조합 / ARP = MAC 위조",
/*146 보안*/"제로데이(Zero Day) 공격: 취약점이 공표되고 패치가 나오기 '전에(0일째)' 이루어지는 공격\n대응책이 없어 가장 위험 — '패치 배포 전', '대처 방법 없음' 키워드\n대비: 알려진 취약점을 패치 전에 공격하는 것과 구분 없이, 핵심은 '공표·패치 이전'",
/*147 보안*/"· XSS(Cross Site Scripting): 웹페이지에 악성 '스크립트'를 심어 열람한 사용자의 브라우저에서 실행\n· SQL 삽입(SQL Injection): 입력값에 악의적 'SQL 구문'을 삽입해 DB 정보 탈취·조작\n구분: 피해 대상이 사용자 브라우저 = XSS / 데이터베이스 = SQL Injection\n둘 다 '입력 데이터 검증 미흡'이 원인 — 시큐어 코딩으로 예방",
/*148 보안*/"스케어웨어(Scareware): Scare(겁주다) + Software\n가짜 바이러스 경고·시스템 오류를 띄워 '공포'로 결제·설치를 유도\n키워드: '겁을 주다' + '가짜 경고' = 스케어웨어\n대비: 랜섬웨어는 실제로 파일을 암호화해 인질로 잡음, 스케어웨어는 겁만 줌",
/*149 보안*/"세션 하이재킹(Session Hijacking): 인증이 끝난 '세션'을 가로채 인증 없이 통신 탈취\n· TCP 세션 하이재킹: 3-way handshake 완료 후 시퀀스 넘버를 위조해 세션 탈취, RST로 연결 재설정\n키워드: '세션 가로채기' + 'RST 패킷' + '3-way handshake 이후'\n대비: 스푸핑은 '위장', 하이재킹은 '탈취'",
/*150 보안*/"SYN Flooding: 3-way handshake의 취약점 공격\nSYN만 잔뜩 보내고 ACK를 안 보냄 → 서버가 SYN-RECEIVED(연결 대기) 상태로 자원 고갈 → 정상 사용자 접속 불가 (DoS)\n키워드: '3-way handshake' + '마지막 ACK 미전송' + '연결 대기 유지'\n방어: SYN Cookie, 백로그 큐 확장, 타임아웃 단축",
/*151 보안*/"OTP(One Time Password): 한 번 쓰고 버리는 일회용 비밀번호\n단방향 해시함수 기반 생성, 유효 시간이 지나면 소멸, 재사용 불가\n키워드: '일회용' + '금융권' + '단방향 해시'\n대비: SSO는 한 번 로그인으로 여러 시스템 이용 — 목적이 전혀 다름",
/*152 보안*/"레이스 컨디션(Race Condition) 공격: 검사 시점과 사용 시점의 틈(TOCTOU)을 노리는 공격\n임시 파일 자리에 공격 대상 파일을 가리키는 심볼릭 링크를 만들어 두면, 프로그램이 임시 파일인 줄 알고 대상 파일을 읽고 쓰게 됨\n· 심볼릭 링크: 다른 파일의 '경로'를 가리키는 바로가기 (원본 삭제 시 깨짐)\n· 하드 링크: 같은 inode를 직접 공유 (원본 삭제해도 유지)\n방어: 임시 파일 생성 시 O_EXCL 옵션, 예측 불가능한 파일명 사용",
/*153 보안*/"MD5(Message Digest 5): 128비트 해시값 생성, RFC 1321, 파일 무결성 검사에 사용\n현재는 충돌 공격에 취약해 보안 용도로는 권장 안 함 (SHA-256 등으로 대체)\n대비: SHA-1(160bit), SHA-256(256bit)",
/*154 보안*/"Land Attack: 출발지 IP = 목적지 IP (둘 다 피해자 주소)로 위조\n시스템이 자기 자신에게 무한 응답 → 자원 고갈, 서비스 거부(DoS)\n키워드: '출발지 = 목적지 동일'\n대비: Smurf는 브로드캐스트 + 피해자로 위조한 출발지 / Ping of Death는 초대형 ICMP",
/*155 테스트*/"테스트 오라클 4종\n· 참(True): 모든 입력의 기대값 제공\n· 샘플링(Sampling): 특정 입력값만 제공\n· 휴리스틱(Heuristic): 샘플링 + 나머지는 추정\n· 일관성(Consistent): 수행 전후 결과 동일 확인\n'일부 특정 입력값만' = 샘플링",
/*156 테스트*/"입력을 유효/무효 그룹(동치 클래스)으로 나누고 각 그룹의 대표값만 테스트\n함께 출제: 경계값 분석(Boundary Value Analysis) — 경계 근처 값을 집중 테스트",
/*157 테스트*/"회귀 테스트(Regression Test)\n오류 수정·코드 변경 후, 그 변경이 기존 기능에 새로운 결함(부작용)을 만들지 않았는지 이미 수행했던 테스트를 반복 수행\n키워드: '수정/변경 후' + '기존 테스트 재수행' = 회귀\n대비: 확인(Confirmation) 테스트는 보고된 그 결함이 고쳐졌는지만 재확인",
/*158 테스트*/"JUnit: Java용 단위 테스트 프레임워크 (xUnit 계열), @Test 애너테이션으로 테스트 메서드 지정\nxUnit 계열 정리: Java=JUnit / C++=CppUnit / .NET=NUnit / HTTP=HttpUnit\n키워드: 'Java' + '단위 테스트' = JUnit",
/*159 테스트*/"· 정적(static) 분석: 실행하지 않고 검사 — 표준 준수, 문법 오류, 잠재 결함 (pmd, cppcheck, SonarQube)\n· 동적(dynamic) 분석: 실행하면서 검사 — 메모리 누수, 커버리지 (Valgrind, Avalanche)",
/*160 테스트*/"블랙박스 테스트 = 내부 구조를 보지 않고 명세(입출력)만으로 검사 (명세 기반)\n종류: 동치(동등) 분할, 경계값 분석, 원인-효과 그래프, 오류 예측 등\n대비: 화이트박스는 내부 로직 기반 (구문·분기·조건 커버리지)",
/*161 테스트*/"정적 테스트(리뷰) 3형제 — 구분 포인트 암기\n· 동료 검토(Peer Review): 2~3명, 작성자가 설명하며 결함 발견\n· 인스펙션(Inspection): 저작자 외 전문가·팀이 검사하는 '공식적' 검토\n· 워크스루(Walkthrough): 자료를 회의 전에 배포 → 사전 검토 → 짧은 회의, '비공식적' 검토\n공식 = 인스펙션 / 비공식·사전 배포 = 워크스루",
